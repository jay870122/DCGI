<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garbled 幻彩水晶商店</title>
  <style>
    /* 🌟 整體版面與寬度設定 */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           background-color: #2C2F33; color: white; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background-color: #23272A; padding: 30px; border-radius: 12px; width: 100%; max-width: 1100px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); position: relative; }
    
    /* 🌟 按鈕樣式 */
    .btn { color: white;
           padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; width: 100%; display: inline-block;
           box-sizing: border-box; text-decoration: none; text-align: center;}
    .btn-login { background-color: #5865F2; margin-top: 10px; max-width: 300px; }
    .btn-login:hover { background-color: #4752C4; }
    .btn-logout { background-color: #ED4245; margin-top: 20px; max-width: 200px;}
    .btn-logout:hover { background-color: #C13537; }
    .btn-action { background-color: #4F545C; color: white;
                  padding: 6px 12px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.3s; }
    .btn-action:hover { background-color: #686D73; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 🌟 玩家頂部橫向資訊區塊 */
    .user-header-section { display: flex;
                           align-items: center; gap: 20px; margin-bottom: 20px; background-color: #2C2F33; padding: 20px; border-radius: 8px; flex-wrap: wrap; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #5865F2; flex-shrink: 0;}
    .user-info { flex-grow: 1; }
    .score-box { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 8px; }
    .score-item { font-size: 15px; background: #202225; padding: 6px 12px; border-radius: 6px;
                  border: 1px solid #4F545C; display: flex; align-items: center; gap: 6px;}
    .score-value { font-weight: bold; color: #58FF9C; }
    .dynamic-score-value { font-weight: bold; color: #FEE75C; } 
    
    /* 🌟 側邊欄與網格商品區佈局 */
    .shop-layout { display: flex; gap: 20px; align-items: flex-start; }
    .sidebar { width: 220px; flex-shrink: 0; background-color: #2C2F33; border-radius: 8px; padding: 15px;
               display: flex; flex-direction: column; gap: 5px; position: sticky; top: 20px; }
    .cat-item { padding: 12px 15px;
                border-radius: 6px; cursor: pointer; color: #B9BBBE; font-size: 15px; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .cat-item:hover { background-color: #40444B; color: white; }
    .cat-item.active { background-color: #5865F2; color: white; font-weight: bold; }

    /* 🌟 分類分享按鈕 */
    .btn-share-cat {
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.2s;
      user-select: none;
      font-size: 14px;
    }
    .btn-share-cat:hover {
      opacity: 1;
      transform: scale(1.2);
    }
    
    .main-area { flex-grow: 1; width: 100%; min-width: 0; }
    .controls-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background-color: #2C2F33; padding: 10px 15px; border-radius: 8px; }
    .shop-input { padding: 8px 12px; border-radius: 5px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 14px; outline: none; }
    
    /* 🌟 商品網格卡片 */
    .shop-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
    .shop-item-card { background-color: #2F3136; border: 1px solid #4F545C; border-radius: 8px;
                      padding: 15px; display: flex; flex-direction: column; position: relative; overflow: hidden; height: 100%; box-sizing: border-box; }
    .shop-item-card.disabled { opacity: 0.6; }
    
    /* 🌟 圖片樣式更新：加入游標與 hover 放大提示效果 */
    .item-image { 
        width: 100%; height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; border: 1px solid #40444B; 
        cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .item-image:hover { transform: scale(1.03); border-color: #5865F2; }

    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px solid #40444B; padding-bottom: 8px; gap: 10px;}
    .item-name { font-size: 18px; font-weight: bold; color: #FFF; line-height: 1.3;}
    .btn-share { margin-left: 8px; cursor: pointer; font-size: 16px; opacity: 0.6; transition: 0.2s; user-select: none; }
    .btn-share:hover { opacity: 1; transform: scale(1.2); }
    .item-badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: bold; flex-shrink: 0; white-space: nowrap; }
    .badge-avail { background-color: #43B581; color: white; }
    .badge-unavail { background-color: #ED4245; color: white; }
    .item-remark { font-size: 13px; color: #99AAB5; margin-bottom: 12px; padding: 8px; background-color: #202225; border-left: 3px solid #5865F2; border-radius: 4px; line-height: 1.4; white-space: pre-wrap; }
    
    /* 🌟 備註內的超連結樣式 */
    .item-remark a { color: #00AFF4; text-decoration: none; word-break: break-all; }
    .item-remark a:hover { text-decoration: underline; }

    /* 🌟 商品倒數計時區塊樣式 */
    .item-time-info { font-size: 13px; color: #99AAB5; margin-bottom: 12px; padding: 10px; background-color: #202225; border-radius: 6px; border: 1px solid #40444B; line-height: 1.5; }
    .countdown-timer { font-weight: bold; font-size: 14px; white-space: nowrap; }

    .item-info { font-size: 14px; color: #B9BBBE; margin-bottom: 15px; line-height: 1.6; flex-grow: 1; } 
    .item-price { color: #FEE75C; font-weight: bold; font-size: 16px; }
    
    .limit-tags { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .limit-tag { font-size: 12px; padding: 4px 8px; border-radius: 4px; display: inline-block; width: fit-content; }
    .tag-global { background-color: #4F545C; color: #FFF; }
    .tag-personal { background-color: #5865F2; color: #FFF; }
    .tag-total { background-color: #FEE75C; color: #000; font-weight: bold; }
    .tag-role-ok { background-color: #9B59B6; color: #FFF; }
    .tag-role-locked { background-color: #74398A; color: #E0C3F1; }

    .item-actions { display: flex; gap: 10px; align-items: center; margin-top: auto; }
    .qty-input { width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 16px; text-align: center; outline: none; }
    .btn-buy { background-color: #43B581; padding: 8px 16px; width: auto; flex-grow: 1; }
    .btn-buy:hover { background-color: #3CA374; }
    .btn-buy:disabled { background-color: #4F545C; cursor: not-allowed; }

    /* 手機版適應：側邊欄變為上方橫向捲動 */
    @media (max-width: 768px) {
      .shop-layout { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; overflow-x: auto; position: static; white-space: nowrap; padding: 10px; box-sizing: border-box; }
      .cat-item { flex-shrink: 0; }
    }

    /* 🌟 彈出視窗 (歷史紀錄) */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
    .modal-content { background: #2F3136; border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; text-align: left; position: relative;}
    .modal-close { position: absolute; top: 15px; right: 20px; color: #B9BBBE; font-size: 24px; font-weight: bold; cursor: pointer; }
    .modal-close:hover { color: white; }
    .history-card { background: #202225; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #40444B;}
    .history-time { font-size: 12px; color: #72767D; margin-bottom: 5px; }
    .history-name { font-size: 16px; font-weight: bold; color: #FFF; }
    .history-qty { color: #A6D189; }
    .history-keys { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #4F545C; color: #FEE75C; font-family: monospace; font-size: 14px; word-break: break-all;}

    /* 🌟 圖片放大彈出視窗 */
    .image-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
      z-index: 2000; padding: 20px; box-sizing: border-box; cursor: pointer;
    }
    .image-overlay img {
      max-width: 90vw; max-height: 90vh; border-radius: 8px; border: 2px solid #5865F2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8); object-fit: contain; cursor: default;
    }
    .image-close {
      position: absolute; top: 20px; right: 30px; color: #FFF; font-size: 40px; font-weight: bold; cursor: pointer; transition: color 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .image-close:hover { color: #ED4245; }

    .version-tag { font-size: 12px; color: #72767D; margin-top: 20px; text-align: center; }
    #dashboard, #loading { display: none; }
  </style>
</head>
<body>

  <!-- 🌟 歷史紀錄模態視窗 -->
  <div id="history-modal" class="modal-overlay">
    <div class="modal-content">
      <span class="modal-close" onclick="closeHistory()">×</span>
      <h2 style="margin-top:0; border-bottom: 1px solid #4F545C; padding-bottom: 10px;">📜 兌換與序號紀錄</h2>
      <div id="history-list-container">
        <p style="text-align:center; color:#B9BBBE;">讀取中...</p>
      </div>
    </div>
  </div>

  <!-- 🌟 圖片放大模態視窗 -->
  <div id="image-overlay" class="image-overlay" onclick="closeImage()">
    <span class="image-close">×</span>
    <img id="full-size-image" src="" alt="Full Size" onclick="event.stopPropagation()">
  </div>

  <div class="card">
    <div id="login-section" style="text-align: center;">
      <h1 style="margin-top:0;">Garbled 幻彩水晶商店</h1>
      <p style="color: #B9BBBE;">請綁定您的 Discord 帳號以查看資料與兌換</p>
      <a href="https://discord.com/api/oauth2/authorize?client_id=1365601646448607335&redirect_uri=https%3A%2F%2Fjay870122.github.io%2FDCGI%2F&response_type=token&scope=identify" class="btn btn-login">🎮 使用 Discord 登入</a>
    </div>

    <div id="loading" style="text-align: center;">
      <p id="loading-text" style="font-size: 18px;">⏳ 正在連線至資料庫...</p>
    </div>

    <div id="dashboard">
      
      <div class="user-header-section">
        <img id="user-avatar" class="avatar" src="" alt="Avatar">
        <div class="user-info">
          <h2 id="user-name" style="margin: 0 0 5px 0;">玩家名稱</h2>
          <div class="score-box" id="score-box-container">
            <div class="score-item">🌟 總獲得: <span class="score-value" id="score-s1">0</span></div>
            <div class="score-item">🔥 幻彩水晶: <span class="score-value" id="score-s2">0</span></div>
            <div class="score-item" id="score-s3-container">💎 點數3: <span class="score-value" id="score-s3">0</span></div>
          </div>
        </div>
        <div style="display: flex; gap: 10px; flex-direction: column;">
          <button class="btn-action" onclick="showHistory()" style="background-color: #5865F2;">📜 我的紀錄</button>
          <button class="btn-action" onclick="logout()" style="background-color: #ED4245;">登出帳號</button>
        </div>
      </div>

      <div class="shop-layout">
        <div class="sidebar" id="category-sidebar"></div>
        
        <div class="main-area">
          <div class="controls-container">
            <h3 style="margin: 0;">🛒 兌換商店</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
              <select id="sort-items" class="shop-input" onchange="renderShop()">
                <option value="default">預設排序</option>
                <option value="avail-first">✅ 可用優先</option>
                <option value="price-low">💰 價格 低 ~ 高</option>
                <option value="price-high">💰 價格 高 ~ 低</option>
              </select>
              <button id="btn-refresh" class="btn-action" onclick="refreshData()">🔄 重整庫存</button>
            </div>
          </div>
          <div id="shop-list" class="shop-list-container"></div>
        </div>
      </div>
    </div>

    <div class="version-tag">系統版本：v3.1.2 (終極盲盒與餘額紀錄強化版)</div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzBie8G4KRouJ3nQMsGccDxI0pPlm-kh3Sg8GsURORsRHFCyJgtKV5mJ4A7wKWEo8W1wQ/exec';
  
    let currentUser = null; 
    let currentShopItems = []; 
    let currentCategory = 'all'; 
    let CATEGORY_ORDER = []; 
    
    let countdownInterval = null;

    window.onload = () => {
      // 🌟 攔截分享網址的參數並記憶 (商品分享 & 分類分享)
      const urlParams = new URLSearchParams(window.location.search);
      const shareTarget = urlParams.get('item');
      const shareCategory = urlParams.get('category'); 

      let shouldCleanUrl = false;
      
      if (shareTarget) {
        localStorage.setItem('shared_item_target', shareTarget);
        shouldCleanUrl = true;
      }
      
      if (shareCategory) {
        localStorage.setItem('shared_category_target', shareCategory);
        shouldCleanUrl = true;
      }

      if (shouldCleanUrl) {
        window.history.replaceState({}, document.title, window.location.pathname); // 清除網址上的參數保持乾淨
      }

      const hashString = window.location.hash.slice(1);
      let accessToken = null; let tokenType = null;
      if (hashString) {
        const fragment = new URLSearchParams(hashString);
        accessToken = fragment.get('access_token'); tokenType = fragment.get('token_type');
        if (accessToken) {
          localStorage.setItem('dc_access_token', accessToken);
          localStorage.setItem('dc_token_type', tokenType);
          window.history.replaceState(null, null, window.location.pathname);
        }
      } else {
        accessToken = localStorage.getItem('dc_access_token');
        tokenType = localStorage.getItem('dc_token_type');
      }

      if (accessToken) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        fetch('https://discord.com/api/users/@me', { headers: { authorization: `${tokenType} ${accessToken}` } })
        .then(res => { if (!res.ok) throw new Error('登入過期'); return res.json(); })
        .then(user => {
          currentUser = user; 
          document.getElementById('user-name').innerText = user.global_name || user.username;
          document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
          fetchScoresAndShop(user.id);
        }).catch(err => {
          localStorage.removeItem('dc_access_token'); localStorage.removeItem('dc_token_type');
          document.getElementById('loading').style.display = 'none'; document.getElementById('login-section').style.display = 'block';
        });
      }
    };

    function refreshData() {
      if(!currentUser) return;
      const refreshBtn = document.getElementById('btn-refresh');
      refreshBtn.innerText = "⏳..."; refreshBtn.disabled = true;
      fetchScoresAndShop(currentUser.id, () => { refreshBtn.innerText = "🔄 重整庫存"; refreshBtn.disabled = false; });
    }

    function selectCategory(cat) {
      currentCategory = cat;
      renderSidebar();
      renderShop();   
    }

    function renderSidebar() {
      let categories = Array.from(new Set(currentShopItems.map(item => item.category)));
      categories.sort((a, b) => {
        let idxA = CATEGORY_ORDER.indexOf(a);
        let idxB = CATEGORY_ORDER.indexOf(b);
        if (idxA === -1) idxA = 999;
        if (idxB === -1) idxB = 999;
        return idxA - idxB;
      });
      const sidebar = document.getElementById('category-sidebar');
      
      // 🌟 所有商品 (加入分享按鈕)
      let html = `<div class="cat-item ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCategory('all')">
                    <span>📁 所有商品</span>
                    <span class="btn-share-cat" onclick="shareCategory(event, 'all')" title="分享此分類">🔗</span>
                  </div>`;
                  
      // 🌟 各個子分類 (加入分享按鈕)
      categories.forEach(cat => {
        const count = currentShopItems.filter(i => i.category === cat).length;
        html += `<div class="cat-item ${currentCategory === cat ? 'active' : ''}" onclick="selectCategory('${cat}')">
                   <span>🏷️ ${cat}</span>
                   <div style="display:flex; align-items:center; gap:10px;">
                     <span style="font-size:12px; opacity:0.7;">${count}</span>
                     <span class="btn-share-cat" onclick="shareCategory(event, '${cat}')" title="分享此分類">🔗</span>
                   </div>
                 </div>`;
      });
      sidebar.innerHTML = html;
    }

    // 🌟 控制圖片放大縮小
    function openImage(url) {
      const fullSizeImage = document.getElementById('full-size-image');
      fullSizeImage.src = url;
      document.getElementById('image-overlay').style.display = 'flex';
    }

    function closeImage() {
      document.getElementById('image-overlay').style.display = 'none';
      document.getElementById('full-size-image').src = '';
    }

    function showHistory() {
      if(!currentUser) return;
      const modal = document.getElementById('history-modal');
      const container = document.getElementById('history-list-container');
      modal.style.display = 'flex';
      container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">讀取資料中...</p>';
      
      fetch(`${GAS_API_URL}?action=getHistory&discordId=${currentUser.id}`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success" && data.history.length > 0) {
          container.innerHTML = "";
          data.history.forEach(record => {
            let keyHtml = "";
            if(record.keys && record.keys !== "無") {
              let safeKeys = String(record.keys); 
              keyHtml = `<div class="history-keys">🎁 序號：<br>${safeKeys.split(', ').join('<br>')}</div>`;
            }

            // 🌟 處理抽中物品顯示
            let drawnHtml = "";
            if(record.drawn) {
              drawnHtml = `<div style="margin-top: 8px; padding: 6px; background-color: #2F3136; border-radius: 4px; font-size: 13px; color: #FEE75C; border: 1px solid #40444B;">🎉 獲得：${record.drawn}</div>`;
            }

            // 🌟 處理餘額變化顯示
            let balanceHtml = "";
            if(record.beforeBal !== null && record.afterBal !== null) {
              balanceHtml = `<div style="margin-top: 6px; font-size: 12px; color: #99AAB5;">💰 餘額變化：${record.beforeBal} ➔ <span style="color: #FFF; font-weight: bold;">${record.afterBal}</span></div>`;
            }

            let displayName = record.itemName.replace('[持有]', '').replace('[隱藏]', '').trim();
            
            container.innerHTML += `
              <div class="history-card">
                <div class="history-time">${record.time}</div>
                <div class="history-name">${displayName} <span class="history-qty">x ${record.qty}</span></div>
                ${balanceHtml}
                ${drawnHtml}
                ${keyHtml}
              </div>`;
          });
        } else { container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">目前尚無兌換紀錄</p>'; }
      }).catch(err => {
        console.error("歷史紀錄讀取錯誤:", err);
        container.innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗，請稍後再試</p>';
      });
    }

    function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }

function fetchScoresAndShop(discordId, callback = null) {
      document.getElementById('loading-text').innerText = "⏳ 載入分數與商店目錄...";
      let p1 = fetch(`${GAS_API_URL}?action=getScores&discordId=${discordId}`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          document.getElementById('score-s1').innerText = data.s1;
          document.getElementById('score-s2').innerText = data.s2;
          document.getElementById('score-s3').innerText = data.s3;
          if (parseInt(data.s3) === 0) document.getElementById('score-s3-container').style.display = 'none';
          else document.getElementById('score-s3-container').style.display = 'flex';

          document.querySelectorAll('.dynamic-score-item').forEach(e => e.remove());
          if(data.customVars && data.customVars.length > 0) {
            const container = document.getElementById('score-box-container');
            data.customVars.forEach(v => {
              container.insertAdjacentHTML('beforeend', `<div class="score-item dynamic-score-item">💠 ${v.display}: <span class="dynamic-score-value">${v.value}</span></div>`);
            });
          }
        }
      });
      let p2 = fetch(`${GAS_API_URL}?action=getShop&discordId=${discordId}`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          
          // ==========================================
          // 🌟 管理員設定區塊
          // ==========================================
          const ADMIN_IDS = ['176681551189377024']; 
          const isAdmin = ADMIN_IDS.includes(discordId);

          // 🌟 判斷：如果是管理員就保留，如果不是管理員就過濾掉 [隱藏] 商品
          currentShopItems = data.items.filter(item => {
            if (item.name.includes('[隱藏]')) return isAdmin;
            return true;
          });

          if (data.categoryOrder && data.categoryOrder.length > 0) {
            CATEGORY_ORDER = data.categoryOrder;
          }

          // 🌟 【新增】檢查是否有待跳轉的分享分類
          const targetCategory = localStorage.getItem('shared_category_target');
          if (targetCategory) {
            const allCats = Array.from(new Set(currentShopItems.map(item => item.category)));
            if (allCats.includes(targetCategory) || targetCategory === 'all') {
              currentCategory = targetCategory;
            }
            localStorage.removeItem('shared_category_target');
          }

          renderSidebar(); 
          renderShop();    
          document.getElementById('loading').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
        }
      });
    Promise.all([p1, p2]).then(() => { 
        if(callback) callback(); 
        
        // 🌟 檢查是否有待跳轉的分享商品
        const targetId = localStorage.getItem('shared_item_target');
        if (targetId) {
          setTimeout(() => {
            const el = document.getElementById('card-item-' + targetId);
            if (el) {
              // 平滑滾動到該商品
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              // 加入發光特效吸引目光
              el.style.transition = "box-shadow 0.3s ease-in-out";
              el.style.boxShadow = "0 0 20px 6px #5865F2";
              setTimeout(() => { el.style.boxShadow = "none"; }, 3000); // 3秒後移除發光
            }
            localStorage.removeItem('shared_item_target'); // 執行完就清掉記憶
          }, 600); // 等待畫面渲染一下再滑動
        }
      });
    }
    function renderShop() {
      const container = document.getElementById('shop-list');
      const sortType = document.getElementById('sort-items').value;
      let displayItems = [...currentShopItems];

      if (currentCategory !== 'all') displayItems = displayItems.filter(item => item.category === currentCategory);
      if (sortType === 'avail-first') {
        displayItems.sort((a, b) => {
          if (a.state === 'available' && b.state !== 'available') return -1;
          if (a.state !== 'available' && b.state === 'available') return 1;
          return 0;
        });
      } else if (sortType === 'price-low') displayItems.sort((a, b) => a.price - b.price);
      else if (sortType === 'price-high') displayItems.sort((a, b) => b.price - a.price);

      container.innerHTML = "";
      if (displayItems.length === 0) {
        container.innerHTML = "<div style='color:#B9BBBE; padding: 20px;'>此分類目前無商品</div>";
        return;
      }

      displayItems.forEach((item) => {
        const isAvail = item.state === "available";
        const badgeClass = isAvail ? "badge-avail" : "badge-unavail";
        const safeId = "item-" + item.id; 
        
        let limitsHtml = `<div class="limit-tags">`;
        if (item.limits.remainGD !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服今日: ${item.limits.remainGD}</span>`;
        if (item.limits.remainGW !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服本周: ${item.limits.remainGW}</span>`;
        if (item.limits.remainGM !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服本月: ${item.limits.remainGM}</span>`;
        if (item.limits.remainPD !== null) limitsHtml += `<span class="limit-tag tag-personal">👤 個人今日: ${item.limits.remainPD}</span>`;
        if (item.limits.remainPW !== null) limitsHtml += `<span class="limit-tag tag-personal">👤 個人本周: ${item.limits.remainPW}</span>`;
        if (item.limits.remainPM !== null) limitsHtml += `<span class="limit-tag tag-personal">👤 個人本月: ${item.limits.remainPM}</span>`;
        if (item.limits.remainPT !== null) limitsHtml += `<span class="limit-tag tag-total">👑 終身限購: ${item.limits.remainPT}</span>`;
        if (item.requiredRoleNames && item.requiredRoleNames.length > 0) {
          const roleTagClass = item.hasRolePermission ? 'tag-role-ok' : 'tag-role-locked';
          const roleIcon = item.hasRolePermission ? '✅' : '🔒';
          limitsHtml += `<span class="limit-tag ${roleTagClass}">${roleIcon} 限定身分組: ${item.requiredRoleNames.join('、')}</span>`;
        }
        limitsHtml += `</div>`;
        if (limitsHtml === `<div class="limit-tags"></div>`) limitsHtml = "";
        
        let isHold = item.name.includes('[持有]');
        let displayName = item.name.replace('[持有]', '').trim();
        // 🌟 更新圖片 HTML 讓它帶有 onclick 事件以開啟預覽
        let imageHtml = item.imageUrl ? `<img src="${item.imageUrl}" class="item-image" alt="商品圖片" title="點擊放大觀看" onclick="openImage('${item.imageUrl}')">` : '';
        
        // 🌟 自動檢查備註中的網址並替換成 a 標籤 (超連結)
        let formattedRemark = item.remark;
        if (formattedRemark) {
            formattedRemark = formattedRemark.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()">$1</a>');
        }
        let remarkHtml = formattedRemark ? `<div class="item-remark">📝 ${formattedRemark}</div>` : '';

        let gachaHtml = "";
        if (item.gachaPool && item.gachaPool.length > 0) {
            gachaHtml = `<div style="margin-top: 10px; font-size: 13px; background-color: #202225; padding: 10px; border-radius: 6px; border: 1px solid #40444B;">
                <div style="color: #FEE75C; font-weight: bold; margin-bottom: 6px; border-bottom: 1px dashed #4F545C; padding-bottom: 4px;">🎁 內容物一覽：</div>`;
            item.gachaPool.forEach(g => {
                let detail = [];
                if (g.prob !== null) detail.push(`${g.prob}%`);
                if (g.stock !== null) {
                    let stockText = g.stock <= 0 ? `<span style="color:#ED4245; font-weight:bold;">(已抽完)</span>` : `${g.stock} 份`;
                    detail.push(stockText);
                }
                if (detail.length === 0) detail.push("保底/無限"); 
                
                let color = g.stock !== null && g.stock <= 0 ? '#72767D' : '#FFF';
                let decoration = g.stock !== null && g.stock <= 0 ? 'line-through' : 'none';
                let displayQty = (g.dispName !== g.varName || g.qty === 1) ? "" : ` x ${g.qty}`;
                
                gachaHtml += `<div style="display: flex; justify-content: space-between; color: ${color}; text-decoration: ${decoration}; margin-bottom: 4px;">
                    <span>- ${g.dispName}${displayQty}</span>
                    <span style="color: #99AAB5;">${detail.join(" / ")}</span>
                </div>`;
            });
            gachaHtml += `</div>`;
        }

        let timeHtml = "";
        if (item.startDate || item.endDate) {
          timeHtml += `<div class="item-time-info">`;
          if (item.startDate) {
            let sDate = new Date(item.startDate).toLocaleString('zh-TW', { hour12: false });
            timeHtml += `<div style="margin-bottom: 4px;">🟢 開始：${sDate}</div>`;
          }
          if (item.endDate) {
            let eDate = new Date(item.endDate).toLocaleString('zh-TW', { hour12: false });
            timeHtml += `<div>🔴 結束：${eDate}</div>`;
          }
          timeHtml += `<div style="margin-top: 6px; border-top: 1px dashed #4F545C; padding-top: 6px;">⏳ 狀態：<span id="countdown-${safeId}" class="countdown-timer" data-id="${item.id}" data-start="${item.startDate || ''}" data-end="${item.endDate || ''}">計算中...</span></div>`;
          timeHtml += `</div>`;
        }

        let actionHtml = '';
        if (isAvail) {
          let maxQty = item.limits.effectiveStock !== "無限" ? item.limits.effectiveStock : 999;
          actionHtml = `
            <div class="item-actions">
              <input type="number" id="qty-${safeId}" class="qty-input" value="1" min="1" max="${maxQty}">
              <button id="btn-${safeId}" class="btn btn-buy" onclick="buyItem('${item.id}', '${item.name}', '${safeId}', ${maxQty}, '${item.displayCurrency}')">兌換</button>
            </div>
          `;
        } else {
          actionHtml = `<div class="item-actions"><button class="btn btn-buy" disabled>無法兌換</button></div>`;
        }

        const html = `
          <div class="shop-item-card ${!isAvail ? 'disabled' : ''}" id="card-${safeId}">
            ${imageHtml}
            <div class="item-header">
              <div style="display: flex; align-items: center;">
                <span class="item-name">${displayName}</span>
                <span class="btn-share" onclick="shareItem('${item.id}', '${displayName}')" title="複製分享連結">🔗</span>
              </div>
              <span class="item-badge ${badgeClass}">${item.stateMsg}</span>
            </div>
            ${remarkHtml}
            ${timeHtml} 
            <div class="item-info">
              ${isHold ? `✨ 條件：<span class="item-price" style="color:#58FF9C;">需持有 ${item.price} ${item.displayCurrency}</span><br>` : 
                `💰 價格：<span class="item-price">${item.price} ${item.displayCurrency}</span><br>`}
              📦 庫存：${item.limits.baseStock}
              ${limitsHtml}
              ${gachaHtml}
            </div>
            ${actionHtml}
          </div>
        `;
        container.innerHTML += html;
      });
      
      startCountdowns();
    }

    function buyItem(itemId, itemName, safeId, maxQty, currencyName) {
      if (!currentUser) return;
      const qtyInput = document.getElementById(`qty-${safeId}`);
      const qty = parseInt(qtyInput.value);
      
      if (qty < 1) { alert("數量必須大於 0！"); return; }
      if (qty > maxQty) { alert(`已超過限購數量！您目前最多只能買 ${maxQty} 個。`); return; }
      
      let isHold = itemName.includes('[持有]');
      let displayItemName = itemName.replace('[持有]', '').trim();

      let confirmMsg = isHold 
        ? `🎁 此為條件福利！\n\n系統僅會驗證您是否持有足夠的【${currencyName}】作為領取條件，實際扣款為 0。\n確定要領取 ${qty} 個 ${displayItemName} 嗎？` 
        : `確定要花費 ${currencyName} 兌換 ${qty} 個 ${displayItemName} 嗎？`;
      if (!confirm(confirmMsg)) return;

      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading-text').innerText = "⏳ 正在處理訂單...";
      fetch(`${GAS_API_URL}?action=buy&discordId=${currentUser.id}&itemId=${itemId}&itemName=${encodeURIComponent(itemName)}&qty=${qty}`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          let successMsg = "✅ 兌換處理完成！";
          if (data.displayExt) {
            successMsg += `\n\n🎉 恭喜您開出了：\n【 ${data.displayExt} 】！`;
          } else if (data.rewardVar && data.totalReward > 0) {
            successMsg += `\n\n🎉 恭喜您獲得了：【 ${data.totalReward} 點 ${data.rewardVar} 】！`;
          }
          if (data.keys && data.keys.length > 0) {
            successMsg += "\n\n🎁 您獲得的專屬序號：\n" + data.keys.join("\n") + "\n\n(可至「紀錄」隨時查詢)";
          }
          alert(successMsg);
          fetchScoresAndShop(currentUser.id); 
        } else {
          alert("❌ 兌換失敗：" + data.message);
          if (data.message.includes("庫存") || data.message.includes("限購") || data.message.includes("售完") || data.message.includes("上限") || data.message.includes("條件")) {
            document.getElementById('loading-text').innerText = "🔄 正在同步最新資料...";
            fetchScoresAndShop(currentUser.id);
          } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
          }
        }
      })
      .catch(err => {
        alert("網路錯誤，請稍後再試！");
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      });
    }

    function logout() {
      localStorage.removeItem('dc_access_token'); localStorage.removeItem('dc_token_type');
      window.location.href = "https://jay870122.github.io/DCGI/";
    }

    function startCountdowns() {
      if (countdownInterval) clearInterval(countdownInterval);
      
      countdownInterval = setInterval(() => {
        const timers = document.querySelectorAll('.countdown-timer');
        if (timers.length === 0) return;
        
        let needsReRender = false;
        const now = new Date().getTime();
        
        timers.forEach(timer => {
          const itemId = timer.getAttribute('data-id');
          const startStr = timer.getAttribute('data-start');
          const endStr = timer.getAttribute('data-end');
          
          const start = startStr ? parseInt(startStr) : null;
          const end = endStr ? parseInt(endStr) : null;
          
          let itemIndex = currentShopItems.findIndex(i => i.id === itemId);
          if(itemIndex === -1) return;
          let item = currentShopItems[itemIndex];
          
          if (item.state === 'sold_out') {
            timer.innerText = "已售完 / 達到上限";
            timer.style.color = "#72767D";
            return;
          }
          
          if (start && now < start) {
            let diff = start - now;
            timer.innerText = `距離開始剩餘：${formatTimeDiff(diff)}`;
            timer.style.color = "#FEE75C"; 
          } else if (end && now < end) {
            if (item.state === 'not_started') {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true; 
            }
            let diff = end - now;
            timer.innerText = `距離結束剩餘：${formatTimeDiff(diff)}`;
            timer.style.color = "#58FF9C"; 
          } else if (end && now >= end) {
            if (item.state === 'available') {
              item.state = 'ended';
              item.stateMsg = '活動結束';
              needsReRender = true;
            }
            timer.innerText = "活動已結束";
            timer.style.color = "#ED4245"; 
          } else {
            if (item.state === 'not_started') {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true;
            }
            timer.innerText = "無限期兌換中";
            timer.style.color = "#58FF9C";
          }
        });
        
        if (needsReRender) {
          renderShop();
        }
      }, 1000);
    }

    function formatTimeDiff(ms) {
      let seconds = Math.floor((ms / 1000) % 60);
      let minutes = Math.floor((ms / 1000 / 60) % 60);
      let hours = Math.floor((ms / 1000 / 60 / 60) % 24);
      let days = Math.floor(ms / 1000 / 60 / 60 / 24);
      
      let str = "";
      if (days > 0) str += `${days}天 `;
      str += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      return str;
    }
    
    // 🌟 複製商品專屬網址
    function shareItem(itemId, itemName) {
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?item=${itemId}`;
      
      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);
      
      alert(`🔗 已複製商品【${itemName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }

    // 🌟 複製分類專屬網址 (新增)
    function shareCategory(event, catName) {
      event.stopPropagation(); // 避免觸發上層的 onclick 切換分類
      
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?category=${encodeURIComponent(catName)}`;
      
      const displayCatName = catName === 'all' ? '所有商品' : catName;

      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製分類【${displayCatName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }
  </script>
