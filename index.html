<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garbled 幻彩水晶商店</title>
  <style>
    /* 🌟 整體版面與寬度設定 */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           background-color: #2C2F33; color: white; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background-color: #23272A; padding: 30px; border-radius: 12px; width: 100%; max-width: 1100px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); position: relative; }
    
    /* 🌟 按鈕樣式 */
    .btn { color: white;
           padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; width: 100%; display: inline-block;
           box-sizing: border-box; text-decoration: none; text-align: center;}
    .btn-login { background-color: #5865F2; margin-top: 10px; max-width: 300px; }
    .btn-login:hover { background-color: #4752C4; }
    .btn-logout { background-color: #ED4245; margin-top: 20px; max-width: 200px;}
    .btn-logout:hover { background-color: #C13537; }
    .btn-action { background-color: #4F545C; color: white;
                  padding: 6px 12px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.3s; }
    .btn-action:hover { background-color: #686D73; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 🌟 玩家頂部橫向資訊區塊 */
    .user-header-section { display: flex;
                           align-items: center; gap: 20px; margin-bottom: 20px; background-color: #2C2F33; padding: 20px; border-radius: 8px; flex-wrap: wrap; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #5865F2; flex-shrink: 0;}
    .user-info { flex-grow: 1; }
    .score-box { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 8px; }
    .score-item { font-size: 15px; background: #202225; padding: 6px 12px; border-radius: 6px;
                  border: 1px solid #4F545C; display: flex; align-items: center; gap: 6px;}
    .score-value { font-weight: bold; color: #58FF9C; }
    .dynamic-score-value { font-weight: bold; color: #FEE75C; }

    /* 🌟 玩家持有身分組徽章 */
    .role-box { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .role-badge { font-size: 13px; background: #5865F2; color: #FFF; padding: 5px 10px; border-radius: 999px; font-weight: bold; } 
    
    /* 🌟 側邊欄與網格商品區佈局 */
    .shop-layout { display: flex; gap: 20px; align-items: flex-start; }
    .sidebar { width: 220px; flex-shrink: 0; background-color: #2C2F33; border-radius: 8px; padding: 15px;
               display: flex; flex-direction: column; gap: 5px; position: sticky; top: 20px; }
    .cat-item { padding: 12px 15px;
                border-radius: 6px; cursor: pointer; color: #B9BBBE; font-size: 15px; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .cat-item:hover { background-color: #40444B; color: white; }
    .cat-item.active { background-color: #5865F2; color: white; font-weight: bold; }

    /* 🌟 分類分享按鈕 */
    .btn-share-cat {
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.2s;
      user-select: none;
      font-size: 14px;
    }
    .btn-share-cat:hover {
      opacity: 1;
      transform: scale(1.2);
    }
    
    .main-area { flex-grow: 1; width: 100%; min-width: 0; }
    .controls-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background-color: #2C2F33; padding: 10px 15px; border-radius: 8px; }
    .shop-input { padding: 8px 12px; border-radius: 5px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 14px; outline: none; }
    
    /* 🌟 商品網格卡片 */
    .shop-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
    .shop-item-card { background-color: #2F3136; border: 1px solid #4F545C; border-radius: 8px;
                      padding: 15px; display: flex; flex-direction: column; position: relative; overflow: hidden; height: 100%; box-sizing: border-box; }
    .shop-item-card.disabled { opacity: 0.6; }
    
    /* 🌟 圖片樣式更新：加入游標與 hover 放大提示效果 */
    .item-image { 
        width: 100%; height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; border: 1px solid #40444B; 
        cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .item-image:hover { transform: scale(1.03); border-color: #5865F2; }

    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px solid #40444B; padding-bottom: 8px; gap: 10px;}
    .item-name { font-size: 18px; font-weight: bold; color: #FFF; line-height: 1.3;}
    .btn-share { margin-left: 8px; cursor: pointer; font-size: 16px; opacity: 0.6; transition: 0.2s; user-select: none; }
    .btn-share:hover { opacity: 1; transform: scale(1.2); }
    .item-badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: bold; flex-shrink: 0; white-space: nowrap; }
    .badge-avail { background-color: #43B581; color: white; }
    .badge-unavail { background-color: #ED4245; color: white; }
    .item-remark { font-size: 13px; color: #99AAB5; margin-bottom: 12px; padding: 8px; background-color: #202225; border-left: 3px solid #5865F2; border-radius: 4px; line-height: 1.4; white-space: pre-wrap; }
    
    /* 🌟 備註內的超連結樣式 */
    .item-remark a { color: #00AFF4; text-decoration: none; word-break: break-all; }
    .item-remark a:hover { text-decoration: underline; }

    /* 🌟 商品倒數計時區塊樣式 */
    .item-time-info { font-size: 13px; color: #99AAB5; margin-bottom: 12px; padding: 10px; background-color: #202225; border-radius: 6px; border: 1px solid #40444B; line-height: 1.5; }
    .countdown-timer { font-weight: bold; font-size: 14px; white-space: nowrap; }

    .item-info { font-size: 14px; color: #B9BBBE; margin-bottom: 15px; line-height: 1.6; flex-grow: 1; } 
    .item-price { color: #FEE75C; font-weight: bold; font-size: 16px; }
    
    .limit-tags { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .limit-tag { font-size: 12px; padding: 4px 8px; border-radius: 4px; display: inline-block; width: fit-content; }
    .tag-global { background-color: #4F545C; color: #FFF; }
    .tag-personal { background-color: #5865F2; color: #FFF; }
    .tag-total { background-color: #FEE75C; color: #000; font-weight: bold; }
    .tag-role-ok { background-color: #9B59B6; color: #FFF; }
    .tag-role-locked { background-color: #74398A; color: #E0C3F1; }

    .item-actions { display: flex; gap: 10px; align-items: center; margin-top: auto; }
    .qty-input { width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 16px; text-align: center; outline: none; }
    .btn-buy { background-color: #43B581; padding: 8px 16px; width: auto; flex-grow: 1; }
    .btn-buy:hover { background-color: #3CA374; }
    .btn-buy:disabled { background-color: #4F545C; cursor: not-allowed; }

    /* 🌟 替代貨幣折抵區塊 */
    .alt-currency-box { background-color: #202225; border: 1px solid #40444B; border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 13px; }
    .alt-toggle-label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #FEE75C; }
    .alt-toggle-label input { cursor: pointer; }
    .alt-mode-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #4F545C; color: #B9BBBE; font-size: 12px; }
    .alt-mode-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .alt-mode-row input[type="number"] { width: 80px; padding: 4px 6px; border-radius: 4px; border: 1px solid #4F545C; background-color: #2C2F33; color: white; font-size: 13px; }
    .alt-preview { margin-top: 6px; color: #58FF9C; font-weight: bold; font-size: 12px; min-height: 14px; }
    .item-lock-hint { background-color: #2C2530; border: 1px solid #9B59B6; border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; font-size: 12px; color: #C99EE0; }
    .category-lock-screen { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #B9BBBE; }
    .category-lock-icon { font-size: 48px; margin-bottom: 12px; }
    .category-lock-title { font-size: 16px; margin-bottom: 20px; color: #FFF; }
    .category-lock-banner { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      background-color: #2C2530; border: 1px solid #9B59B6; border-radius: 8px; padding: 12px 16px; color: #C99EE0; font-size: 14px; margin-bottom: 4px; }
    .category-blur-content { display: contents; }
    .category-blur-content .shop-item-card { filter: blur(5px); pointer-events: none; user-select: none; }
    .item-blur-card { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px 15px; }
    .item-blur-content { margin-bottom: 16px; }
    .item-blur-icon { font-size: 36px; margin-bottom: 8px; }
    .item-blur-name { font-size: 16px; font-weight: bold; color: #B9BBBE; letter-spacing: 2px; }
    .item-blur-price { font-size: 13px; color: #72767D; margin-top: 4px; }

    /* 手機版適應：側邊欄變為上方橫向捲動 */
    @media (max-width: 768px) {
      .shop-layout { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; overflow-x: auto; position: static; white-space: nowrap; padding: 10px; box-sizing: border-box; }
      .cat-item { flex-shrink: 0; }
    }

    /* 🌟 彈出視窗 (歷史紀錄) */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
    .modal-content { background: #2F3136; border-radius: 12px; width: 100%; max-width: 500px; max-height: 80vh; text-align: left; position: relative; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { flex-shrink: 0; padding: 25px 45px 15px 25px; border-bottom: 1px solid #4F545C; position: relative; }
    .modal-body { overflow-y: auto; padding: 15px 25px 25px 25px; }
    .modal-close { position: absolute; top: 15px; right: 20px; color: #B9BBBE; font-size: 24px; font-weight: bold; cursor: pointer; }
    .modal-close:hover { color: white; }
    .history-card { background: #202225; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #40444B;}
    .history-time { font-size: 12px; color: #72767D; margin-bottom: 5px; }
    .history-name { font-size: 16px; font-weight: bold; color: #FFF; }
    .history-qty { color: #A6D189; }
    .history-keys { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #4F545C; color: #FEE75C; font-family: monospace; font-size: 14px; word-break: break-all;}

    /* 🌟 拍賣分類標籤列 */
    .auction-category-tabs { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0 4px 0; border-bottom: 1px solid #4F545C; margin-bottom: 12px; }
    .auction-cat-tab { padding: 5px 14px; border-radius: 999px; border: 1px solid #4F545C; background: #2F3136; color: #B9BBBE; cursor: pointer; font-size: 13px; font-weight: bold; transition: background 0.15s; }
    .auction-cat-tab:hover { background: #40444B; color: #FFF; }
    .auction-cat-tab.active { background: #F0B232; color: #1F2124; border-color: #F0B232; }
    .auction-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .auction-card { background-color: #2F3136; border: 1px solid #4F545C; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
    .auction-card.ended { opacity: 0.7; }
    .auction-image { width: 100%; height: 130px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; border: 1px solid #40444B; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease; }
    .auction-image:hover { transform: scale(1.03); border-color: #5865F2; }
    .auction-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
    .auction-name { font-size: 16px; font-weight: bold; color: #FFF; }
    .auction-type-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
    .auction-type-public { background-color: #43B581; color: #FFF; }
    .auction-type-sealed { background-color: #9B59B6; color: #FFF; }
    .auction-type-sealed-low { background-color: #E67E22; color: #FFF; }
    .auction-info { font-size: 13px; color: #B9BBBE; margin-bottom: 10px; line-height: 1.6; }
    .auction-bid-value { color: #FEE75C; font-weight: bold; }
    .auction-status { font-size: 13px; padding: 8px; border-radius: 6px; margin-bottom: 10px; text-align: center; font-weight: bold; }
    .auction-status.win { background-color: #1F4D2C; color: #58FF9C; }
    .auction-status.lose { background-color: #4D1F1F; color: #ED4245; }
    .auction-status.leading { background-color: #1F3A4D; color: #00AFF4; }
    .auction-bid-row { display: flex; gap: 8px; margin-top: auto; }
    .auction-bid-input { flex-grow: 1; padding: 8px; border-radius: 6px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 14px; }
    .auction-bid-btn { background-color: #F0B232; color: #1F2124; font-weight: bold; padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .auction-bid-btn:hover { background-color: #D69A1F; }
    .auction-bid-btn:disabled { background-color: #4F545C; color: #B9BBBE; cursor: not-allowed; }
    .auction-extend-hint { font-size: 12px; color: #FEE75C; margin: 4px 0 8px 0; }
    .auction-extend-flash { animation: extendFlash 2s ease-out; }
    @keyframes extendFlash {
      0% { box-shadow: 0 0 0 3px rgba(254, 231, 92, 0.9); }
      100% { box-shadow: 0 0 0 0px rgba(254, 231, 92, 0); }
    }

    /* 🌟 圖片放大彈出視窗 */
    .image-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
      z-index: 2000; padding: 20px; box-sizing: border-box; cursor: pointer;
    }
    .image-overlay img {
      max-width: 90vw; max-height: 90vh; border-radius: 8px; border: 2px solid #5865F2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8); object-fit: contain; cursor: default;
    }
    .image-close {
      position: absolute; top: 20px; right: 30px; color: #FFF; font-size: 40px; font-weight: bold; cursor: pointer; transition: color 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .image-close:hover { color: #ED4245; }

    .version-tag { font-size: 12px; color: #72767D; margin-top: 20px; text-align: center; }
    #dashboard, #loading { display: none; }
  </style>
</head>
<body>

  <!-- 🌟 歷史紀錄模態視窗 -->
  <div id="history-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-close" onclick="closeHistory()">×</span>
        <h2 style="margin:0;">📜 兌換與序號紀錄</h2>
      </div>
      <div class="modal-body">
        <div id="history-list-container">
          <p style="text-align:center; color:#B9BBBE;">讀取中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 🌟 拍賣會彈窗 -->
  <div id="auction-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <span class="modal-close" onclick="closeAuctions()">×</span>
        <h2 style="margin:0;">🔨 拍賣會</h2>
        <div class="score-box" id="auction-currency-box" style="margin-top: 10px; gap: 8px;"></div>
        <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
          <button class="btn-action" style="padding:5px 12px; font-size:12px;" onclick="loadAuctions()">🔄 重新整理</button>
          <span id="auction-last-refresh" style="font-size:11px; color:#B9BBBE;"></span>
        </div>
      </div>
      <div class="modal-body">
        <div id="auction-category-tabs" class="auction-category-tabs" style="display:none;"></div>
        <div id="auction-list-container" class="auction-list-container">
          <p style="text-align:center; color:#B9BBBE;">讀取中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 🌟 圖片放大模態視窗 -->
  <div id="image-overlay" class="image-overlay" onclick="closeImage()">
    <span class="image-close">×</span>
    <img id="full-size-image" src="" alt="Full Size" onclick="event.stopPropagation()">
  </div>

  <div class="card">
    <div id="login-section" style="text-align: center;">
      <h1 style="margin-top:0;">Garbled 幻彩水晶商店</h1>
      <p style="color: #B9BBBE;">請綁定您的 Discord 帳號以查看資料與兌換</p>
      <a href="https://discord.com/api/oauth2/authorize?client_id=1365601646448607335&redirect_uri=https%3A%2F%2Fjay870122.github.io%2FDCGI%2F&response_type=token&scope=identify" class="btn btn-login">🎮 使用 Discord 登入</a>
    </div>

    <div id="loading" style="text-align: center;">
      <p id="loading-text" style="font-size: 18px;">⏳ 正在連線至資料庫...</p>
    </div>

    <div id="dashboard">
      
      <div class="user-header-section">
        <img id="user-avatar" class="avatar" src="" alt="Avatar">
        <div class="user-info">
          <h2 id="user-name" style="margin: 0 0 5px 0;">玩家名稱</h2>
          <div class="score-box" id="score-box-container">
            <div class="score-item">🌟 總獲得: <span class="score-value" id="score-s1">0</span></div>
            <div class="score-item">🔥 幻彩水晶: <span class="score-value" id="score-s2">0</span></div>
            <div class="score-item" id="score-s3-container">💎 點數3: <span class="score-value" id="score-s3">0</span></div>
          </div>
          <div class="role-box" id="role-box-container"></div>
        </div>
        <div style="display: flex; gap: 10px; flex-direction: column;">
          <button class="btn-action" onclick="showAuctions()" style="background-color: #F0B232;">🔨 拍賣會</button>
          <button class="btn-action" onclick="showHistory()" style="background-color: #5865F2;">📜 我的紀錄</button>
          <button class="btn-action" onclick="logout()" style="background-color: #ED4245;">登出帳號</button>
        </div>
      </div>

      <div class="shop-layout">
        <div class="sidebar" id="category-sidebar"></div>
        
        <div class="main-area">
          <div class="controls-container">
            <h3 style="margin: 0;">🛒 兌換商店</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
              <select id="sort-items" class="shop-input" onchange="renderShop()">
                <option value="avail-first">✅ 可用優先</option>
                <option value="default">預設排序</option>
                <option value="price-low">💰 價格 低 ~ 高</option>
                <option value="price-high">💰 價格 高 ~ 低</option>
              </select>
              <button id="btn-refresh" class="btn-action" onclick="refreshData()">🔄 重整庫存</button>
            </div>
          </div>
          <div id="shop-list" class="shop-list-container"></div>
        </div>
      </div>
    </div>

    <div class="version-tag">系統版本：v3.16.1 (拍賣分類排序支援分類排序表B欄)</div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzBie8G4KRouJ3nQMsGccDxI0pPlm-kh3Sg8GsURORsRHFCyJgtKV5mJ4A7wKWEo8W1wQ/exec';
    const DASHBOARD_WORKER_URL = 'https://autumn-wood-df55.jay87012205.workers.dev/'; // 🌟 讀取分數+商店目錄改走這個Worker,速度比較快;買東西/查紀錄/登入還是走上面的GAS_API_URL
  
    let currentUser = null; 
    let currentShopItems = []; 
    let itemAltInfo = {}; // 🌟 safeId -> {price, rate, balance, altName, mainCurrency},給替代貨幣折抵預覽用
    let categoryUnlockedThisSession = new Set(); // 🌟 密碼鎖定:這次瀏覽期間(重新整理網頁會重置)已經解鎖過的分類,不用每次切換分類都重問一次
    let currentCategory = null;
    let CATEGORY_ORDER = []; 
    
    let countdownInterval = null;

    window.onload = () => {
      // 🌟 攔截分享網址的參數並記憶 (商品分享 & 分類分享)
      const urlParams = new URLSearchParams(window.location.search);
      const shareTarget = urlParams.get('item');
      const shareCategory = urlParams.get('category'); 
      const shareAuctionId = urlParams.get('auction');
      const shareAuctionCategoryParam = urlParams.get('auctionCategory');

      let shouldCleanUrl = false;
      
      if (shareTarget) {
        localStorage.setItem('shared_item_target', shareTarget);
        shouldCleanUrl = true;
      }
      
      if (shareCategory) {
        localStorage.setItem('shared_category_target', shareCategory);
        shouldCleanUrl = true;
      }

      if (shareAuctionId) {
        localStorage.setItem('shared_auction_target', shareAuctionId);
        shouldCleanUrl = true;
      }

      if (shareAuctionCategoryParam) {
        localStorage.setItem('shared_auction_category_target', shareAuctionCategoryParam);
        shouldCleanUrl = true;
      }

      if (shouldCleanUrl) {
        window.history.replaceState({}, document.title, window.location.pathname); // 清除網址上的參數保持乾淨
      }

      const hashString = window.location.hash.slice(1);
      let accessToken = null; let tokenType = null;
      if (hashString) {
        const fragment = new URLSearchParams(hashString);
        accessToken = fragment.get('access_token'); tokenType = fragment.get('token_type');
        if (accessToken) {
          localStorage.setItem('dc_access_token', accessToken);
          localStorage.setItem('dc_token_type', tokenType);
          window.history.replaceState(null, null, window.location.pathname);
        }
      } else {
        accessToken = localStorage.getItem('dc_access_token');
        tokenType = localStorage.getItem('dc_token_type');
      }

      if (accessToken) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        fetch('https://discord.com/api/users/@me', { headers: { authorization: `${tokenType} ${accessToken}` } })
        .then(res => { if (!res.ok) throw new Error('登入過期'); return res.json(); })
        .then(user => {
          currentUser = user; 
          document.getElementById('user-name').innerText = user.global_name || user.username;
          document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
          fetchScoresAndShop(user.id);
        }).catch(err => {
          localStorage.removeItem('dc_access_token'); localStorage.removeItem('dc_token_type');
          document.getElementById('loading').style.display = 'none'; document.getElementById('login-section').style.display = 'block';
        });
      }
    };

    function refreshData() {
      if(!currentUser) return;
      const refreshBtn = document.getElementById('btn-refresh');
      refreshBtn.innerText = "⏳..."; refreshBtn.disabled = true;
      fetchScoresAndShop(currentUser.id, () => { refreshBtn.innerText = "🔄 重整庫存"; refreshBtn.disabled = false; });
    }

    function selectCategory(cat) {
      currentCategory = cat;
      renderSidebar();
      renderShop();   
    }

    function renderSidebar() {
      let categories = Array.from(new Set(currentShopItems.map(item => item.category)));
      categories.sort((a, b) => {
        let idxA = CATEGORY_ORDER.indexOf(a);
        let idxB = CATEGORY_ORDER.indexOf(b);
        if (idxA === -1) idxA = 999;
        if (idxB === -1) idxB = 999;
        return idxA - idxB;
      });
      const sidebar = document.getElementById('category-sidebar');

      // 🌟 各個子分類 (加入分享按鈕)
      let html = "";
      categories.forEach(cat => {
        const count = currentShopItems.filter(i => i.category === cat).length;
        const sample = currentShopItems.find(i => i.category === cat);
        const locked = sample && sample.categoryLocked && !sample.categoryUnlocked && !categoryUnlockedThisSession.has(cat);
        html += `<div class="cat-item ${currentCategory === cat ? 'active' : ''}" onclick="selectCategory('${cat}')">
                   <span>${locked ? '🔒' : '🏷️'} ${cat}</span>
                   <div style="display:flex; align-items:center; gap:10px;">
                     <span style="font-size:12px; opacity:0.7;">${count}</span>
                     <span class="btn-share-cat" onclick="shareCategory(event, '${cat}')" title="分享此分類">🔗</span>
                   </div>
                 </div>`;
      });
      sidebar.innerHTML = html;
    }

    // 🌟 密碼鎖定:提示輸入分類密碼並向後端驗證,成功才會真的把分類內容顯示出來
    async function promptUnlockCategory(cat) {
      const entered = prompt(`分類「${cat}」需要密碼才能瀏覽，請輸入密碼：`);
      if (entered === null || entered.trim() === '') return;
      try {
        const res = await fetch(`${GAS_API_URL}?action=unlockCategory&discordId=${currentUser.id}&category=${encodeURIComponent(cat)}&unlockPassword=${encodeURIComponent(entered.trim())}`);
        const data = await res.json();
        if (data.status === 'success') {
          categoryUnlockedThisSession.add(cat);
          currentShopItems.forEach(i => { if (i.category === cat) i.categoryUnlocked = true; });
          renderSidebar();
          renderShop();
        } else {
          alert('❌ ' + (data.message || '密碼錯誤'));
        }
      } catch (e) {
        alert('網路錯誤，請稍後再試！');
      }
    }

    // 🌟 密碼鎖定:商品模糊顯示模式的解鎖按鈕,驗證成功後就地更新這個商品的狀態並重新渲染
    async function promptUnlockItem(itemId, safeId) {
      const item = currentShopItems.find(it => it.id === itemId);
      const label = item ? `商品「？？？」` : '此商品';
      const entered = prompt(`${label}需要密碼才能查看，請輸入密碼：`);
      if (entered === null || entered.trim() === '') return;
      try {
        const res = await fetch(`${GAS_API_URL}?action=unlockItem&discordId=${currentUser.id}&itemId=${encodeURIComponent(itemId)}&unlockPassword=${encodeURIComponent(entered.trim())}`);
        const data = await res.json();
        if (data.status === 'success') {
          if (item) item.itemUnlocked = true;
          renderShop();
        } else {
          alert('❌ ' + (data.message || '密碼錯誤'));
        }
      } catch (e) {
        alert('網路錯誤，請稍後再試！');
      }
    }

    // 🌟 控制圖片放大縮小
    function openImage(url) {
      const fullSizeImage = document.getElementById('full-size-image');
      fullSizeImage.src = url;
      document.getElementById('image-overlay').style.display = 'flex';
    }

    function closeImage() {
      document.getElementById('image-overlay').style.display = 'none';
      document.getElementById('full-size-image').src = '';
    }

    let currentHistoryPage = 1;
    const HISTORY_PAGE_SIZE = 10;

    function showHistory() {
      if(!currentUser) return;
      document.getElementById('history-modal').style.display = 'flex';
      currentHistoryPage = 1;
      document.getElementById('history-list-container').innerHTML = '<p style="text-align:center; color:#B9BBBE;">讀取資料中...</p>';
      loadHistoryPage(1, false);
    }

    function loadHistoryPage(page, append) {
      const container = document.getElementById('history-list-container');
      const oldBtn = document.getElementById('history-load-more-btn');
      if (oldBtn) oldBtn.remove();
      if (append) {
        container.insertAdjacentHTML('beforeend', '<p id="history-loading-more" style="text-align:center; color:#B9BBBE;">載入更多中...</p>');
      }

      fetch(`${DASHBOARD_WORKER_URL}?action=history&discordId=${currentUser.id}&page=${page}&pageSize=${HISTORY_PAGE_SIZE}`)
      .then(res => res.json())
      .then(data => {
        const loadingMore = document.getElementById('history-loading-more');
        if (loadingMore) loadingMore.remove();

        if (!append) container.innerHTML = "";

        if (data.status === "success" && data.history.length > 0) {
          currentHistoryPage = page;
          data.history.forEach(record => {
            let keyHtml = "";
            if(record.keys && record.keys !== "無") {
              let safeKeys = String(record.keys); 
              keyHtml = `<div class="history-keys">🎁 序號：<br>${safeKeys.split(', ').join('<br>')}</div>`;
            }

            // 🌟 處理抽中物品顯示
            let drawnHtml = "";
            if(record.drawn) {
              drawnHtml = `<div style="margin-top: 8px; padding: 6px; background-color: #2F3136; border-radius: 4px; font-size: 13px; color: #FEE75C; border: 1px solid #40444B;">🎉 獲得：${record.drawn}</div>`;
            }

            // 🌟 處理餘額變化顯示
            let balanceHtml = "";
            if(record.beforeBal !== null && record.afterBal !== null) {
              balanceHtml = `<div style="margin-top: 6px; font-size: 12px; color: #99AAB5;">💰 餘額變化：${record.beforeBal} ➔ <span style="color: #FFF; font-weight: bold;">${record.afterBal}</span></div>`;
            }

            let displayName = record.itemName.replace('[持有]', '').replace('[隱藏]', '').trim();

            container.insertAdjacentHTML('beforeend', `
              <div class="history-card">
                <div class="history-time">${record.time}</div>
                <div class="history-name">${displayName} <span class="history-qty">x ${record.qty}</span></div>
                ${balanceHtml}
                ${drawnHtml}
                ${keyHtml}
              </div>`);
          });

          if (data.hasMore) {
            container.insertAdjacentHTML('beforeend', `<button id="history-load-more-btn" class="btn btn-action" style="width:100%; margin-top:10px; background-color:#5865F2;" onclick="loadHistoryPage(${page + 1}, true)">📜 載入更多</button>`);
          }
        } else if (!append) {
          container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">目前尚無兌換紀錄</p>';
        }
      }).catch(err => {
        const loadingMore = document.getElementById('history-loading-more');
        if (loadingMore) loadingMore.remove();
        console.error("歷史紀錄讀取錯誤:", err);
        if (!append) container.innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗，請稍後再試</p>';
        else container.insertAdjacentHTML('beforeend', '<p style="text-align:center; color:#ED4245;">載入更多失敗，請稍後再試</p>');
      });
    }

    function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }

    // ============================================================
    // 🌟 拍賣會
    // ============================================================
    let currentAuctions = [];
    let auctionCountdownInterval = null;
    let auctionAutoRefreshInterval = null; // 🌟 拍賣視窗開著的時候,每10秒自動重整一次最新出價狀況;截標前搶標的塞車主要來自出價(寫入)本身排隊,重整太快只會雪上加霜,所以刻意不調太短
    let currentAuctionCategory = null; // 🌟 目前選中的拍賣分類;不再有「全部」選項,載入後會自動選第一個分類
    let auctionAltInfo = {}; // 🌟 auctionId -> {rate, balance, altName, mainCurrency},給拍賣替代貨幣折抵預覽用
    let AUCTION_CATEGORY_ORDER = []; // 🌟 拍賣分類排序(從分類排序表B欄讀取)

    function showAuctions() {
      if (!currentUser) return;
      document.getElementById('auction-modal').style.display = 'flex';
      document.getElementById('auction-list-container').innerHTML = '<p style="text-align:center; color:#B9BBBE;">讀取中...</p>';
      document.getElementById('auction-category-tabs').style.display = 'none';
      loadAuctions();

      if (auctionAutoRefreshInterval) clearInterval(auctionAutoRefreshInterval);
      auctionAutoRefreshInterval = setInterval(() => {
        // 🌟 如果玩家正在輸入出價金額或勾選折抵選項,先跳過這次自動重整,避免打斷輸入到一半的內容
        const activeEl = document.activeElement;
        const container = document.getElementById('auction-list-container');
        if (container && activeEl && container.contains(activeEl) && activeEl !== document.body) return;
        loadAuctions();
      }, 10000);
    }

    function closeAuctions() {
      document.getElementById('auction-modal').style.display = 'none';
      if (auctionCountdownInterval) { clearInterval(auctionCountdownInterval); auctionCountdownInterval = null; }
      if (auctionAutoRefreshInterval) { clearInterval(auctionAutoRefreshInterval); auctionAutoRefreshInterval = null; }
      auctionCountdownReloadTriggered.clear();
    }

    function loadAuctions() {
      // 🌟 記住這次重整前的截止時間,重整後如果發現變長了,代表剛好被自動延長觸發,閃一下卡片提醒玩家
      const prevEndDates = {};
      currentAuctions.forEach(a => { prevEndDates[a.id] = a.endDate; });

      fetch(`${DASHBOARD_WORKER_URL}?action=auctions&discordId=${currentUser.id}`)
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          const extendedIds = data.auctions
            .filter(a => prevEndDates[a.id] && a.endDate && new Date(a.endDate).getTime() > new Date(prevEndDates[a.id]).getTime())
            .map(a => a.id);

          currentAuctions = data.auctions;
          if (data.categoryOrder && data.categoryOrder.length > 0) AUCTION_CATEGORY_ORDER = data.categoryOrder;
          renderAuctions();
          if (auctionCountdownInterval) clearInterval(auctionCountdownInterval);
          auctionCountdownInterval = setInterval(updateAuctionCountdowns, 1000);
          const refreshLabel = document.getElementById('auction-last-refresh');
          if (refreshLabel) refreshLabel.textContent = `🕓 上次更新：${new Date().toLocaleTimeString('zh-TW')}（每10秒自動更新）`;

          extendedIds.forEach(id => {
            const card = document.getElementById('auction-card-' + id);
            if (card) {
              card.classList.add('auction-extend-flash');
              setTimeout(() => card.classList.remove('auction-extend-flash'), 2000);
            }
          });
        } else {
          document.getElementById('auction-list-container').innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗：' + (data.message || '') + '</p>';
        }
      })
      .catch(err => {
        console.error('拍賣讀取錯誤:', err);
        document.getElementById('auction-list-container').innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗，請稍後再試</p>';
      });
    }

    function renderAuctions() {
      auctionAltInfo = {}; // 🌟 每次重繪拍賣列表都重置替代貨幣資訊快取
      // 🌟 同步彈窗標題旁的貨幣顯示:直接複製玩家頭像旁邊那整組(含所有自訂貨幣),不用各自維護一份
      const scoreBoxEl = document.getElementById('score-box-container');
      const auctionCurrencyBox = document.getElementById('auction-currency-box');
      if (scoreBoxEl && auctionCurrencyBox) auctionCurrencyBox.innerHTML = scoreBoxEl.innerHTML;

      // 🌟 建立分類標籤列(只有超過1個分類時才顯示),依分類排序表B欄的順序排列
      const rawCategories = [...new Set(currentAuctions.map(a => a.category || '未分類'))];
      rawCategories.sort((a, b) => {
        let ia = AUCTION_CATEGORY_ORDER.indexOf(a);
        let ib = AUCTION_CATEGORY_ORDER.indexOf(b);
        if (ia === -1) ia = 999;
        if (ib === -1) ib = 999;
        return ia - ib;
      });
      const allCategories = rawCategories;

      // 🌟 分類分享 / 拍賣分享:分享特定拍賣時要優先切到該拍賣的分類,
      // 不然如果目前分類跟拍賣所在分類不同,會被篩選濾掉、導致捲動定位永遠找不到卡片
      const targetAuctionCategory = localStorage.getItem('shared_auction_category_target');
      const targetAuctionIdForCat = localStorage.getItem('shared_auction_target');
      const targetAuctionForCat = targetAuctionIdForCat ? currentAuctions.find(a => a.id === targetAuctionIdForCat) : null;

      if (targetAuctionForCat) {
        currentAuctionCategory = targetAuctionForCat.category || '未分類';
        localStorage.removeItem('shared_auction_category_target');
      } else if (targetAuctionCategory && allCategories.includes(targetAuctionCategory)) {
        currentAuctionCategory = targetAuctionCategory;
        localStorage.removeItem('shared_auction_category_target');
      } else {
        localStorage.removeItem('shared_auction_category_target');
        // 🌟 沒有分類分享目標時,不再有「全部」分類,預設選排序後的第一個分類
        if (!currentAuctionCategory || !allCategories.includes(currentAuctionCategory)) {
          currentAuctionCategory = allCategories[0] || null;
        }
      }

      const tabsEl = document.getElementById('auction-category-tabs');
      if (allCategories.length > 1) {
        tabsEl.style.display = 'flex';
        tabsEl.innerHTML = allCategories.map(cat => `<div class="auction-cat-tab ${currentAuctionCategory === cat ? 'active' : ''}" onclick="selectAuctionCategory('${cat.replace(/'/g, "\\'")}')">${cat} <span class="btn-share-cat" onclick="shareAuctionCategory(event, '${cat.replace(/'/g, "\\'")}')" title="分享此分類">🔗</span></div>`).join('');
      } else {
        tabsEl.style.display = 'none';
      }

      // 🌟 依分類篩選
      const displayAuctions = currentAuctionCategory
        ? currentAuctions.filter(a => (a.category || '未分類') === currentAuctionCategory)
        : currentAuctions;

      const container = document.getElementById('auction-list-container');
      if (!displayAuctions || displayAuctions.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">目前沒有拍賣品</p>';
        updateAuctionCountdowns();
        localStorage.removeItem('shared_auction_target'); // 🌟 沒有東西可以捲動定位,清掉避免下次一直重複觸發
        return;
      }
      container.innerHTML = '';
      displayAuctions.forEach(a => {
        const isEnded = a.state !== 'open';
        let typeLabel, typeClass;
        if (a.type === 'SEALED') { typeLabel = '🕵️ 暗標(高者得)'; typeClass = 'auction-type-sealed'; }
        else if (a.type === 'SEALED_LOW') { typeLabel = '🔻 暗標(低者得)'; typeClass = 'auction-type-sealed-low'; }
        else { typeLabel = '📢 公開比價'; typeClass = 'auction-type-public'; }

        let priceInfoHtml;
        if (a.type === 'PUBLIC') {
          priceInfoHtml = a.hasAnyBid
            ? `目前最高出價：<span class="auction-bid-value">${a.currentHighBid} ${a.displayCurrency}</span>${a.currentHighBidderName ? ` (👤 ${a.currentHighBidderName})` : ''}`
            : `起標價：<span class="auction-bid-value">${a.startBid} ${a.displayCurrency}</span>（尚無人出價）`;
        } else if (a.type === 'SEALED_LOW') {
          priceInfoHtml = `起標價(上限)：<span class="auction-bid-value">${a.startBid} ${a.displayCurrency}</span>（暗標，出價越低越有機會得標，金額互相保密；若與他人出價金額相同會互相淘汰，改由下一個不重複的最低價得標）`;
        } else {
          priceInfoHtml = `起標價：<span class="auction-bid-value">${a.startBid} ${a.displayCurrency}</span>（暗標，出價金額互相保密）`;
        }
        const myBidHtml = a.myActiveBid !== null ? `<br>您目前出價：<span class="auction-bid-value">${a.myActiveBid} ${a.displayCurrency}</span>${a.myActiveBidAlt > 0 ? `（已折抵 ${a.myActiveBidAlt} ${a.altCurrency || ''}）` : ''}` : '';

        let statusHtml = '';
        if (a.state === 'ended') {
          if (a.winnerIsMe) statusHtml = `<div class="auction-status win">🎉 恭喜！您以 ${a.winningBid} ${a.displayCurrency} 得標！</div>`;
          else if (a.winningBid !== null) statusHtml = `<div class="auction-status lose">已結標，未得標</div>`;
          else statusHtml = `<div class="auction-status lose">流標（無人出價，或暗標(低者得)出價互撞找不到唯一得標者）</div>`;
        } else if (a.state === 'pending_settlement') {
          statusHtml = `<div class="auction-status">⏳ 拍賣已截止，等待系統結算中...</div>`;
        } else if (a.state === 'not_started') {
          statusHtml = `<div class="auction-status">🕐 尚未開始，敬請期待</div>`;
        } else if (a.state === 'no_permission') {
          statusHtml = `<div class="auction-status lose">🔒 身分組不符，無法出價</div>`;
        } else if (a.type === 'PUBLIC' && a.currentHighBidderIsMe) {
          statusHtml = `<div class="auction-status leading">👑 您目前是最高出價者</div>`;
        }

        let roleTagHtml = '';
        if (a.requiredRoleNames && a.requiredRoleNames.length > 0) {
          let roleModeHint = '需任一個';
          if (a.roleRequirementMode === 'ALL') roleModeHint = '需全部持有';
          else if (a.roleRequirementMode === 'COUNT') roleModeHint = `需其中${a.roleRequirementMinCount}個`;
          const roleTagClass = a.hasRolePermission ? 'tag-role-ok' : 'tag-role-locked';
          const roleIcon = a.hasRolePermission ? '✅' : '🔒';
          roleTagHtml = `<span class="limit-tag ${roleTagClass}" style="margin-bottom:8px; display:inline-block;">${roleIcon} 限定身分組(${roleModeHint}): ${a.requiredRoleNames.join('、')}</span><br>`;
        }

        let countdownHtml;
        if (a.state === 'not_started' && a.startDate) {
          countdownHtml = `<span class="auction-countdown" data-start="${a.startDate}" data-auction-id="${a.id}">計算中...</span>`;
        } else if (a.endDate) {
          countdownHtml = `<span class="auction-countdown" data-end="${a.endDate}" data-auction-id="${a.id}">計算中...</span>`;
        } else {
          countdownHtml = '無截止時間';
        }

        // 🌟 自動延長規則提示:有設定的話,讓玩家知道最後衝刺出價會延長時間,不用意外覺得「怎麼還沒結標」
        let extendHintHtml = '';
        if (a.state === 'open' && a.extendTriggerMin !== null && a.extendByMin !== null) {
          extendHintHtml = `<div class="auction-extend-hint">⏰ 最後 ${a.extendTriggerMin} 分鐘內有人出價，將自動延長 ${a.extendByMin} 分鐘</div>`;
        }

        let bidRowHtml = '';
        if (a.state === 'open') {
          let bidInputAttrs;
          if (a.type === 'SEALED_LOW') {
            bidInputAttrs = `max="${a.startBid}" placeholder="最高 ${a.startBid}"`;
          } else {
            const minBid = a.type === 'PUBLIC' ? (a.hasAnyBid ? a.currentHighBid + 1 : a.startBid) : a.startBid;
            bidInputAttrs = `min="${minBid}" placeholder="最低 ${minBid}"`;
          }

          let auctionAltHtml = '';
          if (a.altCurrency) {
            auctionAltInfo[a.id] = { rate: a.altCurrencyRate, balance: a.altCurrencyBalance, altName: a.altCurrency, mainCurrency: a.displayCurrency };
            auctionAltHtml = `
              <div class="alt-currency-box" id="altbox-auction-${a.id}">
                <label class="alt-toggle-label">
                  <input type="checkbox" id="alt-toggle-auction-${a.id}" onchange="onAuctionAltToggle('${a.id}')">
                  💱 使用 ${a.altCurrency} 折抵（你有 ${a.altCurrencyBalance}）
                </label>
                <div class="alt-mode-row" id="alt-mode-row-auction-${a.id}" style="display:none">
                  <label><input type="radio" name="alt-mode-auction-${a.id}" id="alt-mode-auto-auction-${a.id}" value="auto" checked onchange="updateAuctionAltPreview('${a.id}')"> 自動折抵</label>
                  <label><input type="radio" name="alt-mode-auction-${a.id}" id="alt-mode-manual-auction-${a.id}" value="manual" onchange="updateAuctionAltPreview('${a.id}')"> 自訂數量</label>

                <span class="auction-name">${a.name}</span>

              </div>
              <span class="auction-type-badge ${typeClass}">${typeLabel}</span>

            ${remarkHtml}
            ${roleTagHtml}
            <div class="auction-info">
              ${priceInfoHtml}${myBidHtml}<br>
              ⏳ ${countdownHtml}

            ${statusHtml}

          </div>
        `);

      updateAuctionCountdowns();

      // 🌟 檢查是否有待跳轉的分享拍賣,捲動並高亮該卡片
      const targetAuctionId = localStorage.getItem('shared_auction_target');
      if (targetAuctionId) {

          if (el) {

    // 🌟 【重要修正】用 Set 記錄哪些拍賣已經因為倒數歸零觸發過重整,這個變數在模組層級、
    // 不會因為 renderAuctions() 重建 DOM 而重設。之前用 el.dataset.reloaded 當標記,
    // 但每次 loadAuctions() 都會整個重建 DOM、產生全新的元素,標記形同虛設,
    // 導致「倒數歸零的拍賣」每 1.5~2.5 秒就再觸發一次 loadAuctions(),永遠停不下來——
    // 尤其好幾場拍賣剛好同時到期、又有好幾個人同時開著頁面時,會疊加成大量重複請求。
    const auctionCountdownReloadTriggered = new Set();

    function updateAuctionCountdowns() {
      document.querySelectorAll('.auction-countdown').forEach((el) => {
        const now = new Date().getTime();
        const startAttr = el.getAttribute('data-start');
        const auctionId = el.getAttribute('data-auction-id');

        if (startAttr) {
          // 🌟 起標倒數
          const start = parseInt(startAttr);
          if (now >= start) {
            el.innerText = '即將開放，重新整理中...';
            el.style.color = '#FEE75C';
            const key = 'start:' + auctionId;
            if (auctionId && !auctionCountdownReloadTriggered.has(key)) {
              auctionCountdownReloadTriggered.add(key);
              setTimeout(loadAuctions, 1500);
            }
          } else {
            el.innerText = formatTimeDiff(start - now) + ' 後開始';
            el.style.color = '#00AFF4';
          }
          return;
        }

        const end = parseInt(el.getAttribute('data-end'));
        if (now >= end) {
          el.innerText = '已截止';
          el.style.color = '#ED4245';
          // 截止後重新整理一次列表,讓畫面切換成「等待結算/已結標」狀態,不會一直卡在出價中的樣子
          const key = 'end:' + auctionId;
          if (auctionId && !auctionCountdownReloadTriggered.has(key)) {
            auctionCountdownReloadTriggered.add(key);
            setTimeout(loadAuctions, 1500);
          }
        } else {
          el.innerText = formatTimeDiff(end - now) + ' 後截止';
          el.style.color = '#58FF9C';
        }
      });
    }

    // 🌟 拍賣替代貨幣折抵:勾選後顯示模式選項,並更新預覽
    function onAuctionAltToggle(auctionId) {
      const enabled = document.getElementById(`alt-toggle-auction-${auctionId}`).checked;
      const row = document.getElementById(`alt-mode-row-auction-${auctionId}`);
      if (row) row.style.display = enabled ? 'flex' : 'none';
      updateAuctionAltPreview(auctionId);
    }

    // 🌟 拍賣替代貨幣折抵:即時算出折抵後這筆出價還要凍結多少原始貨幣
    function updateAuctionAltPreview(auctionId) {
      const info = auctionAltInfo[auctionId];
      const previewEl = document.getElementById(`alt-preview-auction-${auctionId}`);
      if (!info || !previewEl) return;

      const toggleEl = document.getElementById(`alt-toggle-auction-${auctionId}`);
      const manualInput = document.getElementById(`alt-amount-auction-${auctionId}`);
      const manualRadio = document.getElementById(`alt-mode-manual-auction-${auctionId}`);
      const isManual = manualRadio && manualRadio.checked;
      if (manualInput) manualInput.style.display = isManual ? '' : 'none';

      if (!toggleEl || !toggleEl.checked) { previewEl.textContent = ''; return; }

      const bidInput = document.getElementById(`bid-input-${auctionId}`);
      const bidAmount = bidInput ? (parseInt(bidInput.value) || 0) : 0;
      if (bidAmount <= 0) { previewEl.textContent = '請先輸入出價金額'; return; }

      let requested;
      if (isManual) {
        const maxUsefulAlt = info.rate > 0 ? Math.ceil(bidAmount / info.rate) : 0;
        const cap = Math.min(info.balance, maxUsefulAlt);
        if (manualInput) manualInput.max = cap;
        requested = manualInput ? (parseInt(manualInput.value) || 0) : 0;
        if (requested < 0) requested = 0;
        requested = Math.min(requested, cap);
      } else {
        requested = info.balance;
      }

      const result = computeAltUsageClient(bidAmount, info.balance, info.rate, requested);
      previewEl.textContent = result.used > 0
        ? `折抵 ${result.used} 個 ${info.altName} → 這筆出價還需凍結 ${result.mainNeeded} ${info.mainCurrency}`
        : `目前折抵 0 個(${info.altName} 數量不足以湊到最小可折抵單位,或尚未輸入數量)`;
    }

    function submitBid(auctionId, auctionName) {
      if (!currentUser) return;
      const input = document.getElementById(`bid-input-${auctionId}`);
      const btn = document.getElementById(`bid-btn-${auctionId}`);
      const amount = parseInt(input.value);
      if (!amount || amount <= 0) { alert('請輸入有效的出價金額'); return; }

      // 🌟 替代貨幣折抵:讀取玩家在拍賣卡片上勾選的折抵模式/數量
      let altMode = 'none', altAmount = 0, altConfirmNote = '';
      const altToggle = document.getElementById(`alt-toggle-auction-${auctionId}`);
      if (altToggle && altToggle.checked) {
        const manualRadio = document.getElementById(`alt-mode-manual-auction-${auctionId}`);
        const isManual = manualRadio && manualRadio.checked;
        altMode = isManual ? 'manual' : 'auto';
        if (isManual) {
          const manualInput = document.getElementById(`alt-amount-auction-${auctionId}`);
          altAmount = manualInput ? (parseInt(manualInput.value) || 0) : 0;
          altConfirmNote = `\n💱 折抵方式：自訂折抵 ${altAmount} 個`;
        } else {
          altConfirmNote = `\n💱 折抵方式：自動用掉需要的份量`;
        }
      }

      if (!confirm(`確定要對「${auctionName}」出價 ${amount} 嗎？${altConfirmNote}`)) return;

      const originalBtnText = btn.innerText;
      btn.disabled = true;
      btn.innerText = '⏳ 出價中請稍後...';
      input.disabled = true;

      fetch(`${GAS_API_URL}?action=bid&discordId=${currentUser.id}&auctionId=${auctionId}&bidAmount=${amount}&altMode=${altMode}&altAmount=${altAmount}`)
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          alert('✅ 出價成功！');
          // 🌟 先刷新分數(更新餘額顯示),完成後再重新整理拍賣列表,
          // 這樣拍賣彈窗標題旁的貨幣顯示才會是扣款後的最新餘額,不會還停在出價前的舊數字
          fetchScoresAndShop(currentUser.id, loadAuctions);
        } else {
          alert('❌ 出價失敗：' + data.message);
          loadAuctions();
        }
      })
      .catch((err) => {
        console.error('出價錯誤:', err);
        alert('網路錯誤，請稍後再試！');
        // 🌟 網路錯誤時列表不會重新整理,要自己手動把按鈕跟輸入框解鎖,不然會卡住
        btn.disabled = false;
        btn.innerText = originalBtnText;
        input.disabled = false;
      });
    }


function fetchScoresAndShop(discordId, callback = null) {
      document.getElementById('loading-text').innerText = "⏳ 載入分數與商店目錄...";

      fetch(`${DASHBOARD_WORKER_URL}?discordId=${discordId}`)
      .then(res => res.json())
      .then(result => {
        if (result.status !== "success") return;

        const data = result.scores;
        if(data && data.status === "success") {
          document.getElementById('score-s1').innerText = data.s1;
          document.getElementById('score-s2').innerText = data.s2;
          document.getElementById('score-s3').innerText = data.s3;
          if (parseInt(data.s3) === 0) document.getElementById('score-s3-container').style.display = 'none';
          else document.getElementById('score-s3-container').style.display = 'flex';

          document.querySelectorAll('.dynamic-score-item').forEach(e => e.remove());
          if(data.customVars && data.customVars.length > 0) {
            const container = document.getElementById('score-box-container');
            data.customVars.forEach(v => {
              container.insertAdjacentHTML('beforeend', `<div class="score-item dynamic-score-item">💠 ${v.display}: <span class="dynamic-score-value">${v.value}</span></div>`);
            });
          }

          // 🌟 顯示玩家目前持有的身分組
          const roleContainer = document.getElementById('role-box-container');
          roleContainer.innerHTML = '';
          if (data.roleNames && data.roleNames.length > 0) {
            data.roleNames.forEach(name => {
              roleContainer.insertAdjacentHTML('beforeend', `<div class="role-badge">🏅 ${name}</div>`);
            });
          }
        }

        const shopData = result.shop;
        if(shopData && shopData.status === "success") {

          // ==========================================
          // 🌟 管理員設定區塊
          // ==========================================
          const ADMIN_IDS = ['176681551189377024', '425655020017680395', '999888777666555444']; 
          const isAdmin = ADMIN_IDS.includes(discordId);

          // 🌟 判斷：如果是管理員就保留，如果不是管理員就過濾掉 [隱藏] 商品
          currentShopItems = shopData.items.filter(item => {
            if (item.name.includes('[隱藏]')) return isAdmin;
            return true;
          });

          if (shopData.categoryOrder && shopData.categoryOrder.length > 0) {
            CATEGORY_ORDER = shopData.categoryOrder;
          }

          // 🌟 檢查是否有待跳轉的分享分類 / 分享商品(分享特定商品時要優先切到該商品的分類,
          // 不然如果目前分類跟商品所在分類不同,商品會被篩選濾掉、導致捲動定位永遠找不到卡片)
          const allCats = Array.from(new Set(currentShopItems.map(item => item.category)));
          const targetCategory = localStorage.getItem('shared_category_target');
          const targetItemId = localStorage.getItem('shared_item_target');
          const targetItem = targetItemId ? currentShopItems.find(item => item.id === targetItemId) : null;

          if (targetItem && targetItem.category) {
            currentCategory = targetItem.category;
            localStorage.removeItem('shared_category_target');
          } else if (targetCategory && allCats.includes(targetCategory)) {
            currentCategory = targetCategory;
            localStorage.removeItem('shared_category_target');
          } else {
            localStorage.removeItem('shared_category_target');
            // 🌟 沒有指定分類(或上次選的分類已經不存在)時,預設選排序後的第一個分類,而不是「所有商品」
            if (!currentCategory || !allCats.includes(currentCategory)) {
              allCats.sort((a, b) => {
                let idxA = CATEGORY_ORDER.indexOf(a);
                let idxB = CATEGORY_ORDER.indexOf(b);
                if (idxA === -1) idxA = 999;
                if (idxB === -1) idxB = 999;
                return idxA - idxB;
              });
              currentCategory = allCats[0] || null;
            }
          }

          renderSidebar(); 
          renderShop();    
          document.getElementById('loading').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
        }

        if(callback) callback(); 

        // 🌟 檢查是否有待跳轉的分享商品
        const targetId = localStorage.getItem('shared_item_target');
        if (targetId) {
          setTimeout(() => {
            const el = document.getElementById('card-item-' + targetId);
            if (el) {
              // 平滑滾動到該商品
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              // 加入發光特效吸引目光
              el.style.transition = "box-shadow 0.3s ease-in-out";
              el.style.boxShadow = "0 0 20px 6px #5865F2";
              setTimeout(() => { el.style.boxShadow = "none"; }, 3000); // 3秒後移除發光
            }
            localStorage.removeItem('shared_item_target'); // 執行完就清掉記憶
          }, 600); // 等待畫面渲染一下再滑動
        }

        // 🌟 檢查是否有待跳轉的分享拍賣或分享拍賣分類
        const targetAuctionId = localStorage.getItem('shared_auction_target');
        const targetAuctionCategory = localStorage.getItem('shared_auction_category_target');
        if (targetAuctionId || targetAuctionCategory) {
          showAuctions(); // 自動開啟拍賣會彈窗,裡面渲染完成後會自己捲動定位高亮/切換分類(見renderAuctions)
        }
      })
      .catch(err => {
        console.error("載入失敗:", err);
        document.getElementById('loading-text').innerText = "❌ 載入失敗，請稍後再試";
      });
    }
    function renderShop() {
      const container = document.getElementById('shop-list');
      const sortType = document.getElementById('sort-items').value;
      let displayItems = [...currentShopItems];
      itemAltInfo = {}; // 🌟 每次重繪商店都重置替代貨幣資訊快取

      let isCatBlurLocked = false; // 🌟 這個分類是「模糊顯示」模式且還沒解鎖,渲染完後要整個包一層模糊遮罩
      if (currentCategory) {
        displayItems = displayItems.filter(item => item.category === currentCategory);

        // 🌟 分類密碼鎖定:還沒解鎖的話,依照顯示模式決定「完全隱藏內容」/「模糊顯示」/「正常顯示只鎖購買」
        const catLockSample = currentShopItems.find(item => item.category === currentCategory);
        const isCatLocked = catLockSample && catLockSample.categoryLocked && !catLockSample.categoryUnlocked && !categoryUnlockedThisSession.has(currentCategory);
        if (isCatLocked) {
          if (catLockSample.categoryLockVisibility === 'BLUR') {
            isCatBlurLocked = true;
          } else if (catLockSample.categoryLockVisibility !== 'VISIBLE') {
            // 預設(未設定/HIDDEN):完全隱藏內容,只顯示鎖定畫面
            container.innerHTML = `
              <div class="category-lock-screen">
                <div class="category-lock-icon">🔒</div>
                <div class="category-lock-title">「${currentCategory}」需要密碼才能瀏覽</div>
                <button class="btn-action" onclick="promptUnlockCategory('${currentCategory.replace(/'/g,"\\'")}')">輸入密碼解鎖</button>
              </div>`;
            return;
          }
          // VISIBLE:什麼都不做,往下正常渲染——商品卡片本來就會用 categoryLocked/categoryUnlocked
          // 顯示鎖定提示並擋住購買按鈕(跟商品自己的鎖定提示是同一套邏輯)
        }
      }
      if (sortType === 'avail-first') {
        displayItems.sort((a, b) => {
          if (a.state === 'available' && b.state !== 'available') return -1;
          if (a.state !== 'available' && b.state === 'available') return 1;
          return 0;
        });
      } else if (sortType === 'price-low') displayItems.sort((a, b) => a.price - b.price);
      else if (sortType === 'price-high') displayItems.sort((a, b) => b.price - a.price);

      container.innerHTML = "";
      if (displayItems.length === 0) {
        container.innerHTML = "<div style='color:#B9BBBE; padding: 20px;'>此分類目前無商品</div>";
        return;
      }

      let allCardsHtml = '';
      displayItems.forEach((item) => {
        const isAvail = item.state === "available";
        const badgeClass = isAvail ? "badge-avail" : "badge-unavail";
        const safeId = "item-" + item.id; 

        // 🌟 商品密碼鎖定 + 模糊顯示模式:還沒解鎖的話,只顯示一張模糊卡片,不洩漏商品細節,直接跳過其他資訊組裝
        const itemBlurLocked = item.itemLocked && !item.itemUnlocked && item.itemLockVisibility === 'BLUR';
        if (itemBlurLocked) {
          allCardsHtml += `
            <div class="shop-item-card item-blur-card" id="card-${safeId}">
              <div class="item-blur-content">
                <div class="item-blur-icon">🔒</div>
                <div class="item-blur-name">？？？？？</div>
                <div class="item-blur-price">？？？ ${item.displayCurrency}</div>
              </div>
              <button class="btn btn-buy" onclick="promptUnlockItem('${item.id}', '${safeId}')">🔒 輸入密碼解鎖查看</button>
            </div>
          `;
          return; // 🌟 跳過這個商品剩下的正常渲染邏輯
        }
        
        let limitsHtml = `<div class="limit-tags">`;
        if (item.limits.remainGD !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服今日: ${item.limits.remainGD}</span>`;
        if (item.limits.remainGW !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服本周: ${item.limits.remainGW}</span>`;
        if (item.limits.remainGM !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服本月: ${item.limits.remainGM}</span>`;
        if (item.limits.remainPD !== null) limitsHtml += `<span class="limit-tag tag-personal">👤 個人今日: ${item.limits.remainPD}</span>`;
        if (item.limits.remainPW !== null) limitsHtml += `<span class="limit-tag tag-personal">👤 個人本周: ${item.limits.remainPW}</span>`;
        if (item.limits.remainPM !== null) limitsHtml += `<span class="limit-tag tag-personal">👤 個人本月: ${item.limits.remainPM}</span>`;
        if (item.limits.remainPT !== null) limitsHtml += `<span class="limit-tag tag-total">👑 終身限購: ${item.limits.remainPT}</span>`;
        if (item.requiredRoleNames && item.requiredRoleNames.length > 0) {
          const roleTagClass = item.hasRolePermission ? 'tag-role-ok' : 'tag-role-locked';
          const roleIcon = item.hasRolePermission ? '✅' : '🔒';
          let roleModeHint = '需任一個';
          if (item.roleRequirementMode === 'ALL') roleModeHint = '需全部持有';
          else if (item.roleRequirementMode === 'COUNT') roleModeHint = `需其中${item.roleRequirementMinCount}個`;
          limitsHtml += `<span class="limit-tag ${roleTagClass}">${roleIcon} 限定身分組(${roleModeHint}): ${item.requiredRoleNames.join('、')}</span>`;
        }
        if (item.exclusiveGroup) {
          const groupTagClass = item.groupLocked ? 'tag-role-locked' : 'tag-role-ok';
          const groupIcon = item.groupLocked ? '🔒' : '🎯';
          const groupMsg = item.groupLocked ? `已選擇同組其他商品` : `選一群組`;
          limitsHtml += `<span class="limit-tag ${groupTagClass}">${groupIcon} ${groupMsg}: ${item.exclusiveGroup}</span>`;
        }
        limitsHtml += `</div>`;
        if (limitsHtml === `<div class="limit-tags"></div>`) limitsHtml = "";
        
        let isHold = item.name.includes('[持有]');
        let displayName = item.name.replace('[持有]', '').trim();
        // 🌟 更新圖片 HTML 讓它帶有 onclick 事件以開啟預覽
        let imageHtml = item.imageUrl ? `<img src="${item.imageUrl}" class="item-image" alt="商品圖片" title="點擊放大觀看" onclick="openImage('${item.imageUrl}')">` : '';
        
        // 🌟 自動檢查備註中的網址並替換成 a 標籤 (超連結)
        let formattedRemark = item.remark;
        if (formattedRemark) {
            formattedRemark = formattedRemark.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()">$1</a>');
        }
        let remarkHtml = formattedRemark ? `<div class="item-remark">📝 ${formattedRemark}</div>` : '';

        let gachaHtml = "";
        if (item.gachaPool && item.gachaPool.length > 0) {
            gachaHtml = `<div style="margin-top: 10px; font-size: 13px; background-color: #202225; padding: 10px; border-radius: 6px; border: 1px solid #40444B;">
                <div style="color: #FEE75C; font-weight: bold; margin-bottom: 6px; border-bottom: 1px dashed #4F545C; padding-bottom: 4px;">🎁 內容物一覽：</div>`;
            item.gachaPool.forEach(g => {
                let detail = [];
                if (g.prob !== null) detail.push(`${g.prob}%`);
                if (g.stock !== null) {
                    let stockText = g.stock <= 0 ? `<span style="color:#ED4245; font-weight:bold;">(已抽完)</span>` : `${g.stock} 份`;
                    detail.push(stockText);
                }
                if (detail.length === 0) detail.push("保底/無限"); 
                
                let color = g.stock !== null && g.stock <= 0 ? '#72767D' : '#FFF';
                let decoration = g.stock !== null && g.stock <= 0 ? 'line-through' : 'none';
                let displayQty = (g.dispName !== g.varName || g.qty === 1) ? "" : ` x ${g.qty}`;
                
                gachaHtml += `<div style="display: flex; justify-content: space-between; color: ${color}; text-decoration: ${decoration}; margin-bottom: 4px;">
                    <span>- ${g.dispName}${displayQty}</span>
                    <span style="color: #99AAB5;">${detail.join(" / ")}</span>
                </div>`;
            });
            gachaHtml += `</div>`;
        }

        let timeHtml = "";
        if (item.startDate || item.endDate) {
          timeHtml += `<div class="item-time-info">`;
          if (item.startDate) {
            let sDate = new Date(item.startDate).toLocaleString('zh-TW', { hour12: false });
            timeHtml += `<div style="margin-bottom: 4px;">🟢 開始：${sDate}</div>`;
          }
          if (item.endDate) {
            let eDate = new Date(item.endDate).toLocaleString('zh-TW', { hour12: false });
            timeHtml += `<div>🔴 結束：${eDate}</div>`;
          }
          timeHtml += `<div style="margin-top: 6px; border-top: 1px dashed #4F545C; padding-top: 6px;">⏳ 狀態：<span id="countdown-${safeId}" class="countdown-timer" data-id="${item.id}" data-start="${item.startDate || ''}" data-end="${item.endDate || ''}">計算中...</span></div>`;
          timeHtml += `</div>`;
        }

        let altHtml = '';
        if (item.altCurrency && isAvail && !isHold) {
          itemAltInfo[safeId] = { price: item.price, rate: item.altCurrencyRate, balance: item.altCurrencyBalance, altName: item.altCurrency, mainCurrency: item.displayCurrency };
          altHtml = `
            <div class="alt-currency-box" id="altbox-${safeId}">
              <label class="alt-toggle-label">
                <input type="checkbox" id="alt-toggle-${safeId}" onchange="onAltToggle('${safeId}')">
                💱 使用 ${item.altCurrency} 折抵（你有 ${item.altCurrencyBalance}）
              </label>
              <div class="alt-mode-row" id="alt-mode-row-${safeId}" style="display:none">
                <label><input type="radio" name="alt-mode-${safeId}" id="alt-mode-auto-${safeId}" value="auto" checked onchange="updateAltPreview('${safeId}')"> 自動折抵</label>
                <label><input type="radio" name="alt-mode-${safeId}" id="alt-mode-manual-${safeId}" value="manual" onchange="updateAltPreview('${safeId}')"> 自訂數量</label>
                <input type="number" id="alt-amount-${safeId}" min="0" value="0" style="display:none" oninput="updateAltPreview('${safeId}')">
              </div>
              <div class="alt-preview" id="alt-preview-${safeId}"></div>
            </div>`;
        }

        // 🌟 密碼鎖定:分類鎖或商品自己的鎖,只要還沒解鎖任一個就會擋購買,提示玩家需要輸入密碼
        const isLocked = (item.categoryLocked && !item.categoryUnlocked) || (item.itemLocked && !item.itemUnlocked);
        let lockHtml = '';
        if (isLocked) {
          const lockReason = (item.categoryLocked && !item.categoryUnlocked)
            ? `此商品所在分類「${item.category}」需要密碼才能購買`
            : '此商品需要密碼才能購買';
          lockHtml = `<div class="item-lock-hint">🔒 ${lockReason}，點擊「兌換」時會請你輸入密碼</div>`;
        }

        let actionHtml = '';
        if (isAvail) {
          let maxQty = item.limits.effectiveStock !== "無限" ? item.limits.effectiveStock : 999;
          actionHtml = `
            ${lockHtml}
            ${altHtml}
            <div class="item-actions">
              <input type="number" id="qty-${safeId}" class="qty-input" value="1" min="1" max="${maxQty}" oninput="updateAltPreview('${safeId}')">
              <button id="btn-${safeId}" class="btn btn-buy" onclick="buyItem('${item.id}', '${item.name}', '${safeId}', ${maxQty}, '${item.displayCurrency}')">${isLocked ? '🔒 兌換' : '兌換'}</button>
            </div>
          `;
        } else {
          actionHtml = `<div class="item-actions">${lockHtml}<button class="btn btn-buy" disabled>無法兌換</button></div>`;
        }

        const html = `
          <div class="shop-item-card ${!isAvail ? 'disabled' : ''}" id="card-${safeId}">
            ${imageHtml}
            <div class="item-header">
              <div style="display: flex; align-items: center;">
                <span class="item-name">${isLocked ? '🔒 ' : ''}${displayName}</span>
                <span class="btn-share" onclick="shareItem('${item.id}', '${displayName}')" title="複製分享連結">🔗</span>
              </div>
              <span class="item-badge ${badgeClass}">${item.stateMsg}</span>
            </div>
            ${remarkHtml}
            ${timeHtml} 
            <div class="item-info">
              ${isHold ? `✨ 條件：<span class="item-price" style="color:#58FF9C;">需持有 ${item.price} ${item.displayCurrency}</span><br>` : 
                `💰 價格：<span class="item-price">${item.price} ${item.displayCurrency}</span><br>`}
              📦 庫存：${item.limits.baseStock}
              ${limitsHtml}
              ${gachaHtml}
            </div>
            ${actionHtml}
          </div>
        `;
        allCardsHtml += html;
      });

      // 🌟 分類是「模糊顯示」且還沒解鎖:整批商品卡片包一層模糊遮罩,上方顯示解鎖按鈕橫幅
      if (isCatBlurLocked) {
        container.innerHTML = `
          <div class="category-lock-banner">
            <span>🔒 「${currentCategory}」需要密碼才能購買，以下為模糊預覽</span>
            <button class="btn-action" onclick="promptUnlockCategory('${currentCategory.replace(/'/g,"\\'")}')">輸入密碼解鎖</button>
          </div>
          <div class="category-blur-content">${allCardsHtml}</div>
        `;
      } else {
        container.innerHTML = allCardsHtml;
      }

      startCountdowns();
    }

    // 🌟 替代貨幣折抵:勾選後顯示模式選項,並更新預覽
    function onAltToggle(safeId) {
      const enabled = document.getElementById(`alt-toggle-${safeId}`).checked;
      const row = document.getElementById(`alt-mode-row-${safeId}`);
      if (row) row.style.display = enabled ? 'flex' : 'none';
      updateAltPreview(safeId);
    }

    // 🌟 替代貨幣折抵:即時算出折抵後還要付多少原始貨幣
    // 🌟 前端預覽用的折抵試算,邏輯要跟後端 Code.gs 的 computeAltUsage_ 完全一致,
    // 匯率<1時(例如100個碎片才能折抵1個)才不會讓玩家以為零頭也會被扣掉
    function computeAltUsageClient(totalCost, altBalance, rate, requestedAlt) {
      if (!(rate > 0) || totalCost <= 0) return { used: 0, mainNeeded: totalCost };
      const maxUsefulAlt = Math.ceil(totalCost / rate);
      const cappedAlt = Math.min(requestedAlt, maxUsefulAlt);
      const coverage = Math.min(totalCost, Math.floor(cappedAlt * rate));
      const used = coverage > 0 ? Math.min(cappedAlt, Math.ceil(coverage / rate)) : 0;
      return { used, mainNeeded: totalCost - coverage };
    }

    function updateAltPreview(safeId) {
      const info = itemAltInfo[safeId];
      const previewEl = document.getElementById(`alt-preview-${safeId}`);
      if (!info || !previewEl) return;

      const toggleEl = document.getElementById(`alt-toggle-${safeId}`);
      const manualInput = document.getElementById(`alt-amount-${safeId}`);
      const manualRadio = document.getElementById(`alt-mode-manual-${safeId}`);
      const isManual = manualRadio && manualRadio.checked;
      if (manualInput) manualInput.style.display = isManual ? '' : 'none';

      if (!toggleEl || !toggleEl.checked) { previewEl.textContent = ''; return; }

      const qtyEl = document.getElementById(`qty-${safeId}`);
      const qty = qtyEl ? (parseInt(qtyEl.value) || 1) : 1;
      const totalCost = info.price * qty;

      let requested;
      if (isManual) {
        const maxUsefulAlt = info.rate > 0 ? Math.ceil(totalCost / info.rate) : 0;
        const cap = Math.min(info.balance, maxUsefulAlt);
        if (manualInput) manualInput.max = cap;
        requested = manualInput ? (parseInt(manualInput.value) || 0) : 0;
        if (requested < 0) requested = 0;
        requested = Math.min(requested, cap);
      } else {
        requested = info.balance;
      }

      const result = computeAltUsageClient(totalCost, info.balance, info.rate, requested);
      previewEl.textContent = result.used > 0
        ? `折抵 ${result.used} 個 ${info.altName} → 還需支付 ${result.mainNeeded} ${info.mainCurrency}`
        : `目前折抵 0 個(${info.altName} 數量不足以湊到最小可折抵單位,或尚未輸入數量)`;
    }

    function buyItem(itemId, itemName, safeId, maxQty, currencyName, unlockPasswordOverride) {
      if (!currentUser) return;
      const qtyInput = document.getElementById(`qty-${safeId}`);
      const qty = parseInt(qtyInput.value);
      
      if (qty < 1) { alert("數量必須大於 0！"); return; }
      if (qty > maxQty) { alert(`已超過限購數量！您目前最多只能買 ${maxQty} 個。`); return; }
      
      let isHold = itemName.includes('[持有]');
      let displayItemName = itemName.replace('[持有]', '').trim();

      // 🌟 密碼鎖定:如果商品或所在分類還沒解鎖,先跳出提示要求輸入密碼,不用等後端回錯誤才問一次
      let unlockPassword = unlockPasswordOverride || '';
      if (!unlockPassword) {
        const item = currentShopItems.find(it => it.id === itemId);
        if (item && ((item.categoryLocked && !item.categoryUnlocked) || (item.itemLocked && !item.itemUnlocked))) {
          const promptLabel = (item.categoryLocked && !item.categoryUnlocked)
            ? `此商品所在分類「${item.category}」需要密碼才能購買，請輸入密碼：`
            : '此商品需要密碼才能購買，請輸入密碼：';
          const entered = prompt(promptLabel);
          if (entered === null) return; // 使用者按取消
          unlockPassword = entered.trim();
        }
      }

      // 🌟 替代貨幣折抵:讀取玩家在卡片上勾選的折抵模式/數量
      let altMode = 'none', altAmount = 0, altConfirmNote = '';
      const altToggle = document.getElementById(`alt-toggle-${safeId}`);
      if (altToggle && altToggle.checked) {
        const manualRadio = document.getElementById(`alt-mode-manual-${safeId}`);
        const isManual = manualRadio && manualRadio.checked;
        altMode = isManual ? 'manual' : 'auto';
        if (isManual) {
          const manualInput = document.getElementById(`alt-amount-${safeId}`);
          altAmount = manualInput ? (parseInt(manualInput.value) || 0) : 0;
          altConfirmNote = `\n💱 折抵方式：自訂折抵 ${altAmount} 個`;
        } else {
          altConfirmNote = `\n💱 折抵方式：自動用掉需要的份量`;
        }
      }

      let confirmMsg = isHold 
        ? `🎁 此為條件福利！\n\n系統僅會驗證您是否持有足夠的【${currencyName}】作為領取條件，實際扣款為 0。\n確定要領取 ${qty} 個 ${displayItemName} 嗎？` 
        : `確定要花費 ${currencyName} 兌換 ${qty} 個 ${displayItemName} 嗎？${altConfirmNote}`;
      if (!confirm(confirmMsg)) return;

      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading-text').innerText = "⏳ 正在處理訂單...";
      fetch(`${GAS_API_URL}?action=buy&discordId=${currentUser.id}&itemId=${itemId}&itemName=${encodeURIComponent(itemName)}&qty=${qty}&altMode=${altMode}&altAmount=${altAmount}&unlockPassword=${encodeURIComponent(unlockPassword)}`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          let successMsg = "✅ 兌換處理完成！";
          if (data.altAmountUsed > 0 && data.altCurrencyName) {
            successMsg += `\n💱 已折抵 ${data.altAmountUsed} 個 ${data.altCurrencyName}`;
          }
          if (data.displayExt) {
            successMsg += `\n\n🎉 恭喜您開出了：\n【 ${data.displayExt} 】！`;
          } else if (data.rewardVar && data.totalReward > 0) {
            successMsg += `\n\n🎉 恭喜您獲得了：【 ${data.totalReward} 點 ${data.rewardVar} 】！`;
          }
          if (data.keys && data.keys.length > 0) {
            successMsg += "\n\n🎁 您獲得的專屬序號：\n" + data.keys.join("\n") + "\n\n(可至「紀錄」隨時查詢)";
          }
          alert(successMsg);
          fetchScoresAndShop(currentUser.id); 
        } else if (data.needUnlock) {
          // 🌟 密碼錯誤,或分類密碼解鎖後接著發現商品自己還有另一層鎖:重新提示一次密碼,輸入後自動重試同一筆購買
          document.getElementById('loading').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          const retryLabel = data.needUnlock === 'CATEGORY' ? '分類密碼' : '商品密碼';
          const retryEntered = prompt(`${data.message}\n請重新輸入${retryLabel}：`);
          if (retryEntered !== null && retryEntered.trim() !== '') {
            buyItem(itemId, itemName, safeId, maxQty, currencyName, retryEntered.trim());
          }
        } else {
          alert("❌ 兌換失敗：" + data.message);
          if (data.message.includes("庫存") || data.message.includes("限購") || data.message.includes("售完") || data.message.includes("上限") || data.message.includes("條件")) {
            document.getElementById('loading-text').innerText = "🔄 正在同步最新資料...";
            fetchScoresAndShop(currentUser.id);
          } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
          }
        }
      })
      .catch(err => {
        alert("網路錯誤，請稍後再試！");
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      });
    }

    function logout() {
      localStorage.removeItem('dc_access_token'); localStorage.removeItem('dc_token_type');
      window.location.href = "https://jay870122.github.io/DCGI/";
    }

    function startCountdowns() {
      if (countdownInterval) clearInterval(countdownInterval);
      
      countdownInterval = setInterval(() => {
        const timers = document.querySelectorAll('.countdown-timer');
        if (timers.length === 0) return;
        
        let needsReRender = false;
        const now = new Date().getTime();
        
        timers.forEach(timer => {
          const itemId = timer.getAttribute('data-id');
          const startStr = timer.getAttribute('data-start');
          const endStr = timer.getAttribute('data-end');
          
          const start = startStr ? parseInt(startStr) : null;
          const end = endStr ? parseInt(endStr) : null;
          
          let itemIndex = currentShopItems.findIndex(i => i.id === itemId);
          if(itemIndex === -1) return;
          let item = currentShopItems[itemIndex];
          
          if (item.state === 'sold_out') {
            timer.innerText = "已售完 / 達到上限";
            timer.style.color = "#72767D";
            return;
          }
          
          if (start && now < start) {
            let diff = start - now;
            timer.innerText = `距離開始剩餘：${formatTimeDiff(diff)}`;
            timer.style.color = "#FEE75C"; 
          } else if (end && now < end) {
            if (item.state === 'not_started') {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true; 
            }
            let diff = end - now;
            timer.innerText = `距離結束剩餘：${formatTimeDiff(diff)}`;
            timer.style.color = "#58FF9C"; 
          } else if (end && now >= end) {
            if (item.state === 'available') {
              item.state = 'ended';
              item.stateMsg = '活動結束';
              needsReRender = true;
            }
            timer.innerText = "活動已結束";
            timer.style.color = "#ED4245"; 
          } else {
            if (item.state === 'not_started') {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true;
            }
            timer.innerText = "無限期兌換中";
            timer.style.color = "#58FF9C";
          }
        });
        
        if (needsReRender) {
          renderShop();
        }
      }, 1000);
    }

    function formatTimeDiff(ms) {
      let seconds = Math.floor((ms / 1000) % 60);
      let minutes = Math.floor((ms / 1000 / 60) % 60);
      let hours = Math.floor((ms / 1000 / 60 / 60) % 24);
      let days = Math.floor(ms / 1000 / 60 / 60 / 24);
      
      let str = "";
      if (days > 0) str += `${days}天 `;
      str += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      return str;
    }
    
    // 🌟 複製商品專屬網址
    function selectAuctionCategory(cat) {
      currentAuctionCategory = cat;
      renderAuctions();
    }

    function shareAuction(auctionId, auctionName) {
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?auction=${auctionId}`;

      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製拍賣【${auctionName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }

    function shareItem(itemId, itemName) {
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?item=${itemId}`;
      
      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);
      
      alert(`🔗 已複製商品【${itemName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }

    // 🌟 複製分類專屬網址 (新增)
    function shareCategory(event, catName) {
      event.stopPropagation(); // 避免觸發上層的 onclick 切換分類
      
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?category=${encodeURIComponent(catName)}`;
      
      const displayCatName = catName;

      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);

      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製分類【${displayCatName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }

    function shareAuctionCategory(event, catName) {

      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?auctionCategory=${encodeURIComponent(catName)}`;

      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製拍賣分類【${catName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }
  </script>
