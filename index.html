          bidRowHtml = `
            ${auctionAltHtml}
            <div class="auction-bid-row">
              <input type="number" class="auction-bid-input" id="bid-input-${a.id}" ${bidInputAttrs} oninput="updateAuctionAltPreview('${a.id}')">
              <button class="auction-bid-btn" id="bid-btn-${a.id}" onclick="submitBid('${a.id}', '${a.name.replace(/'/g, "\\'")}')">出價</button>
            </div>`;
        }

        const imageHtml = a.imageUrl ? `<img src="${a.imageUrl}" class="auction-image" alt="拍賣品圖片" title="點擊放大觀看" onclick="openImage('${a.imageUrl}')">` : '';
        const remarkHtml = a.remark ? `<div class="item-remark" style="margin-bottom:10px;">📝 ${a.remark}</div>` : '';

        container.insertAdjacentHTML('beforeend', `
          <div class="auction-card ${isEnded ? 'ended' : ''}" id="auction-card-${a.id}">
            ${imageHtml}
            <div class="auction-header">
              <div style="display: flex; align-items: center;">
                <span class="auction-name">${a.name}</span>
                <span class="btn-share" onclick="shareAuction('${a.id}', '${a.name.replace(/'/g, "\\'")}')" title="複製分享連結">🔗</span>
              </div>
              <span class="auction-type-badge ${typeClass}">${typeLabel}</span>
            </div>
            ${remarkHtml}
            ${roleTagHtml}
            <div class="auction-info">
              ${priceInfoHtml}${myBidHtml}<br>
              ⏳ ${countdownHtml}
            </div>
            ${extendHintHtml}
            ${statusHtml}
            ${bidRowHtml}
          </div>
        `);
      });
      updateAuctionCountdowns();

      // 🌟 檢查是否有待跳轉的分享拍賣,捲動並高亮該卡片
      const targetAuctionId = localStorage.getItem('shared_auction_target');
      if (targetAuctionId) {
        setTimeout(() => {
          const el = document.getElementById('auction-card-' + targetAuctionId);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.style.transition = "box-shadow 0.3s ease-in-out";
            el.style.boxShadow = "0 0 20px 6px #F0B232";
            setTimeout(() => { el.style.boxShadow = "none"; }, 3000);
          }
          localStorage.removeItem('shared_auction_target');
        }, 300);
      }
    }

    // 🌟 【重要修正】用 Set 記錄哪些拍賣已經因為倒數歸零觸發過重整,這個變數在模組層級、
    // 不會因為 renderAuctions() 重建 DOM 而重設。之前用 el.dataset.reloaded 當標記,
    // 但每次 loadAuctions() 都會整個重建 DOM、產生全新的元素,標記形同虛設,
    // 導致「倒數歸零的拍賣」每 1.5~2.5 秒就再觸發一次 loadAuctions(),永遠停不下來——
    // 尤其好幾場拍賣剛好同時到期、又有好幾個人同時開著頁面時,會疊加成大量重複請求。
    const auctionCountdownReloadTriggered = new Set();

    function updateAuctionCountdowns() {
      document.querySelectorAll('.auction-countdown').forEach((el) => {
        const now = new Date().getTime();
        const startAttr = el.getAttribute('data-start');
        const auctionId = el.getAttribute('data-auction-id');

        if (startAttr) {
          // 🌟 起標倒數
          const start = parseInt(startAttr);
          if (now >= start) {
            el.innerText = '即將開放，重新整理中...';
            el.style.color = '#FEE75C';
            const key = 'start:' + auctionId;
            if (auctionId && !auctionCountdownReloadTriggered.has(key)) {
              auctionCountdownReloadTriggered.add(key);
              setTimeout(loadAuctions, 1500);
            }
          } else {
            el.innerText = formatTimeDiff(start - now) + ' 後開始';
            el.style.color = '#00AFF4';
          }
          return;
        }

        const end = parseInt(el.getAttribute('data-end'));
        if (now >= end) {
          el.innerText = '已截止';
          el.style.color = '#ED4245';
          // 截止後重新整理一次列表,讓畫面切換成「等待結算/已結標」狀態,不會一直卡在出價中的樣子
          const key = 'end:' + auctionId;
          if (auctionId && !auctionCountdownReloadTriggered.has(key)) {
            auctionCountdownReloadTriggered.add(key);
            setTimeout(loadAuctions, 1500);
          }
        } else {
          el.innerText = formatTimeDiff(end - now) + ' 後截止';
          el.style.color = '#58FF9C';
        }
      });
    }

    // 🌟 拍賣替代貨幣折抵:勾選後顯示模式選項,並更新預覽
    function onAuctionAltToggle(auctionId) {
      const enabled = document.getElementById(`alt-toggle-auction-${auctionId}`).checked;
      const row = document.getElementById(`alt-mode-row-auction-${auctionId}`);
      if (row) row.style.display = enabled ? 'flex' : 'none';
      updateAuctionAltPreview(auctionId);
    }

    // 🌟 拍賣替代貨幣折抵:即時算出折抵後這筆出價還要凍結多少原始貨幣
    function updateAuctionAltPreview(auctionId) {
      const info = auctionAltInfo[auctionId];
      const previewEl = document.getElementById(`alt-preview-auction-${auctionId}`);
      if (!info || !previewEl) return;

      const toggleEl = document.getElementById(`alt-toggle-auction-${auctionId}`);
      const manualInput = document.getElementById(`alt-amount-auction-${auctionId}`);
      const manualRadio = document.getElementById(`alt-mode-manual-auction-${auctionId}`);
      const isManual = manualRadio && manualRadio.checked;
      if (manualInput) manualInput.style.display = isManual ? '' : 'none';

      if (!toggleEl || !toggleEl.checked) { previewEl.textContent = ''; return; }

      const bidInput = document.getElementById(`bid-input-${auctionId}`);
      const bidAmount = bidInput ? (parseInt(bidInput.value) || 0) : 0;
      if (bidAmount <= 0) { previewEl.textContent = '請先輸入出價金額'; return; }

      let requested;
      if (isManual) {
        const maxUsefulAlt = info.rate > 0 ? Math.ceil(bidAmount / info.rate) : 0;
        const cap = Math.min(info.balance, maxUsefulAlt);
        if (manualInput) manualInput.max = cap;
        requested = manualInput ? (parseInt(manualInput.value) || 0) : 0;
        if (requested < 0) requested = 0;
        requested = Math.min(requested, cap);
      } else {
        requested = info.balance;
      }

      const result = computeAltUsageClient(bidAmount, info.balance, info.rate, requested);
      previewEl.textContent = result.used > 0
        ? `折抵 ${result.used} 個 ${info.altName} → 這筆出價還需凍結 ${result.mainNeeded} ${info.mainCurrency}`
        : `目前折抵 0 個(${info.altName} 數量不足以湊到最小可折抵單位,或尚未輸入數量)`;
    }

    function submitBid(auctionId, auctionName) {
      if (!currentUser) return;
      const input = document.getElementById(`bid-input-${auctionId}`);
      const btn = document.getElementById(`bid-btn-${auctionId}`);
      const amount = parseInt(input.value);
      if (!amount || amount <= 0) { alert('請輸入有效的出價金額'); return; }

      // 🌟 替代貨幣折抵:讀取玩家在拍賣卡片上勾選的折抵模式/數量
      let altMode = 'none', altAmount = 0, altConfirmNote = '';
      const altToggle = document.getElementById(`alt-toggle-auction-${auctionId}`);
      if (altToggle && altToggle.checked) {
        const manualRadio = document.getElementById(`alt-mode-manual-auction-${auctionId}`);
        const isManual = manualRadio && manualRadio.checked;
        altMode = isManual ? 'manual' : 'auto';
        if (isManual) {
          const manualInput = document.getElementById(`alt-amount-auction-${auctionId}`);
          altAmount = manualInput ? (parseInt(manualInput.value) || 0) : 0;
          altConfirmNote = `\n💱 折抵方式：自訂折抵 ${altAmount} 個`;
        } else {
          altConfirmNote = `\n💱 折抵方式：自動用掉需要的份量`;
        }
      }

      if (!confirm(`確定要對「${auctionName}」出價 ${amount} 嗎？${altConfirmNote}`)) return;

      const originalBtnText = btn.innerText;
      btn.disabled = true;
      btn.innerText = '⏳ 出價中請稍後...';
      input.disabled = true;

      fetch(`${GAS_API_URL}?action=bid&discordId=${currentUser.id}&auctionId=${auctionId}&bidAmount=${amount}&altMode=${altMode}&altAmount=${altAmount}&accessToken=${encodeURIComponent(getAccessToken())}`)
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          alert('✅ 出價成功！');
          // 🌟 先刷新分數(更新餘額顯示),完成後再重新整理拍賣列表,
          // 這樣拍賣彈窗標題旁的貨幣顯示才會是扣款後的最新餘額,不會還停在出價前的舊數字
          fetchScoresAndShop(currentUser.id, loadAuctions);
        } else {
          alert('❌ 出價失敗：' + data.message);
          loadAuctions();
        }
      })
      .catch((err) => {
        console.error('出價錯誤:', err);
        alert('網路錯誤，請稍後再試！');
        // 🌟 網路錯誤時列表不會重新整理,要自己手動把按鈕跟輸入框解鎖,不然會卡住
        btn.disabled = false;
        btn.innerText = originalBtnText;
        input.disabled = false;
      });
    }


function fetchScoresAndShop(discordId, callback = null) {
      document.getElementById('loading-text').innerText = "⏳ 載入分數與商店目錄...";

      fetch(`${DASHBOARD_WORKER_URL}?discordId=${discordId}&accessToken=${encodeURIComponent(getAccessToken())}`)
      .then(res => res.json())
      .then(result => {
        if (result.status !== "success") {
          // 🌟 原本這裡只有 return,Worker 回傳失敗(例如試算表暫時讀取失敗、Google 認證過期、玩家資料格式異常等)
          // 時畫面會永遠停在「⏳ 載入分數與商店目錄...」不會有任何提示,也叫不出重整鈕。
          // 改成清楚顯示錯誤原因 + 一個可以重新嘗試的按鈕,不要讓玩家卡住不知道發生什麼事。
          console.error("讀取分數與商店資料失敗:", result.message);
          document.getElementById('loading-text').innerHTML =
            `❌ 載入失敗：${result.message || '未知錯誤'}<br><button class="btn-action" style="margin-top:12px" onclick="fetchScoresAndShop('${discordId}')">🔄 點我重試</button>`;
          return;
        }

        const data = result.scores;
        if(data && data.status === "success") {
          document.getElementById('score-s1').innerText = data.s1;
          document.getElementById('score-s2').innerText = data.s2;
          document.getElementById('score-s3').innerText = data.s3;
          if (parseInt(data.s3) === 0) document.getElementById('score-s3-container').style.display = 'none';
          else document.getElementById('score-s3-container').style.display = 'flex';

          document.querySelectorAll('.dynamic-score-item').forEach(e => e.remove());
          latestCustomVars = data.customVars || []; // 🌟 背包彈窗要用完整清單(不篩選)
          if(data.customVars && data.customVars.length > 0) {
            const container = document.getElementById('score-box-container');
            data.customVars.forEach(v => {
              const mode = (v.mode || '').toString().trim().toUpperCase();
              if (mode === 'HIDDEN') return; // 一律不在主列顯示,只有背包看得到
              if (mode === 'HIDE_ZERO' && (parseInt(v.value) || 0) === 0) return; // 數值0時不在主列顯示
              container.insertAdjacentHTML('beforeend', `<div class="score-item dynamic-score-item">💠 ${v.display}: <span class="dynamic-score-value">${v.value}</span></div>`);
            });
          }

          // 🌟 顯示玩家目前持有的身分組
          const roleContainer = document.getElementById('role-box-container');
          roleContainer.innerHTML = '';
          if (data.roleNames && data.roleNames.length > 0) {
            data.roleNames.forEach(name => {
              roleContainer.insertAdjacentHTML('beforeend', `<div class="role-badge">🏅 ${name}</div>`);
            });
          }
        }

        const shopData = result.shop;
        if(shopData && shopData.status === "success") {

          // ==========================================
          // 🌟 管理員設定區塊
          // ==========================================
          const ADMIN_IDS = ['176681551189377024', '425655020017680395', '999888777666555444']; 
          const isAdmin = ADMIN_IDS.includes(discordId);

          // 🌟 判斷：如果是管理員就保留，如果不是管理員就過濾掉 [隱藏] 商品
          currentShopItems = shopData.items.filter(item => {
            if (item.name.includes('[隱藏]')) return isAdmin;
            return true;
          });

          if (shopData.categoryOrder && shopData.categoryOrder.length > 0) {
            CATEGORY_ORDER = shopData.categoryOrder;
          }

          // 🌟 檢查是否有待跳轉的分享分類 / 分享商品(分享特定商品時要優先切到該商品的分類,
          // 不然如果目前分類跟商品所在分類不同,商品會被篩選濾掉、導致捲動定位永遠找不到卡片)
          const allCats = Array.from(new Set(currentShopItems.map(item => item.category)));
          const targetCategory = localStorage.getItem('shared_category_target');
          const targetItemId = localStorage.getItem('shared_item_target');
          const targetItem = targetItemId ? currentShopItems.find(item => item.id === targetItemId) : null;

          if (targetItem && targetItem.category) {
            currentCategory = targetItem.category;
            localStorage.removeItem('shared_category_target');
          } else if (targetCategory && allCats.includes(targetCategory)) {
            currentCategory = targetCategory;
            localStorage.removeItem('shared_category_target');
          } else {
            localStorage.removeItem('shared_category_target');
            // 🌟 沒有指定分類(或上次選的分類已經不存在)時,預設選排序後的第一個分類,而不是「所有商品」
            if (!currentCategory || !allCats.includes(currentCategory)) {
              allCats.sort((a, b) => getCategoryOrderIndex(a, CATEGORY_ORDER) - getCategoryOrderIndex(b, CATEGORY_ORDER));
              currentCategory = allCats[0] || null;
            }
          }

          allShopParentNames = new Set();
          allCats.forEach(cat => {
            const idx = cat.indexOf('＞') !== -1 ? cat.indexOf('＞') : cat.indexOf('>');
            if (idx !== -1) allShopParentNames.add(cat.substring(0, idx).trim());
          });
          applyShopAccordion(currentCategory);
          renderSidebar(); 
          renderShop();    
          document.getElementById('loading').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
        }

        if(callback) callback(); 

        // 🌟 檢查是否有待跳轉的分享商品
        const targetId = localStorage.getItem('shared_item_target');
        if (targetId) {
          setTimeout(() => {
            const el = document.getElementById('card-item-' + targetId);
            if (el) {
              // 平滑滾動到該商品
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              // 加入發光特效吸引目光
              el.style.transition = "box-shadow 0.3s ease-in-out";
              el.style.boxShadow = "0 0 20px 6px #5865F2";
              setTimeout(() => { el.style.boxShadow = "none"; }, 3000); // 3秒後移除發光
            }
            localStorage.removeItem('shared_item_target'); // 執行完就清掉記憶
          }, 600); // 等待畫面渲染一下再滑動
        }

        // 🌟 檢查是否有待跳轉的分享拍賣或分享拍賣分類
        const targetAuctionId = localStorage.getItem('shared_auction_target');
        const targetAuctionCategory = localStorage.getItem('shared_auction_category_target');
        if (targetAuctionId || targetAuctionCategory) {
          showAuctions(); // 自動開啟拍賣會彈窗,裡面渲染完成後會自己捲動定位高亮/切換分類(見renderAuctions)
        }
      })
      .catch(err => {
        console.error("載入失敗:", err);
        document.getElementById('loading-text').innerHTML =
          `❌ 載入失敗，請稍後再試<br><button class="btn-action" style="margin-top:12px" onclick="fetchScoresAndShop('${discordId}')">🔄 點我重試</button>`;
      });
    }
    function renderShop() {
      const container = document.getElementById('shop-list');
      const sortType = document.getElementById('sort-items').value;
      let displayItems = [...currentShopItems];
      itemAltInfo = {}; // 🌟 每次重繪商店都重置替代貨幣資訊快取

      let isCatBlurLocked = false; // 🌟 這個分類是「模糊顯示」模式且還沒解鎖,渲染完後要整個包一層模糊遮罩
      let catLockSampleForHint = null; // 🌟 記住分類鎖定資訊(含提示詞),函式結尾組裝模糊橫幅時還要用到
      if (currentCategory) {
        displayItems = displayItems.filter(item => item.category === currentCategory);

        // 🌟 分類密碼鎖定:還沒解鎖的話,依照顯示模式決定「完全隱藏內容」/「模糊顯示」/「正常顯示只鎖購買」
        const catLockSample = currentShopItems.find(item => item.category === currentCategory);
        catLockSampleForHint = catLockSample;
        const isCatLocked = catLockSample && catLockSample.categoryLocked && !catLockSample.categoryUnlocked && !categoryUnlockedThisSession.has(currentCategory);
        if (isCatLocked) {
          if (catLockSample.categoryLockVisibility === 'BLUR') {
            isCatBlurLocked = true;
          } else if (catLockSample.categoryLockVisibility !== 'VISIBLE') {
            // 預設(未設定/HIDDEN):完全隱藏內容,只顯示鎖定畫面
            const hideGuessHtml = guessRemainHint(catLockSample.categoryLockGuessRemain, catLockSample.categoryLockGuessPeriodLabel);
            container.innerHTML = `
              <div class="category-lock-screen">
                <div class="category-lock-icon">🔒</div>
                <div class="category-lock-title">「${currentCategory}」需要密碼才能瀏覽${hideGuessHtml}</div>
                <button class="btn-action" onclick="promptUnlockCategory('${currentCategory.replace(/'/g,"\\'")}')">輸入密碼解鎖</button>
              </div>`;
            return;
          }
          // VISIBLE:什麼都不做,往下正常渲染——商品卡片本來就會用 categoryLocked/categoryUnlocked
          // 顯示鎖定提示並擋住購買按鈕(跟商品自己的鎖定提示是同一套邏輯)
        }
      }
      if (sortType === 'avail-first') {
        displayItems.sort((a, b) => {
          if (a.state === 'available' && b.state !== 'available') return -1;
          if (a.state !== 'available' && b.state === 'available') return 1;
          return 0;
        });
      } else if (sortType === 'price-low') displayItems.sort((a, b) => a.price - b.price);
      else if (sortType === 'price-high') displayItems.sort((a, b) => b.price - a.price);

      container.innerHTML = "";
      if (displayItems.length === 0) {
        container.innerHTML = "<div style='color:#B9BBBE; padding: 20px;'>此分類目前無商品</div>";
        return;
      }

      let allCardsHtml = '';
      displayItems.forEach((item) => {
        const isAvail = item.state === "available";
        const badgeClass = isAvail ? "badge-avail" : "badge-unavail";
        const safeId = "item-" + item.id; 

        // 🌟 商品密碼鎖定 + 解鎖前顯示模式:還沒解鎖的話,依設定決定「完全隱藏(不留痕跡)」或「模糊顯示」
        // 🌟 這個商品是不是還處於「鎖定中」——可能是商品自己設了密碼,也可能是純粹繼承分類的鎖定(商品本身沒設密碼,但分類還沒解鎖)
        const itemEffectivelyLocked = (item.itemLocked && !item.itemUnlocked) || (item.categoryLocked && !item.categoryUnlocked);
        if (itemEffectivelyLocked && item.itemLockVisibility === 'HIDDEN') {
          return; // 🌟 完全隱藏:連卡片都不產生,不留任何痕跡
        }
        const itemBlurLocked = itemEffectivelyLocked && item.itemLockVisibility === 'BLUR';
        if (itemBlurLocked) {
          const blurCatStillLocked = item.categoryLocked && !item.categoryUnlocked;
          const blurHintText = blurCatStillLocked ? item.categoryLockHintText : item.itemLockHintText;
          const blurHintHtml = blurHintText ? `<div class="item-blur-hint">💡 提示：${blurHintText}</div>` : '';
          const blurGuessRemain = blurCatStillLocked ? item.categoryLockGuessRemain : item.itemLockGuessRemain;
          const blurGuessPeriod = blurCatStillLocked ? item.categoryLockGuessPeriodLabel : item.itemLockGuessPeriodLabel;
          const blurGuessHtml = guessRemainHint(blurGuessRemain, blurGuessPeriod);
          const blurGuessDivHtml = blurGuessHtml ? `<div class="item-blur-hint">${blurGuessHtml.replace(/^<br>/, '')}</div>` : '';
          allCardsHtml += `
            <div class="shop-item-card item-blur-card" id="card-${safeId}">
              <div class="item-blur-content">
                <div class="item-blur-icon">🔒</div>
                <div class="item-blur-name">？？？？？</div>
                <div class="item-blur-price">？？？ ${item.displayCurrency}</div>
                ${blurHintHtml}
                ${blurGuessDivHtml}
              </div>
              <button class="btn btn-buy" onclick="promptUnlockItem('${item.id}', '${safeId}')">🔒 輸入密碼解鎖查看</button>
            </div>
          `;
          return; // 🌟 跳過這個商品剩下的正常渲染邏輯
        }
        
        let limitsHtml = `<div class="limit-tags">`;
        if (item.limits.remainGD !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服今日: ${item.limits.remainGD}</span>`;
        if (item.limits.remainGW !== null) limitsHtml += `<span class="limit-tag tag-global">🌍 全服本周: ${item.limits.remainGW}</span>`;

    function onAltCurrencyToggle(safeId) {

    // 🌟 替代貨幣折抵(自動模式):依勾選順序依序折抵,邏輯要跟後端 Code.gs 的 computeMultiAltUsage_ 完全一致
    function computeMultiAltUsageAutoClient(totalCost, selectedCurrencies) {
      let remaining = totalCost;
      const used = [];
      for (const cur of selectedCurrencies) {
        if (remaining <= 0) break;
        if (!(cur.balance > 0)) continue;
        const maxUseful = Math.ceil(remaining / cur.rate);
        const requested = Math.min(cur.balance, maxUseful);
        const coverage = Math.min(remaining, Math.floor(requested * cur.rate));
        const amt = coverage > 0 ? Math.min(requested, Math.ceil(coverage / cur.rate)) : 0;
        if (amt > 0) { used.push({ name: cur.name, displayName: cur.displayName, amount: amt }); remaining -= coverage; }
      }
      return { mainNeeded: remaining, used };
    }

    function updateAltPreview(safeId) {

      const checkedBoxes = Array.from(document.querySelectorAll(`.alt-cur-checkbox[data-safeid="${safeId}"]:checked`));
      const selectedNames = checkedBoxes.map(cb => cb.dataset.name);
      const selectedCurrencies = info.currencies.filter(c => selectedNames.includes(c.name));

      const manualRadio = document.querySelector(`input[name="alt-mode-${safeId}"][value="manual"]`);
      const isManual = manualRadio && manualRadio.checked;

      if (selectedCurrencies.length === 0) { previewEl.textContent = ''; if (manualBox) manualBox.innerHTML = ''; return; }

      const qtyEl = document.getElementById(`qty-${safeId}`);
      const qty = qtyEl ? (parseInt(qtyEl.value) || 1) : 1;
      const totalCost = info.price * qty;

      if (isManual) {
        // 🌟 自訂數量:每個勾選的幣種各給一個輸入框,沒畫過的才重新畫,避免玩家輸入到一半被重繪清空
        if (manualBox && manualBox.dataset.for !== selectedNames.join(',')) {
          manualBox.dataset.for = selectedNames.join(',');
          manualBox.innerHTML = selectedCurrencies.map(c => `
            <div class="alt-manual-row">
              <span>${c.displayName}：</span>
              <input type="number" min="0" max="${c.balance}" value="0" id="alt-manual-${safeId}-${c.name}" oninput="updateAltPreview('${safeId}')">
              <span>（你有 ${c.balance}）</span>
            </div>`).join('');
        }
        let remaining = totalCost, usedText = [];
        selectedCurrencies.forEach(c => {
          const inp = document.getElementById(`alt-manual-${safeId}-${c.name}`);
          let amt = inp ? (parseInt(inp.value) || 0) : 0;
          if (amt < 0) amt = 0;
          if (amt > c.balance) amt = c.balance;
          const coverage = Math.floor(amt * c.rate);
          if (amt > 0) { usedText.push(`${amt} ${c.displayName}`); remaining -= coverage; }
        });
        previewEl.textContent = usedText.length > 0
          ? `折抵 ${usedText.join('、')} → 還需支付 ${Math.max(0, remaining)} ${info.mainCurrency}`
          : `目前折抵 0 個(請輸入要折抵的數量)`;
      } else {
        if (manualBox) { manualBox.innerHTML = ''; manualBox.dataset.for = ''; }
        const result = computeMultiAltUsageAutoClient(totalCost, selectedCurrencies);
        previewEl.textContent = result.used.length > 0
          ? `折抵 ${result.used.map(u => `${u.amount} ${u.displayName}`).join('、')} → 還需支付 ${result.mainNeeded} ${info.mainCurrency}`
          : `目前折抵 0 個(選擇的幣種數量不足以湊到最小可折抵單位)`;
      }
    }

    // 🌟🔧 賭博集資池「下注當下鎖定」模式:賠率只看「下注前」的池子狀態(不含這筆金額本身),
    // 所以同一筆下注不管金額多少,倍率都一樣(公式要跟 Code.gs 的 gOddsAtBetTime 完全一致)
    // 🌟 賠率統一格式化成兩位小數顯示(例如 x1 顯示成 x1.00),純粹是排版一致,不影響實際計算數字
    function fmtOdds(x) {
      return Number(x).toFixed(2);
    }

    function computeGamblingLockOdds(item, optionName) {
      const opt = item.gamblingOptions.find(o => o.name === optionName);
      if (!opt) return null;
      let odds;
      if (opt.pool === 0) odds = item.gamblingOptions.length; // 這個選項還沒人下注過:用選項數量當參考值
      else odds = Math.round((item.gamblingTotalPool / opt.pool) * 100) / 100;
      // 🌟 套用最高賠率上限封頂(如果商品有設定),跟後端算出來的鎖定賠率保持一致,避免出現誇張倍率
      if (item.gamblingMaxOdds > 0 && odds > item.gamblingMaxOdds) odds = item.gamblingMaxOdds;
      return odds;
    }

    // 🌟 下拉選單/數量輸入框一變動就即時重算一次「送出後會鎖定的賠率」,顯示給玩家看,
    // 這個值同時也是 buyItem 送出時附帶的 expectedGamblingOdds,兩邊一定會一致,不會發生「明明沒人插隊卻被拒絕下注」的狀況
    function updateGamblingPreview(safeId) {
      const previewEl = document.getElementById(`gpreview-${safeId}`);
      if (!previewEl) return; // 這個商品不是「集資池+下注當下鎖定」模式,沒有這個預覽區塊
      const gOptSelect = document.getElementById(`gopt-${safeId}`);
      const qtyInput = document.getElementById(`qty-${safeId}`);
      const optionName = gOptSelect ? gOptSelect.value : '';
      const qty = qtyInput ? (parseInt(qtyInput.value) || 0) : 0;
      if (!optionName || qty <= 0) { previewEl.textContent = ''; return; }
      const targetItemId = safeId.replace(/^item-/, '');
      const item = currentShopItems.find(it => it.id === targetItemId);
      if (!item) { previewEl.textContent = ''; return; }
      const betAmount = qty * item.price;
      const odds = computeGamblingLockOdds(item, optionName);
      previewEl.textContent = odds !== null ? `📌 這次會鎖定的賠率：x${fmtOdds(odds)}（不會因為你填的數量而改變；若中獎可得約 ${Math.floor(betAmount * odds)} ${item.displayCurrency}）` : '';
    }

    function buyItem(itemId, itemName, safeId, maxQty, currencyName, unlockPasswordOverride) {
      if (!currentUser) return;
      const qtyInput = document.getElementById(`qty-${safeId}`);
      const qty = parseInt(qtyInput.value);
      
      if (qty < 1) { alert("數量必須大於 0！"); return; }
      if (qty > maxQty) { alert(`已超過限購數量！您目前最多只能買 ${maxQty} 個。`); return; }
      
      let isHold = itemName.includes('[持有]');
      let displayItemName = itemName.replace('[持有]', '').trim();

      // 🌟 密碼鎖定:如果商品或所在分類還沒解鎖,先跳出提示要求輸入密碼,不用等後端回錯誤才問一次
      let unlockPassword = unlockPasswordOverride || '';
      if (!unlockPassword) {
        const item = currentShopItems.find(it => it.id === itemId);
        if (item && ((item.categoryLocked && !item.categoryUnlocked) || (item.itemLocked && !item.itemUnlocked))) {
          const promptLabel = (item.categoryLocked && !item.categoryUnlocked)
            ? `此商品所在分類「${item.category}」需要密碼才能購買，請輸入密碼：`
            : '此商品需要密碼才能購買，請輸入密碼：';
          const entered = prompt(promptLabel);
          if (entered === null) return; // 使用者按取消
          unlockPassword = entered.trim();
        }
      }

      // 🌟 替代貨幣折抵:讀取玩家在卡片上勾選的幣種與折抵模式
      let altMode = 'none', altSelectedNames = [], altSelectedDisplayNames = [], altAmountsObj = {}, altConfirmNote = '';
      const checkedBoxes = Array.from(document.querySelectorAll(`.alt-cur-checkbox[data-safeid="${safeId}"]:checked`));
      if (checkedBoxes.length > 0) {
        altSelectedNames = checkedBoxes.map(cb => cb.dataset.name);
        altSelectedDisplayNames = checkedBoxes.map(cb => cb.dataset.displayName || cb.dataset.name);
        const manualRadio = document.querySelector(`input[name="alt-mode-${safeId}"][value="manual"]`);
        const isManual = manualRadio && manualRadio.checked;
        altMode = isManual ? 'manual' : 'auto';
        if (isManual) {
          altSelectedNames.forEach(name => {
            const inp = document.getElementById(`alt-manual-${safeId}-${name}`);
            altAmountsObj[name] = inp ? (parseInt(inp.value) || 0) : 0;
          });
          altConfirmNote = `\n💱 折抵方式：自訂數量（${altSelectedNames.map((n,idx) => `${altSelectedDisplayNames[idx]}:${altAmountsObj[n]}`).join('、')}）`;
        } else {
          altConfirmNote = `\n💱 折抵方式：自動折抵（${altSelectedDisplayNames.join('、')}）`;
        }
      }

      const itemForExtraCost = currentShopItems.find(it => it.id === itemId);
      const extraCostNote = (itemForExtraCost && itemForExtraCost.extraCost && itemForExtraCost.extraCost.length > 0)
        ? `\n➕ 另外還需要：${itemForExtraCost.extraCost.map(e => `${e.amount * qty} ${e.displayName}`).join('、')}`
        : '';

      // 🌟 賭博模式:讀取玩家在卡片上選的下注選項
      let gamblingOption = '';
      let expectedGamblingOdds = '';
      const gOptSelect = document.getElementById(`gopt-${safeId}`);
      if (gOptSelect) {
        gamblingOption = gOptSelect.value;
        if (!gamblingOption) { alert('請選擇要下注的選項！'); return; }
        // 🌟 集資池「以下注當下賠率為主」模式:用跟後端完全一致的公式(含這筆下注金額本身)算出預期賠率,
        // 一起送給後端比對,如果送出的當下被別人插隊改變了池子,後端會直接拒絕,不會用玩家沒看過的賠率成交
        const gItemForOdds = currentShopItems.find(it => it.id === itemId);
        if (gItemForOdds && gItemForOdds.gamblingOddsMode === 'POOL' && gItemForOdds.gamblingPoolLockMode === 'BETTIME') {
          const gLockOdds = computeGamblingLockOdds(gItemForOdds, gamblingOption);
          if (gLockOdds !== null) expectedGamblingOdds = gLockOdds;
        }
      }

      let confirmMsg = isHold 
        ? `🎁 此為條件福利！\n\n系統僅會驗證您是否持有足夠的【${currencyName}】作為領取條件，實際扣款為 0。\n確定要領取 ${qty} 個 ${displayItemName} 嗎？` 
        : gOptSelect
        ? `確定要花費 ${qty * (itemForExtraCost ? itemForExtraCost.price : 0)} ${currencyName} 下注「${gamblingOption}」嗎？${expectedGamblingOdds !== '' ? `\n📌 目前預計鎖定賠率：x${fmtOdds(expectedGamblingOdds)}（送出時如果賠率剛好變動，系統會拒絕下注，不會用您沒看過的賠率成交）` : ''}${extraCostNote}${altConfirmNote}\n\n⚠️ 賭博下注後無法取消,請確認清楚再送出。`
        : `確定要花費 ${currencyName} 兌換 ${qty} 個 ${displayItemName} 嗎？${extraCostNote}${altConfirmNote}`;
      if (!confirm(confirmMsg)) return;

      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading-text').innerText = "⏳ 正在處理訂單...";
      fetch(`${GAS_API_URL}?action=buy&discordId=${currentUser.id}&itemId=${itemId}&itemName=${encodeURIComponent(itemName)}&qty=${qty}&altMode=${altMode}&altSelected=${encodeURIComponent(altSelectedNames.join(','))}&altAmount=${encodeURIComponent(JSON.stringify(altAmountsObj))}&unlockPassword=${encodeURIComponent(unlockPassword)}&gamblingOption=${encodeURIComponent(gamblingOption)}&expectedGamblingOdds=${encodeURIComponent(expectedGamblingOdds)}&accessToken=${encodeURIComponent(getAccessToken())}`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          let successMsg = "✅ 兌換處理完成！";
          if (data.cost !== undefined && data.cost > 0) {
            successMsg += `\n💰 花費：${data.cost} ${data.costCurrencyName || currencyName}`;
          }
          if (data.isRaffle) {
            // 🌟 抽獎模式:買=投票,沒有開盲盒/里程碑那些東西,直接顯示後端組好的投票結果訊息就好
            successMsg += `\n\n🎟️ ${data.message}`;
            alert(successMsg);
            fetchScoresAndShop(currentUser.id);
            return;
          }
          if (data.isGambling) {
            // 🌟 賭博模式:買=下注,結果要等管理員手動公布,直接顯示後端組好的下注結果訊息就好
            successMsg += `\n\n🎲 ${data.message}`;
            alert(successMsg);
            fetchScoresAndShop(currentUser.id);
            return;
          }
          if (data.altUsed && data.altUsed.length > 0) {
            successMsg += `\n💱 已折抵 ${data.altUsed.map(u => `${u.amount} 個 ${u.displayName || u.name}`).join('、')}`;
          }
          if (data.extraCostUsed && data.extraCostUsed.length > 0) {
            successMsg += `\n➕ 已收取 ${data.extraCostUsed.map(e => `${e.amount} 個 ${e.displayName || e.name}`).join('、')}`;
          }
          if (data.displayExt) {
            successMsg += `\n\n🎉 恭喜您開出了：\n【 ${data.displayExt} 】！`;
          } else if (data.rewardVar && data.totalReward > 0) {
            successMsg += `\n\n🎉 恭喜您獲得了：【 ${data.totalReward} 點 ${data.rewardVar} 】！`;
          }
          if (data.totalRewards && data.totalRewards.length > 0) {
            successMsg += `\n📊 總共獲得：${data.totalRewards.join('、')}`;
          }
          if (data.keys && data.keys.length > 0) {
            successMsg += "\n\n🎁 您獲得的專屬序號：\n" + data.keys.join("\n") + "\n\n(可至「紀錄」隨時查詢)";
          }
          if (data.milestoneRewards && data.milestoneRewards.length > 0) {
            successMsg += "\n\n🏆 累積兌換里程碑獎勵：";
            data.milestoneRewards.forEach(m => { successMsg += `\n第 ${m.count} 次${m.repeat ? '(重複)' : ''}：獲得 ${m.rewardText}`; });
          }
          if (data.milestoneErrors && data.milestoneErrors.length > 0) {
            successMsg += "\n\n⚠️ 部分里程碑獎勵發放異常,請聯絡管理員補發：\n" + data.milestoneErrors.join("\n");
          }
          alert(successMsg);
          fetchScoresAndShop(currentUser.id); 
        } else if (data.needUnlock) {
          // 🌟 密碼錯誤,或分類密碼解鎖後接著發現商品自己還有另一層鎖:重新提示一次密碼,輸入後自動重試同一筆購買
          document.getElementById('loading').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          const retryLabel = data.needUnlock === 'CATEGORY' ? '分類密碼' : '商品密碼';
          const retryEntered = prompt(`${data.message}\n請重新輸入${retryLabel}：`);
          if (retryEntered !== null && retryEntered.trim() !== '') {
            buyItem(itemId, itemName, safeId, maxQty, currencyName, retryEntered.trim());
          }
        } else if (data.oddsChanged) {
          // 🌟 賭博集資池「下注當下鎖定」模式:送出的瞬間賠率被別人插隊改變了,拒絕成交,重新整理拿最新賠率給玩家重新確認
          alert("⚠️ " + data.message);
          document.getElementById('loading-text').innerText = "🔄 正在同步最新賠率...";
          fetchScoresAndShop(currentUser.id);
        } else {
          alert("❌ 兌換失敗：" + data.message);
          if (data.message.includes("庫存") || data.message.includes("限購") || data.message.includes("售完") || data.message.includes("上限") || data.message.includes("條件")) {
            document.getElementById('loading-text').innerText = "🔄 正在同步最新資料...";
            fetchScoresAndShop(currentUser.id);
          } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
          }
        }
      })
      .catch(err => {
        alert("網路錯誤，請稍後再試！");
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      });
    }

    function logout() {
      localStorage.removeItem('dc_access_token'); localStorage.removeItem('dc_token_type');
      window.location.href = "https://jay870122.github.io/DCGI/";
    }

    function startCountdowns() {
      if (countdownInterval) clearInterval(countdownInterval);
      
      countdownInterval = setInterval(() => {
        const timers = document.querySelectorAll('.countdown-timer');
        if (timers.length === 0) return;
        
        let needsReRender = false;
        const now = new Date().getTime();
        
        timers.forEach(timer => {
          const itemId = timer.getAttribute('data-id');
          const startStr = timer.getAttribute('data-start');
          const endStr = timer.getAttribute('data-end');
          
          const start = startStr ? parseInt(startStr) : null;
          const end = endStr ? parseInt(endStr) : null;
          
          let itemIndex = currentShopItems.findIndex(i => i.id === itemId);
          if(itemIndex === -1) return;
          let item = currentShopItems[itemIndex];
          
          if (item.state === 'sold_out') {
            timer.innerText = "已售完 / 達到上限";
            timer.style.color = "#72767D";
            return;
          }
          
          if (start && now < start) {
            let diff = start - now;
            timer.innerText = `距離開始剩餘：${formatTimeDiff(diff)}`;
            timer.style.color = "#FEE75C"; 
          } else if (end && now < end) {
            if (item.state === 'not_started') {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true; 
            }
            let diff = end - now;
            timer.innerText = `距離結束剩餘：${formatTimeDiff(diff)}`;
            timer.style.color = "#58FF9C"; 
          } else if (end && now >= end) {
            if (item.state === 'available') {
              item.state = 'ended';
              item.stateMsg = '活動結束';
              needsReRender = true;
            }
            timer.innerText = "活動已結束";
            timer.style.color = "#ED4245"; 
          } else {
            if (item.state === 'not_started') {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true;
            }
            timer.innerText = "無限期兌換中";
            timer.style.color = "#58FF9C";
          }
        });
        
        if (needsReRender) {
          renderShop();
        }
      }, 1000);
    }

    function formatTimeDiff(ms) {
      let seconds = Math.floor((ms / 1000) % 60);
      let minutes = Math.floor((ms / 1000 / 60) % 60);
      let hours = Math.floor((ms / 1000 / 60 / 60) % 24);
      let days = Math.floor(ms / 1000 / 60 / 60 / 24);
      
      let str = "";
      if (days > 0) str += `${days}天 `;
      str += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      return str;
    }
    
    // 🌟 手風琴效果:切換到某個拍賣分類時,自動收起其他展開的父分類,只留下這個分類所屬(或本身就是)的父分類
    function applyAuctionAccordion(cat) {
      lastAuctionAccordionCategory = cat;
      let owningParent = null;
      if (cat) {
        const idx = cat.indexOf('＞') !== -1 ? cat.indexOf('＞') : cat.indexOf('>');
        if (idx !== -1) owningParent = cat.substring(0, idx).trim();
        else if (allAuctionParentNames.has(cat)) owningParent = cat;
      }
      collapsedAuctionParents = new Set(Array.from(allAuctionParentNames).filter(p => p !== owningParent));
    }
    // 🌟 複製商品專屬網址
    function selectAuctionCategory(cat) {
      currentAuctionCategory = cat;
      applyAuctionAccordion(cat);
      renderAuctions();
    }

    function shareAuction(auctionId, auctionName) {
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?auction=${auctionId}`;

      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製拍賣【${auctionName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }

    function shareItem(itemId, itemName) {
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?item=${itemId}`;
      
      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);
      
      alert(`🔗 已複製商品【${itemName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }

    // 🌟 複製分類專屬網址 (新增)
    function shareCategory(event, catName) {
      event.stopPropagation(); // 避免觸發上層的 onclick 切換分類
      
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?category=${encodeURIComponent(catName)}`;
      
      const displayCatName = catName;

      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製分類【${displayCatName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }
    // 🌟 複製拍賣分類專屬網址 (新增)
    function shareAuctionCategory(event, catName) {
      event.stopPropagation(); // 避免觸發上層的 onclick 切換分類

      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?auctionCategory=${encodeURIComponent(catName)}`;

      // 建立隱藏輸入框來執行複製動作
      const tmp = document.createElement("input");
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand("copy");
      document.body.removeChild(tmp);

      alert(`🔗 已複製拍賣分類【${catName}】的專屬連結！\n快去 Discord 貼上分享給大家吧！`);
    }
  </script>
