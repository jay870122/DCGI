<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garbled 幻彩水晶商店</title>
  <style>
    /* 🌟 整體版面與寬度設定 */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #2C2F33; 
      color: white; 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px; 
      box-sizing: border-box; 
    }
    .card { 
      background-color: #23272A; 
      padding: 30px; 
      border-radius: 12px; 
      width: 100%; 
      max-width: 1100px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
      position: relative; 
    }
    
    /* 🌟 按鈕與輸入框樣式 */
    .btn { 
      color: white;
      padding: 12px; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: background 0.3s; 
      width: 100%; 
      display: inline-block;
      box-sizing: border-box; 
      text-decoration: none; 
      text-align: center;
    }
    .btn-login { background-color: #5865F2; margin-top: 20px; }
    .btn-login:hover { background-color: #4752C4; }
    .btn-buy { background-color: #43b581; margin-top: 10px; }
    .btn-buy:hover { background-color: #3ca374; }
    .btn-buy:disabled { background-color: #72767d; cursor: not-allowed; }
    
    .search-input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 20px;
      border: 1px solid #4f545c;
      border-radius: 8px;
      background-color: #2f3136;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #5865F2; outline: none; }

    /* 🌟 版面配置：側邊欄 + 商品列表 */
    .layout-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      align-items: flex-start;
    }
    .sidebar {
      flex: 0 0 200px;
      background-color: #2f3136;
      border-radius: 8px;
      padding: 15px 10px;
      position: sticky;
      top: 20px;
    }
    .main-content {
      flex: 1;
      min-width: 0;
    }
    
    /* 🌟 側邊欄分類項目 */
    .cat-item {
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      color: #b9bbbe;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cat-item:hover { background-color: #393c43; color: white; }
    .cat-item.active { background-color: #5865F2; color: white; }

    /* 🌟 分類分享按鈕 (新增) */
    .btn-share-cat {
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.2s;
      user-select: none;
      font-size: 14px;
    }
    .btn-share-cat:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    /* 🌟 商品清單與卡片 */
    #shop-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .shop-item {
      background-color: #2f3136;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: transform 0.2s;
      border: 1px solid #40444b;
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .shop-item:hover { transform: translateY(-5px); border-color: #5865F2; }
    .shop-item img {
      max-width: 100px;
      max-height: 100px;
      border-radius: 8px;
      margin-bottom: 15px;
      object-fit: cover;
    }
    .item-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #ffffff; }
    .item-desc { font-size: 13px; color: #b9bbbe; margin-bottom: 15px; flex-grow: 1; }
    .item-price { font-size: 16px; font-weight: bold; color: #faa61a; margin-bottom: 15px; }
    
    /* 🌟 狀態標籤 */
    .status-badge {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
    }
    .status-available { background-color: #43b581; color: white; }
    .status-soldout { background-color: #f04747; color: white; }
    .status-limit { background-color: #faa61a; color: white; }
    .status-notstarted { background-color: #7289da; color: white; }

    /* 🌟 倒數計時文字 */
    .timer-text { font-size: 12px; margin-bottom: 10px; font-weight: bold; color: #b9bbbe; }

    /* 🌟 彈出視窗 (Modal) */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal {
      background-color: #36393F; padding: 25px; border-radius: 12px;
      width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      color: white; border: 1px solid #202225;
    }
    .modal h2 { margin-top: 0; color: #ffffff; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { background-color: #4f545c; }
    .btn-cancel:hover { background-color: #3ba55d; }
    .btn-confirm { background-color: #ed4245; }
    .btn-confirm:hover { background-color: #c83336; }

    /* 🌟 使用者資訊區 */
    #user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #4f545c; }
    #user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #5865F2; }
    #score-display { font-size: 18px; font-weight: bold; color: #43b581; margin-top: 5px; }

    /* 🌟 載入動畫 */
    #loading { text-align: center; padding: 40px; font-size: 18px; color: #b9bbbe; }
    .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #5865F2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 🌟 商品分享按鈕 */
    .btn-share {
      position: absolute; top: 10px; left: 10px;
      background-color: rgba(47, 49, 54, 0.8); border: 1px solid #4f545c; color: white;
      border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-share:hover { background-color: #5865F2; border-color: #5865F2; }

    /* 🌟 RWD 響應式 */
    @media (max-width: 768px) {
      .layout-container { flex-direction: column; }
      .sidebar { flex: none; width: 100%; box-sizing: border-box; display: flex; overflow-x: auto; padding: 10px; white-space: nowrap; border-radius: 8px; top: 0; z-index: 10; margin-bottom: 10px; }
      .cat-item { margin-bottom: 0; margin-right: 10px; flex-shrink: 0; padding: 10px 15px; }
      #shop-list { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .btn-share { padding: 3px 6px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">
    <h1 style="text-align: center; margin-top: 0; color: #5865F2;">💎 Garbled 幻彩水晶商店</h1>

    <!-- 登入按鈕區域 -->
    <div id="login-container" style="text-align: center; padding: 40px 0;">
      <p style="color: #b9bbbe; font-size: 16px;">請先使用 Discord 登入，以查看您的餘額並購買商品。</p>
      <button class="btn btn-login" onclick="login()">🔗 使用 Discord 登入</button>
    </div>

    <!-- 商店主區域 (登入後顯示) -->
    <div id="shop-container" style="display: none;">
      <div id="user-info">
        <img id="user-avatar" src="" alt="Avatar">
        <div>
          <div style="font-size: 20px; font-weight: bold;" id="user-name"></div>
          <div id="score-display">幻彩水晶: 載入中...</div>
        </div>
      </div>

      <!-- 搜尋列 -->
      <input type="text" id="search-bar" class="search-input" placeholder="🔍 搜尋商品名稱..." oninput="handleSearch()">

      <div id="loading">
        <div class="spinner"></div>
        資料同步中，請稍候...
      </div>

      <div class="layout-container">
        <!-- 側邊欄分類 -->
        <div class="sidebar" id="category-sidebar">
          <!-- 分類會由 JS 生成 -->
        </div>

        <!-- 商品列表 -->
        <div class="main-content">
          <div id="shop-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 購買確認 Modal -->
  <div class="modal-overlay" id="buy-modal">
    <div class="modal">
      <h2>🛒 確認購買</h2>
      <p id="modal-desc"></p>
      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-confirm" id="confirm-buy-btn" onclick="executePurchase()">確認扣款</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // ⚠️ 請修改成你自己的設定檔
    // ==========================================
    const CLIENT_ID = 'YOUR_CLIENT_ID'; // <--- 修改這裡 (Discord Client ID)
    const REDIRECT_URI = encodeURIComponent(window.location.origin + window.location.pathname);
    const GAS_WEB_APP_URL = 'YOUR_GAS_URL'; // <--- 修改這裡 (Google Apps Script 網址)
    
    // 全域變數
    let currentUser = null;
    let currentScore = 0;
    let currentShopItems = [];
    let currentCategory = 'all';
    let searchQuery = '';
    let selectedItem = null;
    let CATEGORY_ORDER = []; // 接收後端的排序

    // ==========================================
    // 網頁載入與登入處理
    // ==========================================
    window.onload = () => {
      // 🌟 攔截分享網址的參數並記憶 (商品分享 & 分類分享)
      const urlParams = new URLSearchParams(window.location.search);
      const shareTarget = urlParams.get('item');
      const shareCategory = urlParams.get('category'); 

      let shouldCleanUrl = false;
      
      if (shareTarget) {
        localStorage.setItem('shared_item_target', shareTarget);
        shouldCleanUrl = true;
      }
      
      if (shareCategory) {
        localStorage.setItem('shared_category_target', shareCategory);
        shouldCleanUrl = true;
      }

      if (shouldCleanUrl) {
        window.history.replaceState({}, document.title, window.location.pathname); // 清除網址上的參數保持乾淨
      }

      // 檢查網址 hash 中是否有 access_token
      const hashString = window.location.hash.substring(1);
      if (hashString) {
        const params = new URLSearchParams(hashString);
        const accessToken = params.get('access_token');
        if (accessToken) {
          window.history.replaceState({}, document.title, window.location.pathname);
          fetchDiscordUser(accessToken);
          return;
        }
      }
      
      // 如果本地端已有紀錄
      const savedUser = localStorage.getItem('discord_user');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showShop();
        fetchScoresAndShop();
      }
    };

    function login() {
      const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
      window.location.href = authUrl;
    }

    function fetchDiscordUser(token) {
      fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(user => {
        currentUser = {
          id: user.id,
          username: user.username,
          avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png'
        };
        localStorage.setItem('discord_user', JSON.stringify(currentUser));
        showShop();
        fetchScoresAndShop();
      })
      .catch(err => {
        alert('Discord 登入失敗！請重試。');
        console.error(err);
      });
    }

    function showShop() {
      document.getElementById('login-container').style.display = 'none';
      document.getElementById('shop-container').style.display = 'block';
      document.getElementById('user-avatar').src = currentUser.avatar;
      document.getElementById('user-name').innerText = currentUser.username;
    }

    // ==========================================
    // 讀取分數與商店資料 (與 GAS 溝通)
    // ==========================================
    function fetchScoresAndShop() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('shop-list').innerHTML = '';

      let p1 = fetch(`${GAS_WEB_APP_URL}?action=getScore&discordId=${currentUser.id}`)
               .then(r => r.json());
      let p2 = fetch(`${GAS_WEB_APP_URL}?action=getShop`)
               .then(r => r.json());

      Promise.all([p1, p2]).then(results => {
        const scoreData = results[0];
        const shopData = results[1];

        if (scoreData.success) {
          currentScore = scoreData.score;
          document.getElementById('score-display').innerText = `幻彩水晶: ${currentScore}`;
        }

        if (shopData.success) {
          currentShopItems = shopData.items;

          if (shopData.categoryOrder && shopData.categoryOrder.length > 0) {
            CATEGORY_ORDER = shopData.categoryOrder;
          }

          // 🌟 【新增】檢查是否有待跳轉的分享分類
          const targetCategory = localStorage.getItem('shared_category_target');
          if (targetCategory) {
            const allCats = Array.from(new Set(currentShopItems.map(item => item.category)));
            // 確保分類存在才切換，防止錯誤網址
            if (allCats.includes(targetCategory) || targetCategory === 'all') {
              currentCategory = targetCategory;
            }
            localStorage.removeItem('shared_category_target');
          }

          renderSidebar();
          renderShop();
          document.getElementById('loading').style.display = 'none';

          // 🌟 如果有帶分享 ID，自動展開購買視窗並滾動過去
          const targetId = localStorage.getItem('shared_item_target');
          if (targetId) {
            localStorage.removeItem('shared_item_target');
            const targetItem = currentShopItems.find(i => String(i.id) === targetId);
            
            if (targetItem) {
              currentCategory = targetItem.category;
              renderSidebar();
              renderShop();
              
              setTimeout(() => {
                const itemCard = document.getElementById(`item-card-${targetId}`);
                if (itemCard) {
                  itemCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                  itemCard.style.boxShadow = "0 0 20px #5865F2";
                  setTimeout(() => itemCard.style.boxShadow = "", 3000); // 3秒後取消高光
                }
                
                // 如果商品可以買，就自動跳出確認框
                if (targetItem.state === 'available') {
                  openModal(targetItem.id);
                } else {
                  alert(`您分享的商品「${targetItem.name}」目前狀態為：${targetItem.stateMsg}`);
                }
              }, 500);
            }
          }
        }
      }).catch(err => {
        console.error(err);
        document.getElementById('loading').innerHTML = '資料載入失敗，請檢查網路或稍後再試。';
      });
    }

    // ==========================================
    // 渲染側邊欄
    // ==========================================
    function renderSidebar() {
      let categories = Array.from(new Set(currentShopItems.map(item => item.category)));
      
      // 依照 Google Sheet 第二頁的順序排序
      categories.sort((a, b) => {
        let idxA = CATEGORY_ORDER.indexOf(a);
        let idxB = CATEGORY_ORDER.indexOf(b);
        if (idxA === -1) idxA = 999;
        if (idxB === -1) idxB = 999;
        return idxA - idxB;
      });
      
      const sidebar = document.getElementById('category-sidebar');
      
      // 🌟 所有商品 (加入分享按鈕)
      let html = `<div class="cat-item ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCategory('all')">
                    <span>📁 所有商品</span>
                    <span class="btn-share-cat" onclick="shareCategory(event, 'all')" title="分享此分類">🔗</span>
                  </div>`;
                  
      // 🌟 各個子分類 (加入分享按鈕)
      categories.forEach(cat => {
        const count = currentShopItems.filter(i => i.category === cat).length;
        html += `<div class="cat-item ${currentCategory === cat ? 'active' : ''}" onclick="selectCategory('${cat}')">
                   <span>🏷️ ${cat}</span>
                   <div style="display:flex; align-items:center; gap:10px;">
                     <span style="font-size:12px; opacity:0.7;">${count}</span>
                     <span class="btn-share-cat" onclick="shareCategory(event, '${cat}')" title="分享此分類">🔗</span>
                   </div>
                 </div>`;
      });
      sidebar.innerHTML = html;
    }

    function selectCategory(cat) {
      currentCategory = cat;
      renderSidebar(); // 更新 active 狀態
      renderShop();
    }

    function handleSearch() {
      searchQuery = document.getElementById('search-bar').value.toLowerCase();
      renderShop();
    }

    // ==========================================
    // 分享連結功能
    // ==========================================
    // 🌟 單一商品分享
    function shareItem(itemId, itemName) {
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?item=${itemId}`;
      
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(shareUrl).then(() => {
          alert(`✅ 已複製商品「${itemName}」的專屬連結！\n\n您現在可以貼上分享給其他人。`);
        }).catch(err => {
          prompt('複製失敗，請手動複製以下網址：', shareUrl);
        });
      } else {
        prompt('請手動複製以下網址：', shareUrl);
      }
    }

    // 🌟 分類分享
    function shareCategory(event, catName) {
      event.stopPropagation(); // 避免觸發上層的 onclick 切換分類
      
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?category=${encodeURIComponent(catName)}`;
      
      const displayCatName = catName === 'all' ? '所有商品' : catName;

      // 檢查瀏覽器是否支援剪貼簿 API
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(shareUrl).then(() => {
          alert(`✅ 已複製分類「${displayCatName}」的專屬連結！\n\n您現在可以貼上分享給其他人。`);
        }).catch(err => {
          prompt('複製失敗，請手動複製以下網址：', shareUrl);
        });
      } else {
        // 舊版瀏覽器降級方案
        prompt('請手動複製以下網址：', shareUrl);
      }
    }

    // ==========================================
    // 渲染商品與倒數計時
    // ==========================================
    let timerInterval = null;

    function renderShop() {
      const list = document.getElementById('shop-list');
      list.innerHTML = '';
      
      if (timerInterval) clearInterval(timerInterval);

      let filtered = currentShopItems.filter(item => {
        let matchCat = (currentCategory === 'all' || item.category === currentCategory);
        let matchSearch = item.name.toLowerCase().includes(searchQuery);
        return matchCat && matchSearch;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:20px; color:#b9bbbe;">找不到相關商品。</div>';
        return;
      }

      filtered.forEach(item => {
        let btnHtml = '';
        let badgeHtml = '';
        let timerHtml = '';
        
        let now = new Date().getTime();
        
        if (item.state === 'not_started') {
          badgeHtml = `<div class="status-badge status-notstarted">⏳ 未開始</div>`;
          btnHtml = `<button class="btn btn-buy" disabled>等待開放</button>`;
          if (item.startTime) timerHtml = `<div class="timer-text" id="timer-${item.id}">距離開始: 計算中...</div>`;
        } 
        else if (item.state === 'ended') {
          badgeHtml = `<div class="status-badge status-soldout">❌ 已結束</div>`;
          btnHtml = `<button class="btn btn-buy" disabled>已結束</button>`;
          timerHtml = `<div class="timer-text" style="color:#ED4245;">活動已結束</div>`;
        } 
        else if (item.state === 'sold_out') {
          badgeHtml = `<div class="status-badge status-soldout">售完</div>`;
          btnHtml = `<button class="btn btn-buy" disabled>已售完</button>`;
        } 
        else {
          badgeHtml = `<div class="status-badge status-available">可兌換</div>`;
          let btnText = `💎 購買 (${item.price})`;
          let disabled = false;
          if (currentScore < item.price) {
            btnText = "餘額不足";
            disabled = true;
          }
          btnHtml = `<button class="btn btn-buy" onclick="openModal(${item.id})" ${disabled ? 'disabled' : ''}>${btnText}</button>`;
          if (item.endTime) timerHtml = `<div class="timer-text" id="timer-${item.id}">距離結束: 計算中...</div>`;
        }

        let itemHtml = `
          <div class="shop-item" id="item-card-${item.id}">
            <button class="btn-share" onclick="shareItem(${item.id}, '${item.name}')" title="分享此商品">🔗 分享</button>
            ${badgeHtml}
            <img src="${item.image || 'https://via.placeholder.com/100'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/100'">
            <div class="item-title">${item.name}</div>
            <div class="item-desc">${item.desc}</div>
            <div class="item-price">💲 ${item.price} 幻彩水晶</div>
            ${timerHtml}
            ${btnHtml}
          </div>
        `;
        list.innerHTML += itemHtml;
      });

      startTimers();
    }

    function startTimers() {
      timerInterval = setInterval(() => {
        let now = new Date().getTime();
        let needsReRender = false;

        currentShopItems.forEach(item => {
          let timer = document.getElementById(`timer-${item.id}`);
          if (!timer) return;

          if (item.state === 'not_started' && item.startTime) {
            let diff = item.startTime - now;
            if (diff > 0) {
              timer.innerText = "距離開始: " + formatTimeDiff(diff);
              timer.style.color = "#faa61a"; 
            } else {
              item.state = 'available';
              item.stateMsg = '可兌換';
              needsReRender = true;
            }
          } 
          else if (item.state === 'available' && item.endTime) {
            let diff = item.endTime - now;
            if (diff > 0) {
              timer.innerText = "距離結束: " + formatTimeDiff(diff);
              timer.style.color = "#58FF9C"; 
            } else {
              item.state = 'ended';
              item.stateMsg = '已結束';
              needsReRender = true;
            }
          }
        });
        
        if (needsReRender) renderShop();
      }, 1000);
    }

    function formatTimeDiff(ms) {
      let seconds = Math.floor((ms / 1000) % 60);
      let minutes = Math.floor((ms / 1000 / 60) % 60);
      let hours = Math.floor((ms / 1000 / 60 / 60) % 24);
      let days = Math.floor(ms / 1000 / 60 / 60 / 24);
      
      let str = "";
      if (days > 0) str += `${days}天 `;
      str += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      return str;
    }

    // ==========================================
    // 購買與彈出視窗
    // ==========================================
    function openModal(id) {
      selectedItem = currentShopItems.find(i => i.id === id);
      if (!selectedItem) return;
      
      document.getElementById('modal-desc').innerHTML = `
        您確定要花費 <strong style="color:#faa61a;">${selectedItem.price}</strong> 幻彩水晶<br>
        購買 <strong>${selectedItem.name}</strong> 嗎？<br>
        <br><span style="font-size:12px; color:#b9bbbe;">扣款後無法退還，請確認。</span>
      `;
      document.getElementById('buy-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('buy-modal').style.display = 'none';
      selectedItem = null;
    }

    function executePurchase() {
      if (!selectedItem || !currentUser) return;
      
      const btn = document.getElementById('confirm-buy-btn');
      btn.innerText = "處理中...";
      btn.disabled = true;

      fetch(`${GAS_WEB_APP_URL}?action=buy&discordId=${currentUser.id}&itemId=${selectedItem.id}`, { method: 'POST' })
        .then(r => r.json())
        .then(res => {
          if (res.success) {
            alert(`✅ 購買成功！已扣除 ${selectedItem.price} 水晶。\n系統稍後會將物品派發給您。`);
            fetchScoresAndShop(); // 重新整理分數和商品
          } else {
            alert(`❌ 購買失敗：${res.message}`);
          }
        })
        .catch(err => {
          alert('連線異常，請稍後再試。');
        })
        .finally(() => {
          closeModal();
          btn.innerText = "確認扣款";
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
