<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garbled 幻彩水晶商店</title>
  <style>
    /* 🌟 整體版面與寬度設定 */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           background-color: #2C2F33; color: white; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background-color: #23272A; padding: 30px; border-radius: 12px; width: 100%; max-width: 1100px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); position: relative; }
    
    /* 🌟 按鈕樣式 */
    .btn { color: white;
           padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; width: 100%; display: inline-block;
           box-sizing: border-box; text-decoration: none; text-align: center;}
    .btn-login { background-color: #5865F2; margin-top: 10px; max-width: 300px; }
    .btn-login:hover { background-color: #4752C4; }
    .btn-logout { background-color: #ED4245; margin-top: 20px; max-width: 200px;}
    .btn-logout:hover { background-color: #C13537; }
    .btn-action { background-color: #4F545C; color: white;
                  padding: 6px 12px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.3s; }
    .btn-action:hover { background-color: #686D73; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 🌟 玩家頂部橫向資訊區塊 */
    .user-header-section { display: flex;
                           align-items: center; gap: 20px; margin-bottom: 20px; background-color: #2C2F33; padding: 20px; border-radius: 8px; flex-wrap: wrap; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #5865F2; flex-shrink: 0;}
    .user-info { flex-grow: 1; }
    .score-box { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 8px; }
    .score-item { font-size: 15px; background: #202225; padding: 6px 12px; border-radius: 6px;
                  border: 1px solid #4F545C; display: flex; align-items: center; gap: 6px;}
    .score-value { font-weight: bold; color: #58FF9C; }
    .dynamic-score-value { font-weight: bold; color: #FEE75C; }

    /* 🌟 玩家持有身分組徽章 */
    .role-box { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .role-badge { font-size: 13px; background: #5865F2; color: #FFF; padding: 5px 10px; border-radius: 999px; font-weight: bold; } 
    
    /* 🌟 側邊欄與網格商品區佈局 */
    .shop-layout { display: flex; gap: 20px; align-items: flex-start; }
    .sidebar { width: 220px; flex-shrink: 0; background-color: #2C2F33; border-radius: 8px; padding: 15px;
               display: flex; flex-direction: column; gap: 5px; position: sticky; top: 20px; }
    .cat-item { padding: 12px 15px;
                border-radius: 6px; cursor: pointer; color: #B9BBBE; font-size: 15px; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .cat-item:hover { background-color: #40444B; color: white; }
    .cat-item.active { background-color: #5865F2; color: white; font-weight: bold; }
    .cat-parent-item { color: #FEE75C; font-weight: bold; background-color: rgba(255,255,255,0.03); }
    .cat-parent-item:hover { background-color: rgba(255,255,255,0.08); color: #FEE75C; }

    /* 🌟 分類分享按鈕 */
    .btn-share-cat {
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.2s;
      user-select: none;
      font-size: 14px;
    }
    .btn-share-cat:hover {
      opacity: 1;
      transform: scale(1.2);
    }
    
    .main-area { flex-grow: 1; width: 100%; min-width: 0; }
    .controls-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background-color: #2C2F33; padding: 10px 15px; border-radius: 8px; }
    .shop-input { padding: 8px 12px; border-radius: 5px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 14px; outline: none; }
    
    /* 🌟 商品網格卡片 */
    .shop-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
    .shop-item-card { background-color: #2F3136; border: 1px solid #4F545C; border-radius: 8px;
                      padding: 15px; display: flex; flex-direction: column; position: relative; overflow: hidden; height: 100%; box-sizing: border-box; }
    .shop-item-card.disabled { opacity: 0.6; }
    
    /* 🌟 圖片樣式更新：加入游標與 hover 放大提示效果 */
    .item-image { 
        width: 100%; height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; border: 1px solid #40444B; 
        cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .item-image:hover { transform: scale(1.03); border-color: #5865F2; }

    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px solid #40444B; padding-bottom: 8px; gap: 10px;}
    .item-name { font-size: 18px; font-weight: bold; color: #FFF; line-height: 1.3;}
    .btn-share { margin-left: 8px; cursor: pointer; font-size: 16px; opacity: 0.6; transition: 0.2s; user-select: none; }
    .btn-share:hover { opacity: 1; transform: scale(1.2); }
    .item-badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: bold; flex-shrink: 0; white-space: nowrap; }
    .badge-avail { background-color: #43B581; color: white; }
    .badge-unavail { background-color: #ED4245; color: white; }
    .item-remark { font-size: 13px; color: #99AAB5; margin-bottom: 12px; padding: 8px; background-color: #202225; border-left: 3px solid #5865F2; border-radius: 4px; line-height: 1.4; white-space: pre-wrap; }
    
    /* 🌟 備註內的超連結樣式 */
    .item-remark a { color: #00AFF4; text-decoration: none; word-break: break-all; }
    .item-remark a:hover { text-decoration: underline; }

    /* 🌟 商品倒數計時區塊樣式 */
    .item-time-info { font-size: 13px; color: #99AAB5; margin-bottom: 12px; padding: 10px; background-color: #202225; border-radius: 6px; border: 1px solid #40444B; line-height: 1.5; }
    .countdown-timer { font-weight: bold; font-size: 14px; white-space: nowrap; }

    .item-info { font-size: 14px; color: #B9BBBE; margin-bottom: 15px; line-height: 1.6; flex-grow: 1; } 
    .item-price { color: #FEE75C; font-weight: bold; font-size: 16px; }
    
    .limit-tags { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .limit-tag { font-size: 12px; padding: 4px 8px; border-radius: 4px; display: inline-block; width: fit-content; }
    .tag-global { background-color: #4F545C; color: #FFF; }
    .tag-personal { background-color: #5865F2; color: #FFF; }
    .tag-total { background-color: #FEE75C; color: #000; font-weight: bold; }
    .tag-role-ok { background-color: #9B59B6; color: #FFF; }
    .tag-role-locked { background-color: #74398A; color: #E0C3F1; }

    .item-actions { display: flex; gap: 10px; align-items: center; margin-top: auto; }
    .qty-input { width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 16px; text-align: center; outline: none; }
    .btn-buy { background-color: #43B581; padding: 8px 16px; width: auto; flex-grow: 1; }
    .btn-buy:hover { background-color: #3CA374; }
    .btn-buy:disabled { background-color: #4F545C; cursor: not-allowed; }

    /* 🌟 替代貨幣折抵區塊 */
    .alt-currency-box { background-color: #202225; border: 1px solid #40444B; border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 13px; }
    .alt-toggle-label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #FEE75C; }
    .alt-toggle-label input { cursor: pointer; }
    .alt-mode-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #4F545C; color: #B9BBBE; font-size: 12px; }
    .alt-mode-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .alt-mode-row input[type="number"] { width: 80px; padding: 4px 6px; border-radius: 4px; border: 1px solid #4F545C; background-color: #2C2F33; color: white; font-size: 13px; }
    .alt-preview { margin-top: 6px; color: #58FF9C; font-weight: bold; font-size: 12px; min-height: 14px; }
    .alt-manual-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 12px; color: #B9BBBE; }
    .alt-manual-row input[type="number"] { width: 80px; padding: 4px 6px; border-radius: 4px; border: 1px solid #4F545C; background-color: #2C2F33; color: white; font-size: 13px; }
    .item-lock-hint { background-color: #2C2530; border: 1px solid #9B59B6; border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; font-size: 12px; color: #C99EE0; }
    .category-lock-screen { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #B9BBBE; }
    .category-lock-icon { font-size: 48px; margin-bottom: 12px; }
    .category-lock-title { font-size: 16px; margin-bottom: 20px; color: #FFF; }
    .category-lock-banner { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      background-color: #2C2530; border: 1px solid #9B59B6; border-radius: 8px; padding: 12px 16px; color: #C99EE0; font-size: 14px; margin-bottom: 4px; }
    .category-blur-content { display: contents; }
    .category-blur-content .shop-item-card { filter: blur(5px); pointer-events: none; user-select: none; }
    .item-blur-card { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px 15px; }
    .item-blur-content { margin-bottom: 16px; }
    .item-blur-icon { font-size: 36px; margin-bottom: 8px; }
    .item-blur-name { font-size: 16px; font-weight: bold; color: #B9BBBE; letter-spacing: 2px; }
    .item-blur-price { font-size: 13px; color: #72767D; margin-top: 4px; }
    .item-blur-hint { font-size: 12px; color: #C99EE0; margin-top: 10px; padding: 6px 10px; background-color: #2C2530; border-radius: 6px; }

    /* 手機版適應：側邊欄變為上方橫向捲動 */
    @media (max-width: 768px) {
      .shop-layout { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; overflow-x: auto; position: static; white-space: nowrap; padding: 10px; box-sizing: border-box; }
      .cat-item { flex-shrink: 0; }

      /* 🌟 手機版貨幣顯示改成 2 欄排列 + 縮小字級/間距,避免 4 個貨幣方塊直向疊起來佔掉半個螢幕 */
      .score-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .score-item { font-size: 13px; padding: 5px 8px; gap: 4px; }

      /* 🌟 拍賣彈窗標題區塊(貨幣+重新整理列)在手機版本來就比一般頁首更擠,再多收一點空間留給下面的拍賣列表 */
      .modal-header { padding: 16px 40px 10px 16px; }
      #auction-currency-box.score-box { gap: 6px; }
      #auction-currency-box .score-item { font-size: 12px; padding: 4px 7px; }
    }

    /* 🌟 彈出視窗 (歷史紀錄) */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
    .modal-content { background: #2F3136; border-radius: 12px; width: 100%; max-width: 500px; max-height: 80vh; text-align: left; position: relative; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { flex-shrink: 0; padding: 25px 45px 15px 25px; border-bottom: 1px solid #4F545C; position: relative; }
    .modal-body { overflow-y: auto; padding: 15px 25px 25px 25px; }
    .modal-close { position: absolute; top: 15px; right: 20px; color: #B9BBBE; font-size: 24px; font-weight: bold; cursor: pointer; }
    .modal-close:hover { color: white; }
    .history-card { background: #202225; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #40444B;}
    .history-time { font-size: 12px; color: #72767D; margin-bottom: 5px; }
    .history-name { font-size: 16px; font-weight: bold; color: #FFF; }
    .history-qty { color: #A6D189; }
    .history-keys { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #4F545C; color: #FEE75C; font-family: monospace; font-size: 14px; word-break: break-all;}

    /* 🌟 拍賣分類標籤列 */
    .auction-category-tabs { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0 4px 0; border-bottom: 1px solid #4F545C; margin-bottom: 12px; }
    .auction-cat-tab { padding: 5px 14px; border-radius: 999px; border: 1px solid #4F545C; background: #2F3136; color: #B9BBBE; cursor: pointer; font-size: 13px; font-weight: bold; transition: background 0.15s; }
    .auction-cat-tab:hover { background: #40444B; color: #FFF; }
    .auction-cat-tab.active { background: #F0B232; color: #1F2124; border-color: #F0B232; }
    .auction-cat-parent-tab { background: transparent; border-style: dashed; color: #FEE75C; }
    .auction-cat-parent-tab:hover { background: rgba(255,255,255,0.08); color: #FEE75C; }
    .auction-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .auction-card { background-color: #2F3136; border: 1px solid #4F545C; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
    .auction-card.ended { opacity: 0.7; }
    .auction-image { width: 100%; height: 130px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; border: 1px solid #40444B; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease; }
    .auction-image:hover { transform: scale(1.03); border-color: #5865F2; }
    .auction-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
    .auction-name { font-size: 16px; font-weight: bold; color: #FFF; }
    .auction-type-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
    .auction-type-public { background-color: #43B581; color: #FFF; }
    .auction-type-sealed { background-color: #9B59B6; color: #FFF; }
    .auction-type-sealed-low { background-color: #E67E22; color: #FFF; }
    .auction-info { font-size: 13px; color: #B9BBBE; margin-bottom: 10px; line-height: 1.6; }
    .auction-bid-value { color: #FEE75C; font-weight: bold; }
    .auction-status { font-size: 13px; padding: 8px; border-radius: 6px; margin-bottom: 10px; text-align: center; font-weight: bold; }
    .auction-status.win { background-color: #1F4D2C; color: #58FF9C; }
    .auction-status.lose { background-color: #4D1F1F; color: #ED4245; }
    .auction-status.leading { background-color: #1F3A4D; color: #00AFF4; }
    .auction-bid-row { display: flex; gap: 8px; margin-top: auto; }
    .auction-bid-input { flex-grow: 1; padding: 8px; border-radius: 6px; border: 1px solid #4F545C; background-color: #202225; color: white; font-size: 14px; }
    .auction-bid-btn { background-color: #F0B232; color: #1F2124; font-weight: bold; padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .auction-bid-btn:hover { background-color: #D69A1F; }
    .auction-bid-btn:disabled { background-color: #4F545C; color: #B9BBBE; cursor: not-allowed; }
    .auction-extend-hint { font-size: 12px; color: #FEE75C; margin: 4px 0 8px 0; }
    .auction-extend-flash { animation: extendFlash 2s ease-out; }
    @keyframes extendFlash {
      0% { box-shadow: 0 0 0 3px rgba(254, 231, 92, 0.9); }
      100% { box-shadow: 0 0 0 0px rgba(254, 231, 92, 0); }
    }

    /* 🌟 圖片放大彈出視窗 */
    .image-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
      z-index: 2000; padding: 20px; box-sizing: border-box; cursor: pointer;
    }
    .image-overlay img {
      max-width: 90vw; max-height: 90vh; border-radius: 8px; border: 2px solid #5865F2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8); object-fit: contain; cursor: default;
    }
    .image-close {
      position: absolute; top: 20px; right: 30px; color: #FFF; font-size: 40px; font-weight: bold; cursor: pointer; transition: color 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .image-close:hover { color: #ED4245; }

    .version-tag { font-size: 12px; color: #72767D; margin-top: 20px; text-align: center; }
    #dashboard, #loading { display: none; }
  </style>
</head>
<body>

  <!-- 🌟 歷史紀錄模態視窗 -->
  <div id="history-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-close" onclick="closeHistory()">×</span>
        <h2 style="margin:0;">📜 兌換與序號紀錄</h2>
      </div>
      <div class="modal-body">
        <div id="history-list-container">
          <p style="text-align:center; color:#B9BBBE;">讀取中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 🌟 背包彈窗:顯示完整的自訂變數清單(包含主頁面沒顯示的0值/隱藏項目) -->
  <div id="backpack-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <span class="modal-close" onclick="closeBackpack()">×</span>
        <h2 style="margin:0;">🎒 背包</h2>
      </div>
      <div class="modal-body">
        <div id="backpack-list-container" class="score-box" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>
    </div>
  </div>

  <!-- 🌟 拍賣會彈窗 -->
  <div id="auction-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <span class="modal-close" onclick="closeAuctions()">×</span>
        <h2 style="margin:0;">🔨 拍賣會</h2>
        <div class="score-box" id="auction-currency-box" style="margin-top: 10px;"></div>
        <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
          <button class="btn-action" style="padding:5px 12px; font-size:12px;" onclick="loadAuctions()">🔄 重新整理</button>
          <span id="auction-last-refresh" style="font-size:11px; color:#B9BBBE;"></span>
        </div>
      </div>
      <div class="modal-body">
        <div id="auction-category-tabs" class="auction-category-tabs" style="display:none;"></div>
        <div id="auction-list-container" class="auction-list-container">
          <p style="text-align:center; color:#B9BBBE;">讀取中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 🌟 抽獎名單彈窗 -->
  <div id="raffle-participants-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <span class="modal-close" onclick="closeRaffleParticipants()">×</span>
        <h2 style="margin:0;" id="raffle-participants-title">🎫 投票名單</h2>
      </div>
      <div class="modal-body">
        <div id="raffle-participants-container">
          <p style="text-align:center; color:#B9BBBE;">讀取中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 🌟 圖片放大模態視窗 -->
  <div id="image-overlay" class="image-overlay" onclick="closeImage()">
    <span class="image-close">×</span>
    <img id="full-size-image" src="" alt="Full Size" onclick="event.stopPropagation()">
  </div>

  <div class="card">
    <div id="login-section" style="text-align: center;">
      <h1 style="margin-top:0;">Garbled 幻彩水晶商店</h1>
      <p style="color: #B9BBBE;">請綁定您的 Discord 帳號以查看資料與兌換</p>
      <a href="https://discord.com/api/oauth2/authorize?client_id=1365601646448607335&redirect_uri=https%3A%2F%2Fjay870122.github.io%2FDCGI%2F&response_type=token&scope=identify" class="btn btn-login">🎮 使用 Discord 登入</a>
    </div>

    <div id="loading" style="text-align: center;">
      <p id="loading-text" style="font-size: 18px;">⏳ 正在連線至資料庫...</p>
    </div>

    <div id="dashboard">
      
      <div class="user-header-section">
        <img id="user-avatar" class="avatar" src="" alt="Avatar">
        <div class="user-info">
          <h2 id="user-name" style="margin: 0 0 5px 0;">玩家名稱</h2>
          <div class="score-box" id="score-box-container">
            <div class="score-item">🌟 總獲得: <span class="score-value" id="score-s1">0</span></div>
            <div class="score-item">🔥 幻彩水晶: <span class="score-value" id="score-s2">0</span></div>
            <div class="score-item" id="score-s3-container">💎 點數3: <span class="score-value" id="score-s3">0</span></div>
          </div>
          <div class="role-box" id="role-box-container"></div>
        </div>
        <div style="display: flex; gap: 10px; flex-direction: column;">
          <button class="btn-action" onclick="showAuctions()" style="background-color: #F0B232;">🔨 拍賣會</button>
          <button class="btn-action" onclick="showHistory()" style="background-color: #5865F2;">📜 我的紀錄</button>
          <button class="btn-action" onclick="showBackpack()" style="background-color: #43B581;">🎒 背包</button>
          <button class="btn-action" onclick="logout()" style="background-color: #ED4245;">登出帳號</button>
        </div>
      </div>

      <div class="shop-layout">
        <div class="sidebar" id="category-sidebar"></div>
        
        <div class="main-area">
          <div class="controls-container">
            <h3 style="margin: 0;">🛒 兌換商店</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
              <select id="sort-items" class="shop-input" onchange="renderShop()">
                <option value="avail-first">✅ 可用優先</option>
                <option value="default">預設排序</option>
                <option value="price-low">💰 價格 低 ~ 高</option>
                <option value="price-high">💰 價格 高 ~ 低</option>
              </select>
              <button id="btn-refresh" class="btn-action" onclick="refreshData()">🔄 重整庫存</button>
            </div>
          </div>
          <div id="shop-list" class="shop-list-container"></div>
        </div>
      </div>
    </div>

    <div class="version-tag">系統版本：v3.18.0 (商品/分類密碼鎖定支援自動輪替密碼、自訂密碼表、每日/每週/每月限猜次數,商品卡片會先顯示剩餘猜測次數)</div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzBie8G4KRouJ3nQMsGccDxI0pPlm-kh3Sg8GsURORsRHFCyJgtKV5mJ4A7wKWEo8W1wQ/exec';
    const DASHBOARD_WORKER_URL = 'https://autumn-wood-df55.jay87012205.workers.dev/'; // 🌟 讀取分數+商店目錄改走這個Worker,速度比較快;買東西/查紀錄/登入還是走上面的GAS_API_URL
    // 🌟🔒 安全性修正:所有打後端的請求都要帶上這個 accessToken,讓後端自己向 Discord 官方驗證使用者身分,
    // 不能只靠自己在網址上宣稱的 discordId(那樣任何人都能冒充別人)
    function getAccessToken() { return localStorage.getItem('dc_access_token') || ''; }
  
    let currentUser = null; 
    let currentShopItems = []; 
    let itemAltInfo = {}; // 🌟 safeId -> {price, rate, balance, altName, mainCurrency},給替代貨幣折抵預覽用
    let categoryUnlockedThisSession = new Set(); // 🌟 密碼鎖定:這次瀏覽期間(重新整理網頁會重置)已經解鎖過的分類,不用每次切換分類都重問一次
    let currentCategory = null;
    let CATEGORY_ORDER = []; 
    
    let countdownInterval = null;

    window.onload = () => {
      // 🌟 攔截分享網址的參數並記憶 (商品分享 & 分類分享)
      const urlParams = new URLSearchParams(window.location.search);
      const shareTarget = urlParams.get('item');
      const shareCategory = urlParams.get('category'); 
      const shareAuctionId = urlParams.get('auction');
      const shareAuctionCategoryParam = urlParams.get('auctionCategory');

      let shouldCleanUrl = false;
      
      if (shareTarget) {
        localStorage.setItem('shared_item_target', shareTarget);
        shouldCleanUrl = true;
      }
      
      if (shareCategory) {
        localStorage.setItem('shared_category_target', shareCategory);
        shouldCleanUrl = true;
      }

      if (shareAuctionId) {
        localStorage.setItem('shared_auction_target', shareAuctionId);
        shouldCleanUrl = true;
      }

      if (shareAuctionCategoryParam) {
        localStorage.setItem('shared_auction_category_target', shareAuctionCategoryParam);
        shouldCleanUrl = true;
      }

      if (shouldCleanUrl) {
        window.history.replaceState({}, document.title, window.location.pathname); // 清除網址上的參數保持乾淨
      }

      const hashString = window.location.hash.slice(1);
      let accessToken = null; let tokenType = null;
      if (hashString) {
        const fragment = new URLSearchParams(hashString);
        accessToken = fragment.get('access_token'); tokenType = fragment.get('token_type');
        if (accessToken) {
          localStorage.setItem('dc_access_token', accessToken);
          localStorage.setItem('dc_token_type', tokenType);
          window.history.replaceState(null, null, window.location.pathname);
        }
      } else {
        accessToken = localStorage.getItem('dc_access_token');
        tokenType = localStorage.getItem('dc_token_type');
      }

      if (accessToken) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        fetch('https://discord.com/api/users/@me', { headers: { authorization: `${tokenType} ${accessToken}` } })
        .then(res => { if (!res.ok) throw new Error('登入過期'); return res.json(); })
        .then(user => {
          currentUser = user; 
          document.getElementById('user-name').innerText = user.global_name || user.username;
          document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
          fetchScoresAndShop(user.id);
        }).catch(err => {
          localStorage.removeItem('dc_access_token'); localStorage.removeItem('dc_token_type');
          document.getElementById('loading').style.display = 'none'; document.getElementById('login-section').style.display = 'block';
        });
      }
    };

    function refreshData() {
      if(!currentUser) return;
      const refreshBtn = document.getElementById('btn-refresh');
      refreshBtn.innerText = "⏳..."; refreshBtn.disabled = true;
      fetchScoresAndShop(currentUser.id, () => { refreshBtn.innerText = "🔄 重整庫存"; refreshBtn.disabled = false; });
    }

    // 🌟 子分類功能:分類名稱裡如果有「＞」,例如「活動＞夏日活動2026」,前半段當父分類分組、後半段是子分類名稱。
    // ⚠️ 特地選「＞」而不是「/」當分隔符,因為很多分類名稱本來就會用「/」表示日期區間(例如「(7/8)道具」「7/1~7/30」),
    // 如果用「/」當分隔符會誤判成子分類、把舊分類的顯示弄壞。
    // 完全用命名慣例達成,沒有「＞」的分類完全不受影響、行為跟以前一模一樣(向下相容舊分類)。
    // 🌟 父分類本身也可以是一個「真的分類」:如果剛好有商品的分類就叫「活動」(沒有子分類符號),
    // 而且同時又有「活動＞XXX」這種子分類存在,「活動」會變成可以直接點選查看商品的父分類標題。
    // getOrderIndex(cat):排序索引產生器(數字越小排越前面);群組的排序位置是「這個群組裡所有分類中最小的索引」,
    // 不是「第一個遇到的分類」,不然分類順序表排好的順序容易被打亂、整組莫名其妙被拖到很後面。
    // 回傳 [{type:'flat', cat} | {type:'parent', parentName, selfCat, children:[{cat, label}]}]
    function buildCategoryGroups(categories, getOrderIndex) {
      getOrderIndex = getOrderIndex || (() => 999);
      const groups = [];
      const parentIndexMap = {};

      const parentNames = new Set();
      categories.forEach(cat => {
        const idx = cat.indexOf('＞') !== -1 ? cat.indexOf('＞') : cat.indexOf('>');
        if (idx !== -1) parentNames.add(cat.substring(0, idx).trim());
      });

      categories.forEach(cat => {
        const idx = cat.indexOf('＞') !== -1 ? cat.indexOf('＞') : cat.indexOf('>');
        if (idx === -1) {
          if (parentNames.has(cat)) {
            if (parentIndexMap[cat] === undefined) {
              parentIndexMap[cat] = groups.length;
              groups.push({ type: 'parent', parentName: cat, selfCat: null, children: [] });
            }
            groups[parentIndexMap[cat]].selfCat = cat;
          } else {
            groups.push({ type: 'flat', cat });
          }
        } else {
          const parentName = cat.substring(0, idx).trim();
          const childLabel = cat.substring(idx + 1).trim() || cat;
          if (parentIndexMap[parentName] === undefined) {
            parentIndexMap[parentName] = groups.length;
            groups.push({ type: 'parent', parentName, selfCat: null, children: [] });
          }
          groups[parentIndexMap[parentName]].children.push({ cat, label: childLabel });
        }
      });

      groups.forEach(g => {
        if (g.type === 'flat') {
          g._sortKey = getOrderIndex(g.cat);
        } else {
          const keys = g.children.map(c => getOrderIndex(c.cat));
          if (g.selfCat) keys.push(getOrderIndex(g.selfCat));
          keys.push(999);
          g._sortKey = Math.min(...keys);
          // 🌟 同一個父分類底下的子分類,也依照分類順序表個別設定的順序排(Array.sort 是穩定排序,沒設定順序的子分類會維持原本相對順序,不會被打亂)
          g.children.sort((a, b) => getOrderIndex(a.cat) - getOrderIndex(b.cat));
        }
      });
      groups.sort((a, b) => a._sortKey - b._sortKey);

      return groups;
    }
    let collapsedShopParents = new Set(); // 🌟 商店側邊欄:記住哪些父分類被收合了(重新整理會重置)
    let allShopParentNames = new Set(); // 🌟 目前商店裡所有的父分類名稱,重繪側邊欄時會更新,給手風琴收合邏輯用

    // 🌟 手風琴效果:切換到某個分類時,自動收起其他展開的父分類,只留下這個分類所屬(或本身就是)的父分類
    function applyShopAccordion(cat) {
      let owningParent = null;
      if (cat) {
        const idx = cat.indexOf('＞') !== -1 ? cat.indexOf('＞') : cat.indexOf('>');
        if (idx !== -1) owningParent = cat.substring(0, idx).trim();
        else if (allShopParentNames.has(cat)) owningParent = cat;
      }
      collapsedShopParents = new Set(Array.from(allShopParentNames).filter(p => p !== owningParent));
    }

    // 🌟 查一個分類在「分類順序表」裡的排序位置。如果這個分類本身沒有出現在順序表裡,但它是「父＞子」格式的子分類,
    // 就改查「父分類名稱」有沒有在順序表裡——這樣管理員只要把父分類名稱填進順序表,就能決定整組子分類的位置,
    // 不用把每一個子分類都個別填一次(不然像「加布商城物品」這種只填了父分類名稱的,子分類會查不到、被拖到最後面)
    function getCategoryOrderIndex(cat, orderList) {
      let idx = orderList.indexOf(cat);
      if (idx !== -1) return idx;
      const sep = cat.indexOf('＞') !== -1 ? cat.indexOf('＞') : cat.indexOf('>');
      if (sep !== -1) {
        const parentIdx = orderList.indexOf(cat.substring(0, sep).trim());
        if (parentIdx !== -1) return parentIdx;
      }
      return 999;
    }

    function selectCategory(cat) {
      currentCategory = cat;
      applyShopAccordion(cat);
      renderSidebar();
      renderShop();
    }

    function renderSidebar() {
      const categories = Array.from(new Set(currentShopItems.map(item => item.category)));
      const getOrderIndex = (cat) => getCategoryOrderIndex(cat, CATEGORY_ORDER);
      const sidebar = document.getElementById('category-sidebar');

      function renderCatItemHtml(cat, displayLabel, indent, iconOverride) {
        const sample = currentShopItems.find(i => i.category === cat);
        const locked = sample && sample.categoryLocked && !sample.categoryUnlocked && !categoryUnlockedThisSession.has(cat);

        // 🌟 「完全隱藏」模式底下,如果還設定了「側邊欄完全不列出」,就直接跳過這個分類,不留任何蹤跡
        // (只有目前選中的這個分類例外——例如透過分享連結直接進來的情況——不然使用者會找不到自己現在在哪個分類)
        const isHideFromSidebar = locked && (!sample.categoryLockVisibility || sample.categoryLockVisibility === '') && sample.categoryLockShowHint === 'HIDE';
        if (isHideFromSidebar && currentCategory !== cat) return '';

        const count = currentShopItems.filter(i => i.category === cat).length;
        const icon = iconOverride || (locked ? '🔒' : '🏷️');
        return `<div class="cat-item ${currentCategory === cat ? 'active' : ''}" style="${indent ? 'padding-left:32px' : ''}" onclick="selectCategory('${cat.replace(/'/g,"\\'")}')">
                   <span>${icon} ${displayLabel}</span>
                   <div style="display:flex; align-items:center; gap:10px;">
                     <span style="font-size:12px; opacity:0.7;">${count}</span>
                     <span class="btn-share-cat" onclick="shareCategory(event, '${cat.replace(/'/g,"\\'")}')" title="分享此分類">🔗</span>
                   </div>
                 </div>`;
      }

      // 🌟 子分類:依「父＞子」命名慣例分組,父分類是可展開/收合的群組標題,子分類縮排顯示在底下;
      // 排序位置用群組裡最小的排序索引決定,不會因為分組而被拖到分類順序表排定的位置以外
      const groups = buildCategoryGroups(categories, getOrderIndex);
      allShopParentNames = new Set(groups.filter(g => g.type === 'parent').map(g => g.parentName));

      let html = "";
      groups.forEach(g => {
        if (g.type === 'flat') {
          html += renderCatItemHtml(g.cat, g.cat, false);
        } else {
          const isCollapsed = collapsedShopParents.has(g.parentName);
          const hasActiveChild = g.children.some(c => c.cat === currentCategory) || g.selfCat === currentCategory;
          const toggleArrow = `<span onclick="event.stopPropagation(); toggleCategoryParent('${g.parentName.replace(/'/g,"\\'")}')" style="cursor:pointer;padding:0 4px">${isCollapsed ? '▸' : '▾'}</span>`;
          if (g.selfCat) {
            // 🌟 父分類本身也是真的分類,可以直接點選查看商品;箭頭另外做成獨立的收合開關,不影響點選本身
            const sample = currentShopItems.find(i => i.category === g.selfCat);
            const locked = sample && sample.categoryLocked && !sample.categoryUnlocked && !categoryUnlockedThisSession.has(g.selfCat);
            const count = currentShopItems.filter(i => i.category === g.selfCat).length;
            html += `<div class="cat-item cat-parent-item ${currentCategory === g.selfCat ? 'active' : ''}" onclick="selectCategory('${g.selfCat.replace(/'/g,"\\'")}')">
                       <span>${toggleArrow}${locked ? '🔒' : '📂'} ${g.parentName}</span>
                       <div style="display:flex; align-items:center; gap:10px;">
                         <span style="font-size:12px; opacity:0.7;">${count}</span>
                         <span class="btn-share-cat" onclick="shareCategory(event, '${g.selfCat.replace(/'/g,"\\'")}')" title="分享此分類">🔗</span>
                       </div>
                     </div>`;
          } else {
            html += `<div class="cat-item cat-parent-item" onclick="toggleCategoryParent('${g.parentName.replace(/'/g,"\\'")}')">
                       <span>${isCollapsed ? '▸' : '▾'} 📂 ${g.parentName}</span>
                       <span style="font-size:12px; opacity:0.6;">${g.children.length}</span>
                     </div>`;
          }
          if (!isCollapsed || hasActiveChild) {
            g.children.forEach(c => { html += renderCatItemHtml(c.cat, c.label, true); });
          }
        }
      });
      sidebar.innerHTML = html;
    }
    // 🌟 點擊父分類標題(或旁邊的箭頭)手動展開/收合底下的子分類,只影響這一個父分類,不會連動收掉其他的
    // (自動把「其他」父分類收起來的手風琴效果是在 selectCategory 切換分類時觸發,這裡只是單純開關)
    function toggleCategoryParent(parentName) {
      if (collapsedShopParents.has(parentName)) collapsedShopParents.delete(parentName);
      else collapsedShopParents.add(parentName);
      renderSidebar();
    }

    // 🌟 密碼鎖定:算出「還可以再猜幾次」的提示文字(沒開啟次數上限的話回傳空字串,不顯示這段)
    function guessRemainHint(remain, periodLabel) {
      if (remain === null || remain === undefined) return '';
      if (remain <= 0) return `<br>🚫 ${periodLabel}的嘗試次數已經用完了，請等下一期再試`;
      return `<br>🎯 ${periodLabel}還可以再猜 ${remain} 次`;
    }

    // 🌟 密碼鎖定:提示輸入分類密碼並向後端驗證,成功才會真的把分類內容顯示出來
    async function promptUnlockCategory(cat) {
      const entered = prompt(`分類「${cat}」需要密碼才能瀏覽，請輸入密碼：`);
      if (entered === null || entered.trim() === '') return;
      try {
        const res = await fetch(`${GAS_API_URL}?action=unlockCategory&discordId=${currentUser.id}&category=${encodeURIComponent(cat)}&unlockPassword=${encodeURIComponent(entered.trim())}&accessToken=${encodeURIComponent(getAccessToken())}`);
        const data = await res.json();
        if (data.status === 'success') {
          categoryUnlockedThisSession.add(cat);
          currentShopItems.forEach(i => { if (i.category === cat) i.categoryUnlocked = true; });
          renderSidebar();
          renderShop();
        } else {
          alert('❌ ' + (data.message || '密碼錯誤'));
        }
      } catch (e) {
        alert('網路錯誤，請稍後再試！');
      }
    }

    // 🌟 密碼鎖定:商品模糊顯示模式的解鎖按鈕,驗證成功後就地更新這個商品的狀態並重新渲染
    async function promptUnlockItem(itemId, safeId) {
      const item = currentShopItems.find(it => it.id === itemId);
      if (!item) return;

      // 🌟 先判斷卡住這個商品的到底是「分類鎖」還是「商品自己的鎖」,分開處理才會呼叫到正確的解鎖API
      const needsCategory = item.categoryLocked && !item.categoryUnlocked && !categoryUnlockedThisSession.has(item.category);
      if (needsCategory) {
        const entered = prompt(`此商品所在分類「${item.category}」需要密碼才能查看，請輸入密碼：`);
        if (entered === null || entered.trim() === '') return;
        try {
          const res = await fetch(`${GAS_API_URL}?action=unlockCategory&discordId=${currentUser.id}&category=${encodeURIComponent(item.category)}&unlockPassword=${encodeURIComponent(entered.trim())}&accessToken=${encodeURIComponent(getAccessToken())}`);
          const data = await res.json();
          if (data.status === 'success') {
            categoryUnlockedThisSession.add(item.category);
            currentShopItems.forEach(i => { if (i.category === item.category) i.categoryUnlocked = true; });
            renderSidebar();
            renderShop();
          } else {
            alert('❌ ' + (data.message || '密碼錯誤'));
          }
        } catch (e) {
          alert('網路錯誤，請稍後再試！');
        }
        return;
      }

      const needsItem = item.itemLocked && !item.itemUnlocked;
      if (needsItem) {
        const entered = prompt(`此商品需要密碼才能查看，請輸入密碼：`);
        if (entered === null || entered.trim() === '') return;
        try {
          const res = await fetch(`${GAS_API_URL}?action=unlockItem&discordId=${currentUser.id}&itemId=${encodeURIComponent(itemId)}&unlockPassword=${encodeURIComponent(entered.trim())}&accessToken=${encodeURIComponent(getAccessToken())}`);
          const data = await res.json();
          if (data.status === 'success') {
            item.itemUnlocked = true;
            renderShop();
          } else {
            alert('❌ ' + (data.message || '密碼錯誤'));
          }
        } catch (e) {
          alert('網路錯誤，請稍後再試！');
        }
      }
    }

    // 🌟 控制圖片放大縮小
    function openImage(url) {
      const fullSizeImage = document.getElementById('full-size-image');
      fullSizeImage.src = url;
      document.getElementById('image-overlay').style.display = 'flex';
    }

    function closeImage() {
      document.getElementById('image-overlay').style.display = 'none';
      document.getElementById('full-size-image').src = '';
    }

    let currentHistoryPage = 1;
    const HISTORY_PAGE_SIZE = 10;

    function showHistory() {
      if(!currentUser) return;
      document.getElementById('history-modal').style.display = 'flex';
      currentHistoryPage = 1;
      document.getElementById('history-list-container').innerHTML = '<p style="text-align:center; color:#B9BBBE;">讀取資料中...</p>';
      loadHistoryPage(1, false);
    }

    function loadHistoryPage(page, append) {
      const container = document.getElementById('history-list-container');
      const oldBtn = document.getElementById('history-load-more-btn');
      if (oldBtn) oldBtn.remove();
      if (append) {
        container.insertAdjacentHTML('beforeend', '<p id="history-loading-more" style="text-align:center; color:#B9BBBE;">載入更多中...</p>');
      }

      fetch(`${DASHBOARD_WORKER_URL}?action=history&discordId=${currentUser.id}&page=${page}&pageSize=${HISTORY_PAGE_SIZE}&accessToken=${encodeURIComponent(getAccessToken())}`)
      .then(res => res.json())
      .then(data => {
        const loadingMore = document.getElementById('history-loading-more');
        if (loadingMore) loadingMore.remove();

        if (!append) container.innerHTML = "";

        if (data.status === "success" && data.history.length > 0) {
          currentHistoryPage = page;
          data.history.forEach(record => {
            let keyHtml = "";
            if(record.keys && record.keys !== "無") {
              let safeKeys = String(record.keys); 
              keyHtml = `<div class="history-keys">🎁 序號：<br>${safeKeys.split(', ').join('<br>')}</div>`;
            }

            // 🌟 處理抽中物品顯示
            let drawnHtml = "";
            if(record.drawn) {
              drawnHtml = `<div style="margin-top: 8px; padding: 6px; background-color: #2F3136; border-radius: 4px; font-size: 13px; color: #FEE75C; border: 1px solid #40444B;">🎉 獲得：${record.drawn}</div>`;
            }

            // 🌟 處理餘額變化顯示
            let balanceHtml = "";
            if(record.beforeBal !== null && record.afterBal !== null) {
              balanceHtml = `<div style="margin-top: 6px; font-size: 12px; color: #99AAB5;">💰 餘額變化：${record.beforeBal} ➔ <span style="color: #FFF; font-weight: bold;">${record.afterBal}</span></div>`;
            }
            // 🌟 如果同時折抵了替代貨幣或收取額外必付費用,也一起列出來(可能不只一種)
            let extraCostHtml = "";
            if (record.altCost) extraCostHtml += `<div style="margin-top: 4px; font-size: 12px; color: #99AAB5;">💱 替代貨幣折抵：${record.altCost}</div>`;
            if (record.extraCost) extraCostHtml += `<div style="margin-top: 4px; font-size: 12px; color: #99AAB5;">➕ 額外費用：${record.extraCost}</div>`;
            // 🌟 總共獲得(盲盒抽多次時,同一種變數已經加總成一個數字)
            let totalRewardsHtml = "";
            if (record.totalRewards) {
              totalRewardsHtml = `<div style="margin-top: 6px; padding: 6px; background-color: #2F3136; border-radius: 4px; font-size: 13px; color: #58FF9C; border: 1px solid #40444B;">📊 總共獲得：${record.totalRewards}</div>`;
            }

            let displayName = record.itemName.replace('[持有]', '').replace('[隱藏]', '').trim();

            container.insertAdjacentHTML('beforeend', `
              <div class="history-card">
                <div class="history-time">${record.time}</div>
                <div class="history-name">${displayName} <span class="history-qty">x ${record.qty}</span></div>
                ${balanceHtml}
                ${extraCostHtml}
                ${drawnHtml}
                ${totalRewardsHtml}
                ${keyHtml}
              </div>`);
          });

          if (data.hasMore) {
            container.insertAdjacentHTML('beforeend', `<button id="history-load-more-btn" class="btn btn-action" style="width:100%; margin-top:10px; background-color:#5865F2;" onclick="loadHistoryPage(${page + 1}, true)">📜 載入更多</button>`);
          }
        } else if (!append) {
          container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">目前尚無兌換紀錄</p>';
        }
      }).catch(err => {
        const loadingMore = document.getElementById('history-loading-more');
        if (loadingMore) loadingMore.remove();
        console.error("歷史紀錄讀取錯誤:", err);
        if (!append) container.innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗，請稍後再試</p>';
        else container.insertAdjacentHTML('beforeend', '<p style="text-align:center; color:#ED4245;">載入更多失敗，請稍後再試</p>');
      });
    }

    function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }

    // 🌟 背包:顯示完整的自訂變數清單(不管主頁面有沒有顯示,這裡一律列出來)
    let latestCustomVars = [];
    function showBackpack() {
      const container = document.getElementById('backpack-list-container');
      if (latestCustomVars.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#B9BBBE;">目前沒有任何背包物品</p>';
      } else {
        container.innerHTML = latestCustomVars.map(v =>
          `<div class="score-item">💠 ${v.display}: <span class="score-value">${v.value}</span></div>`
        ).join('');
      }
      document.getElementById('backpack-modal').style.display = 'flex';
    }
    function closeBackpack() { document.getElementById('backpack-modal').style.display = 'none'; }

    // ============================================================
    // 🌟 拍賣會
    // ============================================================
    let currentAuctions = [];
    let auctionCountdownInterval = null;
    let auctionAutoRefreshInterval = null; // 🌟 拍賣視窗開著的時候,每10秒自動重整一次最新出價狀況;截標前搶標的塞車主要來自出價(寫入)本身排隊,重整太快只會雪上加霜,所以刻意不調太短
    let currentAuctionCategory = null; // 🌟 目前選中的拍賣分類;不再有「全部」選項,載入後會自動選第一個分類
    let auctionAltInfo = {}; // 🌟 auctionId -> {rate, balance, altName, mainCurrency},給拍賣替代貨幣折抵預覽用
    let AUCTION_CATEGORY_ORDER = []; // 🌟 拍賣分類排序(從分類排序表B欄讀取)
    let collapsedAuctionParents = new Set(); // 🌟 拍賣分類頁籤:記住哪些父分類被收合了(重新整理會重置)
    let allAuctionParentNames = new Set(); // 🌟 目前拍賣裡所有的父分類名稱,重繪頁籤時會更新,給手風琴收合邏輯用
    let lastAuctionAccordionCategory; // 🌟 記錄上次套用手風琴收合時是哪個分類,同一個分類不重複套用(不然手動展開的又會被收回去)
    function toggleAuctionCategoryParent(parentName) {
      if (collapsedAuctionParents.has(parentName)) collapsedAuctionParents.delete(parentName);
      else collapsedAuctionParents.add(parentName);
      renderAuctions();
    }

    // ============================================================
    // 🎫 抽獎名單:點「查看名單」時彈窗顯示這個抽獎商品目前所有人投了幾張、機率多少
    // ============================================================
    function showRaffleParticipants(itemId, itemName) {
      document.getElementById('raffle-participants-title').textContent = '🎫 投票名單：' + itemName;
      document.getElementById('raffle-participants-modal').style.display = 'flex';
      document.getElementById('raffle-participants-container').innerHTML = '<p style="text-align:center; color:#B9BBBE;">讀取中...</p>';

      fetch(`${GAS_API_URL}?action=getRaffleParticipants&itemId=${itemId}&accessToken=${encodeURIComponent(getAccessToken())}`)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('raffle-participants-container');
        if (data.status !== 'success') { container.innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗：' + (data.message||'') + '</p>'; return; }
        if (!data.list || data.list.length === 0) { container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">目前還沒有人投票</p>'; return; }
        container.innerHTML = `
          <table style="width:100%; border-collapse:collapse; font-size:14px;">
            <thead><tr style="border-bottom:1px solid #4F545C; color:#B9BBBE;">
              <th style="text-align:left; padding:6px 4px;">名次</th>
              <th style="text-align:left; padding:6px 4px;">玩家</th>
              <th style="text-align:right; padding:6px 4px;">票數(加權)</th>
              <th style="text-align:right; padding:6px 4px;">機率</th>
            </tr></thead>
            <tbody>
              ${data.list.map((p, idx) => `
                <tr style="border-bottom:1px solid #40444B;">
                  <td style="padding:6px 4px;">#${idx + 1}</td>
                  <td style="padding:6px 4px;">${p.name}</td>
                  <td style="padding:6px 4px; text-align:right;">${p.raw}(${p.weighted})</td>
                  <td style="padding:6px 4px; text-align:right;"><b>${p.odds}%</b></td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      })
      .catch(err => {
        console.error('讀取抽獎名單失敗:', err);
        document.getElementById('raffle-participants-container').innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗，請稍後再試</p>';
      });
    }

    function closeRaffleParticipants() {
      document.getElementById('raffle-participants-modal').style.display = 'none';
    }

    function showAuctions() {
      if (!currentUser) return;
      document.getElementById('auction-modal').style.display = 'flex';
      document.getElementById('auction-list-container').innerHTML = '<p style="text-align:center; color:#B9BBBE;">讀取中...</p>';
      document.getElementById('auction-category-tabs').style.display = 'none';
      loadAuctions();

      if (auctionAutoRefreshInterval) clearInterval(auctionAutoRefreshInterval);
      auctionAutoRefreshInterval = setInterval(() => {
        // 🌟 如果玩家正在輸入出價金額或勾選折抵選項,先跳過這次自動重整,避免打斷輸入到一半的內容
        const activeEl = document.activeElement;
        const container = document.getElementById('auction-list-container');
        if (container && activeEl && container.contains(activeEl) && activeEl !== document.body) return;
        loadAuctions();
      }, 10000);
    }

    function closeAuctions() {
      document.getElementById('auction-modal').style.display = 'none';
      if (auctionCountdownInterval) { clearInterval(auctionCountdownInterval); auctionCountdownInterval = null; }
      if (auctionAutoRefreshInterval) { clearInterval(auctionAutoRefreshInterval); auctionAutoRefreshInterval = null; }
      auctionCountdownReloadTriggered.clear();
    }

    function loadAuctions() {
      // 🌟 記住這次重整前的截止時間,重整後如果發現變長了,代表剛好被自動延長觸發,閃一下卡片提醒玩家
      const prevEndDates = {};
      currentAuctions.forEach(a => { prevEndDates[a.id] = a.endDate; });

      fetch(`${DASHBOARD_WORKER_URL}?action=auctions&discordId=${currentUser.id}&accessToken=${encodeURIComponent(getAccessToken())}`)
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          const extendedIds = data.auctions
            .filter(a => prevEndDates[a.id] && a.endDate && new Date(a.endDate).getTime() > new Date(prevEndDates[a.id]).getTime())
            .map(a => a.id);

          currentAuctions = data.auctions;
          if (data.categoryOrder && data.categoryOrder.length > 0) AUCTION_CATEGORY_ORDER = data.categoryOrder;
          renderAuctions();
          if (auctionCountdownInterval) clearInterval(auctionCountdownInterval);
          auctionCountdownInterval = setInterval(updateAuctionCountdowns, 1000);
          const refreshLabel = document.getElementById('auction-last-refresh');
          if (refreshLabel) refreshLabel.textContent = `🕓 上次更新：${new Date().toLocaleTimeString('zh-TW')}（每10秒自動更新）`;

          extendedIds.forEach(id => {
            const card = document.getElementById('auction-card-' + id);
            if (card) {
              card.classList.add('auction-extend-flash');
              setTimeout(() => card.classList.remove('auction-extend-flash'), 2000);
            }
          });
        } else {
          document.getElementById('auction-list-container').innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗：' + (data.message || '') + '</p>';
        }
      })
      .catch(err => {
        console.error('拍賣讀取錯誤:', err);
        document.getElementById('auction-list-container').innerHTML = '<p style="text-align:center; color:#ED4245;">讀取失敗，請稍後再試</p>';
      });
    }

    function renderAuctions() {
      auctionAltInfo = {}; // 🌟 每次重繪拍賣列表都重置替代貨幣資訊快取
      // 🌟 同步彈窗標題旁的貨幣顯示:直接複製玩家頭像旁邊那整組(含所有自訂貨幣),不用各自維護一份
      const scoreBoxEl = document.getElementById('score-box-container');
      const auctionCurrencyBox = document.getElementById('auction-currency-box');
      if (scoreBoxEl && auctionCurrencyBox) auctionCurrencyBox.innerHTML = scoreBoxEl.innerHTML;

      // 🌟 建立分類標籤列(只有超過1個分類時才顯示),依分類排序表B欄的順序排列
      const allCategories = [...new Set(currentAuctions.map(a => a.category || '未分類'))];

      // 🌟 分類分享 / 拍賣分享:分享特定拍賣時要優先切到該拍賣的分類,
      // 不然如果目前分類跟拍賣所在分類不同,會被篩選濾掉、導致捲動定位永遠找不到卡片
      const targetAuctionCategory = localStorage.getItem('shared_auction_category_target');
      const targetAuctionIdForCat = localStorage.getItem('shared_auction_target');
      const targetAuctionForCat = targetAuctionIdForCat ? currentAuctions.find(a => a.id === targetAuctionIdForCat) : null;

      if (targetAuctionForCat) {
        currentAuctionCategory = targetAuctionForCat.category || '未分類';
        localStorage.removeItem('shared_auction_category_target');
      } else if (targetAuctionCategory && allCategories.includes(targetAuctionCategory)) {
        currentAuctionCategory = targetAuctionCategory;
        localStorage.removeItem('shared_auction_category_target');
      } else {
        localStorage.removeItem('shared_auction_category_target');
        // 🌟 沒有分類分享目標時,不再有「全部」分類,預設選排序後的第一個分類
        if (!currentAuctionCategory || !allCategories.includes(currentAuctionCategory)) {
          const sortedForDefault = allCategories.slice().sort((a, b) => getCategoryOrderIndex(a, AUCTION_CATEGORY_ORDER) - getCategoryOrderIndex(b, AUCTION_CATEGORY_ORDER));
          currentAuctionCategory = sortedForDefault[0] || null;
        }
      }

      const tabsEl = document.getElementById('auction-category-tabs');
      if (allCategories.length > 1) {
        tabsEl.style.display = 'flex';
        // 🌟 子分類:跟商店側邊欄用同一套「父＞子」命名慣例分組邏輯,父分類做成可展開/收合的群組標籤,
        // 排序位置用群組裡最小的排序索引決定(不是第一個遇到的分類),父分類本身也可以是能直接點選的真分類
        const getAuctionOrderIndex = (cat) => getCategoryOrderIndex(cat, AUCTION_CATEGORY_ORDER);
        const auctionGroups = buildCategoryGroups(allCategories, getAuctionOrderIndex);
        allAuctionParentNames = new Set(auctionGroups.filter(g => g.type === 'parent').map(g => g.parentName));
        // 🌟 只有分類真的換了(或第一次載入)才套用手風琴自動收合,單純手動點父分類展開/收合觸發的重繪不會被這裡蓋掉
        if (currentAuctionCategory !== lastAuctionAccordionCategory) applyAuctionAccordion(currentAuctionCategory);
        let tabsHtml = '';
        auctionGroups.forEach(g => {
          if (g.type === 'flat') {
            tabsHtml += `<div class="auction-cat-tab ${currentAuctionCategory === g.cat ? 'active' : ''}" onclick="selectAuctionCategory('${g.cat.replace(/'/g, "\\'")}')">${g.cat} <span class="btn-share-cat" onclick="shareAuctionCategory(event, '${g.cat.replace(/'/g, "\\'")}')" title="分享此分類">🔗</span></div>`;
          } else {
            const isCollapsed = collapsedAuctionParents.has(g.parentName);
            const hasActiveChild = g.children.some(c => c.cat === currentAuctionCategory) || g.selfCat === currentAuctionCategory;
            const toggleArrow = `<span onclick="event.stopPropagation(); toggleAuctionCategoryParent('${g.parentName.replace(/'/g, "\\'")}')" style="cursor:pointer">${isCollapsed ? '▸' : '▾'}</span>`;
            if (g.selfCat) {
              tabsHtml += `<div class="auction-cat-tab auction-cat-parent-tab ${currentAuctionCategory === g.selfCat ? 'active' : ''}" onclick="selectAuctionCategory('${g.selfCat.replace(/'/g, "\\'")}')">${toggleArrow} 📂 ${g.parentName} <span class="btn-share-cat" onclick="shareAuctionCategory(event, '${g.selfCat.replace(/'/g, "\\'")}')" title="分享此分類">🔗</span></div>`;
            } else {
              tabsHtml += `<div class="auction-cat-tab auction-cat-parent-tab" onclick="toggleAuctionCategoryParent('${g.parentName.replace(/'/g, "\\'")}')">${isCollapsed ? '▸' : '▾'} 📂 ${g.parentName}</div>`;
            }
            if (!isCollapsed || hasActiveChild) {
              g.children.forEach(c => {
                tabsHtml += `<div class="auction-cat-tab ${currentAuctionCategory === c.cat ? 'active' : ''}" onclick="selectAuctionCategory('${c.cat.replace(/'/g, "\\'")}')">↳ ${c.label} <span class="btn-share-cat" onclick="shareAuctionCategory(event, '${c.cat.replace(/'/g, "\\'")}')" title="分享此分類">🔗</span></div>`;
              });
            }
          }
        });
        tabsEl.innerHTML = tabsHtml;
      } else {
        tabsEl.style.display = 'none';
      }

      // 🌟 依分類篩選
      const displayAuctions = currentAuctionCategory
        ? currentAuctions.filter(a => (a.category || '未分類') === currentAuctionCategory)
        : currentAuctions;

      const container = document.getElementById('auction-list-container');
      if (!displayAuctions || displayAuctions.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#B9BBBE;">目前沒有拍賣品</p>';
        updateAuctionCountdowns();
        localStorage.removeItem('shared_auction_target'); // 🌟 沒有東西可以捲動定位,清掉避免下次一直重複觸發
        return;
      }
      container.innerHTML = '';
      displayAuctions.forEach(a => {
        const isEnded = a.state !== 'open';
        let typeLabel, typeClass;
        if (a.type === 'SEALED') { typeLabel = '🕵️ 暗標(高者得)'; typeClass = 'auction-type-sealed'; }
        else if (a.type === 'SEALED_LOW') { typeLabel = '🔻 暗標(低者得)'; typeClass = 'auction-type-sealed-low'; }
        else { typeLabel = '📢 公開比價'; typeClass = 'auction-type-public'; }

        let priceInfoHtml;
        if (a.type === 'PUBLIC') {
          priceInfoHtml = a.hasAnyBid
            ? `目前最高出價：<span class="auction-bid-value">${a.currentHighBid} ${a.displayCurrency}</span>${a.currentHighBidderName ? ` (👤 ${a.currentHighBidderName})` : ''}`
            : `起標價：<span class="auction-bid-value">${a.startBid} ${a.displayCurrency}</span>（尚無人出價）`;
        } else if (a.type === 'SEALED_LOW') {
          priceInfoHtml = `起標價(上限)：<span class="auction-bid-value">${a.startBid} ${a.displayCurrency}</span>（暗標，出價越低越有機會得標，金額互相保密；若與他人出價金額相同會互相淘汰，改由下一個不重複的最低價得標）`;
        } else {
          priceInfoHtml = `起標價：<span class="auction-bid-value">${a.startBid} ${a.displayCurrency}</span>（暗標，出價金額互相保密）`;
        }
        if (a.winnerCount > 1) priceInfoHtml += `<br>🏆 前 ${a.winnerCount} 名出價者都會得標(各自付自己出的價格)`;
        if (a.raffleSlots > 0) priceInfoHtml += `<br>🎰 沒得標的人還有機會抽中安慰獎(共 ${a.raffleSlots} 個名額)`;
        const myBidHtml = a.myActiveBid !== null ? `<br>您目前出價：<span class="auction-bid-value">${a.myActiveBid} ${a.displayCurrency}</span>${a.myActiveBidAlt > 0 ? `（已折抵 ${a.myActiveBidAlt} ${a.altCurrencyDisplay || a.altCurrency || ''}）` : ''}` : '';

        let statusHtml = '';
        if (a.state === 'ended') {
          if (a.winnerIsMe) statusHtml = `<div class="auction-status win">🎉 恭喜！您以 ${a.myActiveBid !== null ? a.myActiveBid : a.winningBid} ${a.displayCurrency} 得標！</div>`;
          else if (a.myRafflePrize) statusHtml = `<div class="auction-status win">🎰 雖然沒得標，但抽中安慰獎「${a.myRafflePrize}」！</div>`;
          else if (a.winningBid !== null) statusHtml = `<div class="auction-status lose">已結標，未得標${a.raffleSlots > 0 ? '，也沒抽中安慰獎' : ''}</div>`;
          else statusHtml = `<div class="auction-status lose">流標（無人出價，或暗標出價互撞找不到唯一得標者）</div>`;
        } else if (a.state === 'pending_settlement') {
          statusHtml = `<div class="auction-status">⏳ 拍賣已截止，等待系統結算中...</div>`;
        } else if (a.state === 'not_started') {
          statusHtml = `<div class="auction-status">🕐 尚未開始，敬請期待</div>`;
        } else if (a.state === 'no_permission') {
          statusHtml = `<div class="auction-status lose">🔒 身分組不符，無法出價</div>`;
        } else if (a.type === 'PUBLIC' && a.currentHighBidderIsMe) {
          statusHtml = `<div class="auction-status leading">👑 您目前是最高出價者</div>`;
        }

        let roleTagHtml = '';
        if (a.requiredRoleNames && a.requiredRoleNames.length > 0) {
          let roleModeHint = '需任一個';
          if (a.roleRequirementMode === 'ALL') roleModeHint = '需全部持有';
          else if (a.roleRequirementMode === 'COUNT') roleModeHint = `需其中${a.roleRequirementMinCount}個`;
          const roleTagClass = a.hasRolePermission ? 'tag-role-ok' : 'tag-role-locked';
          const roleIcon = a.hasRolePermission ? '✅' : '🔒';
          roleTagHtml = `<span class="limit-tag ${roleTagClass}" style="margin-bottom:8px; display:inline-block;">${roleIcon} 限定身分組(${roleModeHint}): ${a.requiredRoleNames.join('、')}</span><br>`;
        }

        let countdownHtml;
        if (a.state === 'not_started' && a.startDate) {
          countdownHtml = `<span class="auction-countdown" data-start="${a.startDate}" data-auction-id="${a.id}">計算中...</span>`;
        } else if (a.endDate) {
          countdownHtml = `<span class="auction-countdown" data-end="${a.endDate}" data-auction-id="${a.id}">計算中...</span>`;
        } else {
          countdownHtml = '無截止時間';
        }

        // 🌟 自動延長規則提示:有設定的話,讓玩家知道最後衝刺出價會延長時間,不用意外覺得「怎麼還沒結標」
        let extendHintHtml = '';
        if (a.state === 'open' && a.extendTriggerMin !== null && a.extendByMin !== null) {
          extendHintHtml = `<div class="auction-extend-hint">⏰ 最後 ${a.extendTriggerMin} 分鐘內有人出價，將自動延長 ${a.extendByMin} 分鐘</div>`;
        }

        let bidRowHtml = '';
        if (a.state === 'open') {
          let bidInputAttrs;
          if (a.type === 'SEALED_LOW') {
            bidInputAttrs = `max="${a.startBid}" placeholder="最高 ${a.startBid}"`;
          } else {
            const minBid = a.type === 'PUBLIC' ? (a.hasAnyBid ? a.currentHighBid + 1 : a.startBid) : a.startBid;
            bidInputAttrs = `min="${minBid}" placeholder="最低 ${minBid}"`;
          }

          let auctionAltHtml = '';
          if (a.altCurrency) {
            auctionAltInfo[a.id] = { rate: a.altCurrencyRate, balance: a.altCurrencyBalance, altName: a.altCurrencyDisplay || a.altCurrency, mainCurrency: a.displayCurrency };
            auctionAltHtml = `
              <div class="alt-currency-box" id="altbox-auction-${a.id}">
                <label class="alt-toggle-label">
                  <input type="checkbox" id="alt-toggle-auction-${a.id}" onchange="onAuctionAltToggle('${a.id}')">
                  💱 使用 ${a.altCurrencyDisplay || a.altCurrency} 折抵（你有 ${a.altCurrencyBalance}）
                </label>
                <div class="alt-mode-row" id="alt-mode-row-auction-${a.id}" style="display:none">
                  <label><input type="radio" name="alt-mode-auction-${a.id}" id="alt-mode-auto-auction-${a.id}" value="auto" checked onchange="updateAuctionAltPreview('${a.id}')"> 自動折抵</label>
                  <label><input type="radio" name="alt-mode-auction-${a.id}" id="alt-mode-manual-auction-${a.id}" value="manual" onchange="updateAuctionAltPreview('${a.id}')"> 自訂數量</label>
                  <input type="number" id="alt-amount-auction-${a.id}" min="0" value="0" style="display:none" oninput="updateAuctionAltPreview('${a.id}')">
                </div>
                <div class="alt-preview" id="alt-preview-auction-${a.id}"></div>
